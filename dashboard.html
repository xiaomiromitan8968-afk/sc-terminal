<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SC_ MALIKOV • Neural Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Asl dizayn saqlab qolindi */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-deep: #070b12;
            --glass-bg: rgba(18, 28, 40, 0.75);
            --card-solid: #101b26;
            --border-glow: rgba(0, 140, 255, 0.25);
            --accent-cyan: #00c2ff;
            --accent-gold: #f5b81b;
            --accent-purple: #a855f7;
            --profit-green: #10b981;
            --loss-red: #ef4444;
            --text-dim: #a0afbe;
            --text-bright: #f0f6fc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            background-image: radial-gradient(circle at 20% 30%, rgba(0, 140, 255, 0.08) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(168, 85, 247, 0.08) 0%, transparent 50%);
            color: var(--text-bright);
            min-height: 100vh;
            padding: 24px 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .glow-text {
            font-size: 2.5rem; font-weight: 700;
            background: linear-gradient(135deg, #b1dcff, #c7b3ff, #fcd34d);
            -webkit-background-clip: text; background-clip: text;
            color: transparent; letter-spacing: -0.02em; margin-bottom: 6px;
        }
        .badge-accuracy {
            display: inline-block; background: rgba(0, 200, 255, 0.15);
            backdrop-filter: blur(8px); border: 1px solid rgba(0, 200, 255, 0.4);
            border-radius: 40px; padding: 6px 16px; font-size: 0.9rem;
            font-weight: 600; color: #b0e6ff; margin-left: 15px;
        }
        .market-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin: 30px 0 15px; }
        .asset-card {
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 24px;
            padding: 18px; cursor: pointer; transition: all 0.25s cubic-bezier(0.2, 0, 0, 1);
            display: flex; align-items: center; justify-content: space-between;
        }
        .asset-card:hover { transform: translateY(-4px); border-bottom: 2px solid var(--accent-cyan); background: rgba(28, 45, 65, 0.8); }
        .asset-icon { font-size: 1.8rem; margin-right: 14px; }
        .asset-name { font-weight: 700; font-size: 1.2rem; }
        .asset-desc { font-size: 0.8rem; color: var(--text-dim); }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .btn {
            background: rgba(20, 30, 45, 0.7); border: 1px solid #2d3a4e;
            color: #e2e8f0; padding: 10px 22px; border-radius: 40px;
            font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-active { background: var(--accent-cyan); color: #000e1a; font-weight: 700; }
        .analysis-layout { display: grid; grid-template-columns: 3fr 1.2fr; gap: 24px; margin-top: 25px; }
        #tv-widget-area { height: 580px; border-radius: 28px; overflow: hidden; background: #0c121c; }
        .right-panel { display: flex; flex-direction: column; gap: 22px; }
        .gauge-card, .signal-premium-card { background: rgba(10, 20, 33, 0.7); backdrop-filter: blur(12px); border: 1px solid #253549; border-radius: 28px; padding: 20px; }
        .direction-buy { color: var(--profit-green); font-size: 1.8rem; font-weight: 800; }
        .direction-sell { color: var(--loss-red); font-size: 1.8rem; font-weight: 800; }
        .signal-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #2e4a66; }
        .tp-item { display: flex; justify-content: space-between; padding: 5px 0; }
        .sl-value { color: var(--loss-red); font-weight: 800; }
        .hidden { display: none !important; }
        .pulse-glow { animation: softPulse 3s infinite; }
        @keyframes softPulse { 0% { box-shadow: 0 0 0 0 rgba(0, 180, 255, 0.3); } 70% { box-shadow: 0 0 0 10px rgba(0, 180, 255, 0); } }
        @media (max-width: 1000px) { .analysis-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div id="menu-area">
        <div style="display: flex; align-items: center; flex-wrap: wrap;">
            <h1 class="glow-text">📡 SC_ MALIKOV NEURAL TERMINAL</h1>
            <span class="badge-accuracy"><i class="fas fa-brain"></i> 99% Deep Learning</span>
        </div>
        <p style="color: #9bb5d4; margin-bottom: 10px; font-size: 1.1rem;">
            <i class="fas fa-chart-line"></i> SMC mantiqi va "choch" patternlari asosida tahlil
        </p>

        <div class="market-grid">
            <div class="asset-card" onclick="openAnalysis('OANDA:XAUUSD', 'GOLD / USD', 'XAUUSD')">
                <div style="display: flex; align-items: center;"><span class="asset-icon">🟡</span><div class="asset-info"><span class="asset-name">Oltin</span><span class="asset-desc">XAU/USD</span></div></div>
                <span class="trend-indicator">📊</span>
            </div>
            <div class="asset-card" onclick="openAnalysis('BINANCE:BTCUSDT', 'Bitcoin / USDT', 'BTCUSDT')">
                <div style="display: flex; align-items: center;"><span class="asset-icon">₿</span><div class="asset-info"><span class="asset-name">Bitcoin</span><span class="asset-desc">BTC/USDT</span></div></div>
                <span class="trend-indicator">🚀</span>
            </div>
            <div class="asset-card" onclick="openAnalysis('FX:EURUSD', 'EUR / USD', 'EURUSD')">
                <div style="display: flex; align-items: center;"><span class="asset-icon">💶</span><div class="asset-info"><span class="asset-name">Yevro</span><span class="asset-desc">EUR/USD</span></div></div>
                <span class="trend-indicator">📉</span>
            </div>
            <div class="asset-card" onclick="openAnalysis('BINANCE:ETHUSDT', 'Ethereum / USDT', 'ETHUSDT')">
                <div style="display: flex; align-items: center;"><span class="asset-icon">💎</span><div class="asset-info"><span class="asset-name">Ethereum</span><span class="asset-desc">ETH/USDT</span></div></div>
                <span class="trend-indicator">💠</span>
            </div>
        </div>
    </div>

    <div id="analysis-area" class="hidden">
        <div style="display:flex; align-items:center; gap:20px; margin-bottom:15px;">
            <button class="btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
            <h2 id="active-symbol-name">---</h2>
        </div>

        <div class="analysis-layout">
            <div id="tv-widget-area"></div>
            <div class="right-panel">
                <div class="gauge-card">
                    <div id="gauge-container" style="height: 300px; width: 100%;"></div>
                </div>
                <div class="signal-premium-card pulse-glow">
                    <div id="signal-content">
                        <div style="text-align:center; padding:20px; color:var(--accent-cyan);"><i class="fas fa-sync fa-spin"></i> Neyron tarmoq o'qitilmoqda...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script src="https://unpkg.com/brain.js"></script>

<script>
    let currentSymbol = "";
    let currentBase = "";

    // 1. Haqiqiy ma'lumotlarni olish
    async function fetchHistory(symbol) {
        try {
            const apiSym = symbol.includes("XAU") ? "BTCUSDT" : symbol.replace("/", "");
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${apiSym}&interval=1h&limit=100`);
            const data = await res.json();
            return data.map(d => ({ o: +d[1], h: +d[2], l: +d[3], c: +d[4] }));
        } catch(e) { return null; }
    }

    // 2. Brain.js Deep Learning mantiqi
    async function runAI(rawData) {
        const prices = rawData.map(d => d.c);
        const max = Math.max(...prices);
        const min = Math.min(...prices);

        const trainingData = rawData.slice(0, -1).map((d, i) => ({
            input: [(d.o-min)/(max-min), (d.h-min)/(max-min), (d.l-min)/(max-min), (d.c-min)/(max-min)],
            output: [rawData[i+1].c > d.c ? 1 : 0]
        }));

        const net = new brain.NeuralNetwork({ hiddenLayers: [10, 10] });
        net.train(trainingData, { iterations: 1000 });

        const last = rawData[rawData.length-1];
        const input = [(last.o-min)/(max-min), (last.h-min)/(max-min), (last.l-min)/(max-min), (last.c-min)/(max-min)];
        const result = net.run(input);

        return { prob: result[0], price: last.c, vol: (max-min)*0.08 };
    }

    async function openAnalysis(symbol, name, base) {
        currentSymbol = symbol; currentBase = base;
        document.getElementById('active-symbol-name').innerText = name;
        document.getElementById('menu-area').classList.add('hidden');
        document.getElementById('analysis-area').classList.remove('hidden');
        
        loadTV();
        const data = await fetchHistory(base);
        if(data) {
            const ai = await runAI(data);
            renderSignal(ai, base);
        }
    }

    function renderSignal(ai, base) {
        const isBuy = ai.prob > 0.5;
        const conf = (isBuy ? ai.prob : (1-ai.prob)) * 100;
        const tp = isBuy ? ai.price + ai.vol : ai.price - ai.vol;
        const sl = isBuy ? ai.price - (ai.vol * 0.6) : ai.price + (ai.vol * 0.6);

        document.getElementById('signal-content').innerHTML = `
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <span style="font-size:1.5rem; font-weight:900;">${base}</span>
                <span class="${isBuy?'direction-buy':'direction-sell'}">${isBuy?'BUY':'SELL'}</span>
            </div>
            <div class="signal-row"><span>AI Ishonchi</span><span style="color:var(--accent-cyan); font-weight:700;">${conf.toFixed(2)}%</span></div>
            <div class="signal-row"><span>Kirish</span><span class="signal-value">${ai.price.toFixed(2)}</span></div>
            <div class="tp-item" style="margin-top:10px;"><span>🎯 Take Profit:</span><span style="color:var(--profit-green); font-weight:700;">${tp.toFixed(2)}</span></div>
            <div class="signal-row" style="border:none;"><span>🛡️ Stop Loss:</span><span class="sl-value">${sl.toFixed(2)}</span></div>
        `;
    }

    function loadTV() {
        new TradingView.widget({
            "autosize": true, "symbol": currentSymbol, "interval": "60", "theme": "dark", "container_id": "tv-widget-area"
        });
        document.getElementById('gauge-container').innerHTML = '';
        const s = document.createElement('script');
        s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
        s.async = true;
        s.innerHTML = JSON.stringify({ "interval": "1h", "width": "100%", "height": "100%", "symbol": currentSymbol, "colorTheme": "dark" });
        document.getElementById('gauge-container').appendChild(s);
    }

    function goBack() {
        document.getElementById('analysis-area').classList.add('hidden');
        document.getElementById('menu-area').classList.remove('hidden');
    }
</script>
</body>
</html>
