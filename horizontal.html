<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC_MALIKOV | HORIZONTAL</title>
    <style>
        :root { --neon: #00ff88; --red: #ff4444; --bg: #030303; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        #tv-chart { width: 100%; height: 45vh; border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .signal-card { background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 15px; padding: 15px; margin-top: 15px; border-left: 5px solid var(--neon); }
        .price-box { display: flex; justify-content: space-around; background: #111; padding: 15px; border-radius: 12px; margin-top: 10px; }
        .item { text-align: center; }
        .item small { display: block; font-size: 10px; color: #888; }
        .item b { font-size: 14px; color: var(--neon); }
        .btn-back { width: 100%; margin-top: 20px; padding: 15px; background: transparent; border: 1px solid #333; color: #fff; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <b id="pair-display">...</b>
        <span style="color: var(--neon); font-size: 12px;">GORIZONTAL LINIYA</span>
    </div>

    <div id="tv-chart"></div>

    <div class="signal-card">
        <div style="font-size: 12px; color: #888;">STRATEGIYA HOLATI:</div>
        <div id="status" style="font-weight: bold; margin: 5px 0;">DARAXTLAR TAHLIL QILINMOQDA...</div>
        
        <div class="price-box">
            <div class="item"><small>LEVEL</small><b id="level-val">0.00</b></div>
            <div class="item"><small>S/L</small><b id="sl-val" style="color:var(--red)">0.00</b></div>
            <div class="item"><small>T/P</small><b id="tp-val">0.00</b></div>
        </div>
        
        <p style="font-size: 11px; color: #aaa; margin-top: 15px; line-height: 1.4;">
            <b>QOIDA:</b> Narx asosiy darajaga yetganda Pin-bar yoki Engulfing shamchasi chiqishini kuting. Daraja buzilsa, Retest kutish tavsiya etiladi.
        </p>
    </div>

    <button class="btn-back" onclick="window.history.back()">⬅ ORQAGA QAYTISH</button>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pair = urlParams.get('pair') || 'BINANCE:BTCUSDT';
        const tf = urlParams.get('tf') || '15';

        document.getElementById('pair-display').innerText = pair.split(':')[1];

        // TradingView grafik
        new TradingView.widget({
            "autosize": true, "symbol": pair, "interval": tf, "theme": "dark", "container_id": "tv-chart", "hide_side_toolbar": true
        });

        async function getHorizontalSignal() {
            try {
                let sym = pair.split(':')[1].replace('XAUUSD', 'PAXGUSDT');
                let res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`);
                let data = await res.json();
                let price = parseFloat(data.price);
                
                let pD = pair.includes('EUR') ? 4 : 2;
                
                // Mantiqiy daraja (taxminiy eng yaqin butun sonlar)
                let level = (Math.round(price / 10) * 10).toFixed(pD);
                let side = price > level ? "SUPPORT (BUY)" : "RESISTANCE (SELL)";
                
                document.getElementById('status').innerText = `NARX ${side} ZONASIDA`;
                document.getElementById('level-val').innerText = level;
                document.getElementById('sl-val').innerText = price > level ? (level * 0.998).toFixed(pD) : (level * 1.002).toFixed(pD);
                document.getElementById('tp-val').innerText = price > level ? (price * 1.01).toFixed(pD) : (price * 0.99).toFixed(pD);

            } catch(e) { console.log("Error fetching price"); }
        }

        setTimeout(getHorizontalSignal, 2000);
    </script>
</body>
</html>
