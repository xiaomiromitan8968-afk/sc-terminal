<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC_MALIKOV | HEAD & SHOULDERS</title>
    <style>
        :root { --neon: #00ff88; --red: #ff4444; --bg: #030303; --reversal: #9c27b0; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        #tv-chart { width: 100%; height: 45vh; border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .signal-card { background: rgba(156, 39, 176, 0.05); border: 1px solid rgba(156, 39, 176, 0.2); border-radius: 15px; padding: 15px; margin-top: 15px; border-left: 5px solid var(--reversal); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .stat-box { background: #111; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #222; }
        .stat-box small { display: block; font-size: 9px; color: #888; margin-bottom: 4px; }
        .stat-box b { font-size: 13px; color: var(--reversal); }
        .back-btn { width: 100%; margin-top: 20px; padding: 15px; background: transparent; border: 1px solid #333; color: #fff; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <b id="pair-display">...</b>
        <span style="color: var(--reversal); font-size: 11px; font-weight: bold;">HEAD & SHOULDERS (REVERSAL)</span>
    </div>

    <div id="tv-chart"></div>

    <div class="signal-card">
        <div style="font-size: 11px; color: #888;">STRATEGIYA HOLATI:</div>
        <div id="status" style="font-weight: bold; margin: 5px 0; color: var(--reversal);">TREND TUGASH ARAFASIDA...</div>
        
        <div class="stat-grid">
            <div class="stat-box"><small>NECKLINE LEVEL</small><b id="neck-val">0.00</b></div>
            <div class="stat-box"><small>EXPECTED DROP</small><b id="drop-val" style="color:var(--red)">0.00</b></div>
        </div>
        
        <p style="font-size: 11px; color: #aaa; margin-top: 15px; line-height: 1.4;">
            <b>QOIDA:</b> O'ng elka shakllanib bo'lgach, narx Neckline darajasini yorib o'tishini kuting. Yorilgandan keyin retest bo'lishi ehtimoli yuqori.
        </p>
    </div>

    <button class="back-btn" onclick="window.history.back()">⬅ ORQAGA QAYTISH</button>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pair = urlParams.get('pair') || 'BINANCE:BTCUSDT';
        const tf = urlParams.get('tf') || '15';

        document.getElementById('pair-display').innerText = pair.split(':')[1];

        new TradingView.widget({
            "autosize": true, "symbol": pair, "interval": tf, "theme": "dark", "container_id": "tv-chart", "hide_side_toolbar": true
        });

        async function analyzeHS() {
            try {
                let sym = pair.split(':')[1].replace('XAUUSD', 'PAXGUSDT');
                let res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`);
                let data = await res.json();
                let price = parseFloat(data.price);
                let pD = pair.includes('EUR') ? 4 : 2;

                // Bo'yin chizig'i va maqsadni simulyatsiya qilish
                let neckline = (price * 0.992).toFixed(pD); // Narxdan biroz pastda
                let target = (price * 0.97).toFixed(pD); // 2-3% tushish ehtimoli

                document.getElementById('neck-val').innerText = neckline;
                document.getElementById('drop-val').innerText = target;
                document.getElementById('status').innerText = "O'NG ELKA SHAKLLANMOQDA";

            } catch(e) { console.error("HS Analysis Error"); }
        }

        setTimeout(analyzeHS, 2000);
    </script>
</body>
</html>
