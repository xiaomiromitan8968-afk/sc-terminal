<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC_MALIKOV | ASCENDING TRIANGLE</title>
    <style>
        :root { --neon: #00ff88; --red: #ff4444; --bg: #030303; --bull: #26a69a; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        #tv-chart { width: 100%; height: 45vh; border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .signal-card { background: rgba(38, 166, 154, 0.05); border: 1px solid rgba(38, 166, 154, 0.2); border-radius: 15px; padding: 15px; margin-top: 15px; border-left: 5px solid var(--bull); }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .data-box { background: #111; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #222; }
        .data-box small { display: block; font-size: 9px; color: #888; margin-bottom: 4px; }
        .data-box b { font-size: 13px; color: var(--bull); }
        .back-btn { width: 100%; margin-top: 20px; padding: 15px; background: transparent; border: 1px solid #333; color: #fff; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <b id="pair-display">...</b>
        <span style="color: var(--bull); font-size: 12px; font-weight: bold;">O'SUVCHI UCHBURCHAK</span>
    </div>

    <div id="tv-chart"></div>

    <div class="signal-card">
        <div style="font-size: 11px; color: #888;">STRATEGIYA ANALIZI:</div>
        <div id="status" style="font-weight: bold; margin: 5px 0; color: var(--bull);">BULLISH ACCUMULATION...</div>
        
        <div class="data-grid">
            <div class="data-box"><small>RESISTANCE (BUY ABOVE)</small><b id="res-val">0.00</b></div>
            <div class="data-box"><small>SUPPORT (ASCENDING)</small><b id="sup-val">0.00</b></div>
        </div>
        
        <p style="font-size: 11px; color: #aaa; margin-top: 15px; line-height: 1.4;">
            <b>MANTIQ:</b> Bu ko'pincha yuqoriga breakout beruvchi figura. Narx gorizontal darajani yorib o'tib, uning ustida sham yopsa (confirmation), savdoga kirish xavfsizroq bo'ladi.
        </p>
    </div>

    <button class="back-btn" onclick="window.history.back()">⬅ ORQAGA QAYTISH</button>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pair = urlParams.get('pair') || 'BINANCE:BTCUSDT';
        const tf = urlParams.get('tf') || '15';

        document.getElementById('pair-display').innerText = pair.split(':')[1];

        new TradingView.widget({
            "autosize": true, "symbol": pair, "interval": tf, "theme": "dark", "container_id": "tv-chart", "hide_side_toolbar": true
        });

        async function analyzeTriangle() {
            try {
                let sym = pair.split(':')[1].replace('XAUUSD', 'PAXGUSDT');
                let res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`);
                let data = await res.json();
                let price = parseFloat(data.price);
                let pD = pair.includes('EUR') ? 4 : 2;

                // O'suvchi uchburchak darajalarini simulyatsiya qilish
                let resLevel = (price * 1.005).toFixed(pD); // 0.5% tepada qarshilik
                let supLevel = (price * 0.998).toFixed(pD); // 0.2% pastda o'suvchi chiziq

                document.getElementById('res-val').innerText = resLevel;
                document.getElementById('sup-val').innerText = supLevel;

            } catch(e) { console.error("Data error"); }
        }

        setTimeout(analyzeTriangle, 2000);
    </script>
</body>
</html>
