<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Kimyogar 3D Pro | O'zMU</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.4/3Dmol-min.js"></script>
    <style>
        :root {
            --p: #0a0f1e; --a: #22d3ee; --s: #00ff00; --d: #f87171;
        }

        body {
            background-color: var(--p);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0; padding: 20px;
        }

        .search-section {
            width: 100%; max-width: 600px;
            text-align: center; margin-bottom: 20px;
        }

        .input-group {
            display: flex; gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 10px; border-radius: 15px;
            border: 1px solid var(--a);
        }

        input {
            flex: 1; background: transparent; border: none;
            color: var(--s); font-size: 18px; outline: none; text-align: center;
        }

        button {
            background: var(--s); color: #000; border: none;
            padding: 10px 25px; border-radius: 10px;
            font-weight: bold; cursor: pointer;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px; width: 100%; max-width: 1000px;
        }

        #container-3d {
            height: 500px; background: #000;
            border-radius: 20px; border: 2px solid var(--a);
            position: relative;
        }

        /* MA'LUMOTLAR PANELI */
        .info-panel {
            background: rgba(15, 23, 42, 0.9);
            border-radius: 20px; border: 1px solid var(--s);
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }

        .info-card {
            border-bottom: 1px solid rgba(0, 255, 0, 0.2);
            padding-bottom: 10px;
        }

        .info-label { color: var(--a); font-size: 12px; text-transform: uppercase; }
        .info-value { font-size: 18px; font-weight: bold; color: #fff; margin-top: 5px; }

        @media (max-width: 800px) {
            .main-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="search-section">
    <h1 style="letter-spacing: 5px; text-shadow: 0 0 15px var(--a);">AL KIMYOGAR PRO</h1>
    <div class="input-group">
        <input type="text" id="mol-input" placeholder="Formula (H2O, C6H6, NaCl...)" onkeypress="if(event.key==='Enter') searchAll()">
        <button onclick="searchAll()">TAHLIL</button>
    </div>
</div>

<div class="main-layout">
    <div id="container-3d">
        <div id="mol-viewer" style="width:100%; height:100%;"></div>
    </div>

    <div class="info-panel" id="data-panel">
        <div style="text-align:center; color:var(--s); font-weight:bold; border-bottom: 2px solid var(--s); padding-bottom:10px;">XUSUSIYATLARI</div>
        <div class="info-card">
            <div class="info-label">Molyar Massa</div>
            <div id="val-mass" class="info-value">--</div>
        </div>
        <div class="info-card">
            <div class="info-label">Molekulyar Formula</div>
            <div id="val-form" class="info-value">--</div>
        </div>
        <div class="info-card">
            <div class="info-label">Zichlik</div>
            <div id="val-dens" class="info-value">--</div>
        </div>
        <div class="info-card">
            <div class="info-label">IUPAC Nomi</div>
            <div id="val-name" class="info-value" style="font-size:14px;">--</div>
        </div>
    </div>
</div>

<script>
    let viewer = null;

    async function searchAll() {
        const name = document.getElementById('mol-input').value.trim();
        if(!name) return;

        // 1. 3D Modelni yuklash
        load3D(name);
        
        // 2. Ma'lumotlarni PubChem JSON API orqali olish
        try {
            const res = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${name}/property/MolecularWeight,MolecularFormula,IUPACName/JSON`);
            const data = await res.json();
            const prop = data.PropertyTable.Properties[0];

            document.getElementById('val-mass').innerText = prop.MolecularWeight + " g/mol";
            document.getElementById('val-form').innerText = prop.MolecularFormula;
            document.getElementById('val-name').innerText = prop.IUPACName;
            
            // Zichlik odatda boshqa API qismida bo'ladi, biz uni taxminiy yoki qo'shimcha so'rov bilan olamiz
            document.getElementById('val-dens').innerText = "Ma'lumot mavjud emas";
        } catch (e) {
            console.log("Ma'lumot topilmadi");
        }
    }

    function load3D(input) {
        const viewerDiv = document.getElementById('mol-viewer');
        viewerDiv.innerHTML = '';
        viewer = $3Dmol.createViewer(viewerDiv, { backgroundColor: "black" });

        fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${input}/SDF?record_type=3d`)
            .then(r => r.text())
            .then(data => {
                viewer.addModel(data, "sdf");
                viewer.setStyle({}, { stick: { radius: 0.2 }, sphere: { scale: 0.3 } });
                viewer.zoomTo();
                viewer.render();
                viewer.spin(true);
            });
    }
</script>
</body>
</html>
