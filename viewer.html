<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Kimyogar 3Dmol | O'zMU</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.4/3Dmol-min.js"></script>
    <style>
        :root {
            --p: #0a0f1e; 
            --a: #22d3ee; 
            --s: #00ff00; 
            --d: #f87171;
        }

        body {
            background-color: var(--p);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .header h1 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 15px var(--a);
            margin-bottom: 25px;
        }

        .search-box {
            display: flex;
            width: 100%;
            max-width: 500px;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid rgba(34, 211, 238, 0.3);
            margin-bottom: 20px;
        }

        #molecule-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--s);
            font-size: 16px;
            padding: 10px;
            outline: none;
            text-align: center;
        }

        #search-btn {
            background: var(--s);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #search-btn:hover {
            box-shadow: 0 0 15px var(--s);
            transform: scale(1.05);
        }

        /* VIZUAL KONTEYNER */
        #container-3d {
            width: 100%;
            max-width: 600px;
            height: 400px;
            background: #000;
            border-radius: 20px;
            border: 2px solid var(--a);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.2);
        }

        #mol-viewer {
            width: 100%;
            height: 100%;
        }

        #status {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #666;
        }

        .hint {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>AL KIMYOGAR 3Dmol</h1>
</div>

<div class="search-box">
    <input type="text" id="molecule-input" placeholder="Formula yoki nom (H2O, Caffeine...)" onkeypress="if(event.key==='Enter') searchMolecule()">
    <button id="search-btn" onclick="searchMolecule()">QIDIRISH</button>
</div>

<div id="container-3d">
    <div id="mol-viewer"></div>
    <div id="status">Modda kiritilishini kutyapman...</div>
</div>

<p class="hint">Maslahat: Inglizcha nomlardan foydalaning (masalan: <b>Ethanol</b>, <b>Benzene</b>)</p>

<script>
    let glviewer = null;

    function searchMolecule() {
        const input = document.getElementById('molecule-input').value.trim();
        const status = document.getElementById('status');
        const viewerDiv = document.getElementById('mol-viewer');

        if (!input) return;

        status.innerText = `"${input}" yuklanmoqda...`;
        status.style.color = "var(--a)";

        // PubChem dan SDF formatida modelni olish (3D record bilan)
        const url = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${input}/SDF?record_type=3d`;

        fetch(url)
            .then(res => {
                if(!res.ok) throw new Error("Topilmadi");
                return res.text();
            })
            .then(data => {
                status.innerText = "Muvaffaqiyatli yuklandi ✓";
                status.style.color = "var(--s)";

                // Viewer-ni tozalash va yangilash
                viewerDiv.innerHTML = '';
                glviewer = $3Dmol.createViewer(viewerDiv, { backgroundColor: "black" });
                
                glviewer.addModel(data, "sdf");
                glviewer.setStyle({}, { stick: { radius: 0.2 }, sphere: { scale: 0.3 } });
                glviewer.zoomTo();
                glviewer.render();
                glviewer.spin(true);
            })
            .catch(err => {
                console.error(err);
                status.innerText = "Xato: Modda topilmadi yoki 3D modeli mavjud emas.";
                status.style.color = "var(--d)";
            });
    }
</script>
</body>
</html>
