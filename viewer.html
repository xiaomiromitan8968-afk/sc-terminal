<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Kimyogar Pro | Fixed Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.4/3Dmol-min.js"></script>
    <style>
        :root { --blue: #22d3ee; --green: #00ff00; --red: #ff4444; --bg: #050810; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; text-align: center; }
        .search-area { display: flex; gap: 5px; margin: 15px 0; flex-wrap: wrap; justify-content: center; }
        input { background: #000; border: 2px solid var(--blue); color: var(--green); padding: 12px; border-radius: 10px; flex: 1; min-width: 150px; }
        button { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-tahlil { background: var(--green); color: #000; }
        .btn-ar { background: #ff00ff; color: white; }
        
        .viewer-container { width: 100%; height: 350px; background: #000; border: 2px solid #1e293b; border-radius: 20px; position: relative; overflow: hidden; margin-bottom: 15px; }
        #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; display: none; z-index: 1; }
        #v-canvas { width: 100%; height: 100%; position: relative; z-index: 2; }
        #status { position: absolute; top: 10px; left: 10px; z-index: 10; font-size: 12px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color:var(--blue); margin: 10px 0;">AL KIMYOGAR PRO</h2>
        
        <div class="search-area">
            <input type="text" id="mol-input" placeholder="Masalan: Water, H2SO4">
            <button class="btn-ar" onclick="startAR()">AR YOQISH</button>
            <button class="btn-tahlil" onclick="doSearch()">TAHLIL</button>
        </div>

        <div class="viewer-container">
            <video id="webcam" autoplay playsinline></video>
            <div id="status">Tizim tayyor...</div>
            <div id="v-canvas"></div>
        </div>
    </div>

    <script>
        let viewer = null;

        // 1. ARNI YOQISH (Qidiruvdan mustaqil)
        async function startAR() {
            const video = document.getElementById('webcam');
            const status = document.getElementById('status');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.style.display = 'block';
                status.innerText = "AR Yoqildi";
                if(viewer) viewer.setBackgroundColor(0x000000, 0);
            } catch (err) {
                status.innerText = "Kamera xatosi!";
                alert("Kameraga ruxsat bering yoki HTTPS dan foydalaning!");
            }
        }

        // 2. STABIL QIDIRUV
        async function doSearch() {
            const name = document.getElementById('mol-input').value.trim();
            const status = document.getElementById('status');
            if(!name) return;

            status.innerText = "Qidirilmoqda...";
            try {
                // PubChem dan CID raqamini olish
                const r = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/name/${name}/cids/JSON`);
                const d = await r.json();
                if(!d.IdentifierList) throw "Topilmadi";
                const cid = d.IdentifierList.CID[0];

                // 3D Modelni yuklash
                const vDiv = document.getElementById('v-canvas');
                vDiv.innerHTML = "";
                viewer = $3Dmol.createViewer(vDiv, { backgroundColor: "black" });
                
                // AR yoqilgan bo'lsa shaffof qilish
                if(document.getElementById('webcam').style.display === 'block') {
                    viewer.setBackgroundColor(0x000000, 0);
                }

                const sdf = await fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/cid/${cid}/SDF?record_type=3d`).then(res => res.text());
                viewer.addModel(sdf, "sdf");
                viewer.setStyle({}, { stick: {radius:0.2}, sphere: {scale:0.3} });
                viewer.zoomTo(); viewer.render(); viewer.spin(true);
                
                status.innerText = "Topildi!";
            } catch (e) {
                status.innerText = "Xato: Topilmadi";
                console.error(e);
            }
        }
    </script>
</body>
</html>
