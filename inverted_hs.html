<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC_MALIKOV | INVERTED H&S</title>
    <style>
        :root { --neon: #00ff88; --red: #ff4444; --bg: #030303; --inv: #00d4ff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        #tv-chart { width: 100%; height: 45vh; border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .signal-card { background: rgba(0, 212, 255, 0.05); border: 1px solid rgba(0, 212, 255, 0.2); border-radius: 15px; padding: 15px; margin-top: 15px; border-left: 5px solid var(--inv); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
        .box { background: #111; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #222; }
        .box small { display: block; font-size: 9px; color: #888; margin-bottom: 4px; }
        .box b { font-size: 13px; color: var(--inv); }
        .back-btn { width: 100%; margin-top: 20px; padding: 15px; background: transparent; border: 1px solid #333; color: #fff; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <b id="pair-display">...</b>
        <span style="color: var(--inv); font-size: 11px; font-weight: bold;">INVERTED H&S (BULLISH)</span>
    </div>

    <div id="tv-chart"></div>

    <div class="signal-card">
        <div style="font-size: 11px; color: #888;">ANALIZ HOLATI:</div>
        <div id="status" style="font-weight: bold; margin: 5px 0; color: var(--inv);">AKKUMULATSIYA BOSQICHI...</div>
        
        <div class="grid">
            <div class="box"><small>NECKLINE (BUY ABOVE)</small><b id="neck-val">0.00</b></div>
            <div class="box"><small>UPSIDE TARGET</small><b id="target-val" style="color:var(--neon)">0.00</b></div>
        </div>
        
        <p style="font-size: 11px; color: #aaa; margin-top: 15px; line-height: 1.4;">
            <b>ESLATMA:</b> Bu juda kuchli "Bullish Reversal" figurasi. O'ng elka shakllangandan so'ng, yuqori chiziq yorib o'tilishini va hajm (volume) oshishini kuting.
        </p>
    </div>

    <button class="back-btn" onclick="window.history.back()">⬅ ORQAGA QAYTISH</button>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pair = urlParams.get('pair') || 'BINANCE:BTCUSDT';
        const tf = urlParams.get('tf') || '15';

        document.getElementById('pair-display').innerText = pair.split(':')[1];

        new TradingView.widget({
            "autosize": true, "symbol": pair, "interval": tf, "theme": "dark", "container_id": "tv-chart", "hide_side_toolbar": true
        });

        async function analyzeInvHS() {
            try {
                let sym = pair.split(':')[1].replace('XAUUSD', 'PAXGUSDT');
                let res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`);
                let data = await res.json();
                let price = parseFloat(data.price);
                let pD = pair.includes('EUR') ? 4 : 2;

                // Neckline va maqsadni simulyatsiya qilish
                let neckline = (price * 1.008).toFixed(pD); // Narxdan biroz tepada
                let target = (price * 1.035).toFixed(pD); // ~3.5% o'sish maqsad qilinadi

                document.getElementById('neck-val').innerText = neckline;
                document.getElementById('target-val').innerText = target;
                document.getElementById('status').innerText = "TESKARI BOSH-ELKA SHAKLLANMOQDA";

            } catch(e) { console.error("Inv HS Error"); }
        }

        setTimeout(analyzeInvHS, 2000);
    </script>
</body>
</html>
