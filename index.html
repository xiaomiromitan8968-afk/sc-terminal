<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV PRO</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { background: #000; color: #00ff88; font-family: sans-serif; margin: 0; padding: 0; }
        .page { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; flex-direction: column; align-items: center; justify-content: center; }
        .visible { display: flex !important; }
        .btn { 
            width: 100%; max-width: 300px; padding: 20px; margin: 10px; 
            background: #111; color: #00ff88; border: 2px solid #00ff88; 
            border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        #chart-container { width: 100%; height: 70vh; border-bottom: 2px solid #00ff88; }
        .info { padding: 15px; background: #111; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

<div id="p1" class="page visible">
    <h1>PARA TANLANG</h1>
    <button class="btn" onclick="go2('BINANCE:BTCUSDT')">BTC / USDT</button>
    <button class="btn" onclick="go2('OANDA:XAUUSD')">GOLD / USD</button>
    <button class="btn" onclick="go2('FX:EURUSD')">EUR / USD</button>
</div>

<div id="p2" class="page">
    <h1>TIMEFRAME</h1>
    <button class="btn" onclick="go3('15')">15 MINUT</button>
    <button class="btn" onclick="go3('60')">1 SOAT</button>
    <button class="btn" onclick="go3('240')">4 SOAT</button>
</div>

<div id="p3" class="page">
    <h1>STRATEGIYA</h1>
    <button class="btn" onclick="show('SMC')">SMC (BOS & CHOCh)</button>
    <button class="btn" onclick="show('PIN')">PIN-BAR (10-DARS)</button>
    <button class="btn" onclick="show('RET')">RETEST (15-DARS)</button>
</div>

<div id="p4" class="page" style="padding:0; justify-content: flex-start;">
    <div id="chart-container"></div>
    <div class="info" id="report">Tahlil qilinmoqda...</div>
    <button class="btn" onclick="location.reload()">QAYTA BOSHLASH</button>
</div>

<script>
    var sel = { p: '', t: '', s: '' };

    function go2(val) {
        sel.p = val;
        document.getElementById('p1').classList.remove('visible');
        document.getElementById('p2').classList.add('visible');
    }

    function go3(val) {
        sel.t = val;
        document.getElementById('p2').classList.remove('visible');
        document.getElementById('p3').classList.add('visible');
    }

    function show(val) {
        sel.s = val;
        document.getElementById('p3').classList.remove('visible');
        document.getElementById('p4').classList.add('visible');

        new TradingView.widget({
            "autosize": true, "symbol": sel.p, "interval": sel.t,
            "theme": "dark", "container_id": "chart-container", "locale": "uz"
        });

        setTimeout(function() {
            var txt = "<b>SMC Analizi:</b> PDF 15-betga asosan Liquidity olindi. ";
            if(sel.s == 'PIN') txt = "<b>Pin-bar Analizi:</b> 10-betdagi qoida bo'yicha trend qaytishi kutilmoqda. ";
            document.getElementById('report').innerHTML = "<b>SIGNAL:</b> BUY <br>" + txt;
        }, 2000);
    }
</script>

</body>
</html>
