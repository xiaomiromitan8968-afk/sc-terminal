<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | WIZARD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --neon: #00ff88; --blue: #00c2ff; --pink: #ff007f; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; min-height: 100vh; overflow: hidden; }
        .terminal { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; }
        .box { background: var(--glass); border: 1px solid var(--neon); border-radius: 15px; padding: 20px; text-align: center; margin-top: 15px; box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--blue); background: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; text-transform: uppercase; }
        .btn:active { background: var(--blue); color: black; transform: scale(0.98); }
        
        #chart-canvas { width: 100%; height: 260px; background: #000; border-radius: 12px; border: 1px solid #1a1a1a; margin-top: 15px; display: block; }
        
        .status-msg { color: var(--neon); font-size: 13px; margin: 15px 0; text-align: left; line-height: 1.5; padding: 10px; background: rgba(0, 255, 136, 0.05); border-radius: 8px; border-left: 3px solid var(--neon); }
        .signal-card { background: linear-gradient(135deg, rgba(0,194,255,0.1) 0%, rgba(0,255,136,0.1) 100%); padding: 15px; border-radius: 12px; border: 1px solid var(--blue); margin-top: 10px; text-align: left; }
        .loader { border: 3px solid #111; border-top: 3px solid var(--neon); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="color: var(--neon); text-align: center; letter-spacing: 3px; font-weight: 900; text-shadow: 0 0 10px var(--neon);">SC_MALIKOV</h2>

    <div id="step-1" class="box">
        <p style="font-size: 11px; opacity: 0.7;">BOSQICH-1: JUFTLIKNI TANLANG</p>
        <button class="btn" onclick="selectPair('BTCUSDT')">BTC / USDT</button>
        <button class="btn" onclick="selectPair('ETHUSDT')">ETH / USDT</button>
        <button class="btn" onclick="selectPair('PAXGUSDT')">XAU / USD (GOLD)</button>
    </div>

    <div id="step-2" class="box hidden">
        <p id="pair-display" style="color: var(--blue); font-weight: bold;"></p>
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
            <button class="btn" onclick="startAnalysis('1m')">M1</button>
            <button class="btn" onclick="startAnalysis('15m')">M15</button>
            <button class="btn" onclick="startAnalysis('1h')">H1</button>
            <button class="btn" onclick="startAnalysis('4h')">H4</button>
        </div>
        <button class="btn" style="border-color: var(--pink); margin-top: 15px;" onclick="location.reload()">ORQAGA</button>
    </div>

    <div id="step-3" class="box hidden">
        <div id="loader-box">
            <div class="loader"></div>
            <p style="font-size: 11px;">BOZOR TAHLIL QILINMOQDA...</p>
        </div>
        
        <div id="result-box" class="hidden">
            <canvas id="chart-canvas"></canvas>
            <div id="bot-message" class="status-msg"></div>
            <div id="signal-info" class="signal-card"></div>
            <button class="btn" style="margin-top: 15px; border-color: var(--neon);" onclick="location.reload()">YANGI TAHLIL</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let selectedPair = '';

    function selectPair(p) {
        selectedPair = p;
        document.getElementById('pair-display').innerText = "PARA: " + p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    async function startAnalysis(tf) {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');

        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${selectedPair}&interval=${tf}&limit=50`);
            const rawData = await res.json();
            
            const data = rawData.map(d => ({
                o: parseFloat(d[1]), h: parseFloat(d[2]), l: parseFloat(d[3]), c: parseFloat(d[4])
            }));

            renderFullTahlil(data);
        } catch (e) {
            document.getElementById('loader-box').innerHTML = "<p style='color:red'>Ulanishda xato! Hostingni tekshiring.</p>";
        }
    }

    function renderFullTahlil(data) {
        document.getElementById('loader-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');
        
        const canvas = document.getElementById('chart-canvas');
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
        
        const width = rect.width;
        const height = rect.height;

        const prices = data.map(d => [d.h, d.l]).flat();
        const min = Math.min(...prices);
        const max = Math.max(...prices);
        const range = max - min;

        const getX = (i) => (i / (data.length)) * width + (width / data.length / 2);
        const getY = (p) => height - 20 - ((p - min) / range) * (height - 40);

        // 1. SHAMCHALARNI CHIZISH
        const candleW = (width / data.length) * 0.7;
        data.forEach((d, i) => {
            const x = getX(i);
            const isBull = d.c >= d.o;
            ctx.strokeStyle = isBull ? '#00ff88' : '#ff007f';
            ctx.fillStyle = isBull ? '#00ff88' : '#ff007f';
            
            // Pilik
            ctx.beginPath();
            ctx.moveTo(x, getY(d.h));
            ctx.lineTo(x, getY(d.l));
            ctx.stroke();
            
            // Tana
            const bodyY1 = getY(d.o);
            const bodyY2 = getY(d.c);
            ctx.fillRect(x - candleW/2, Math.min(bodyY1, bodyY2), candleW, Math.abs(bodyY1 - bodyY2) || 1);
        });

        // 2. MADELNI TO'G'RI CHIZISH (Trend Line)
        // Oxirgi 20 ta shamchadan trendni aniqlash
        const last20 = data.slice(-20);
        const startIdx = data.length - 20;
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = '#00c2ff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(getX(startIdx), getY(last20[0].l));
        ctx.lineTo(getX(data.length - 1), getY(data[data.length - 1].c));
        ctx.stroke();
        ctx.setLineDash([]);

        // 3. SIGNAL MANTIQLARI
        const lastPrice = data[data.length - 1].c;
        const trend = data[data.length - 1].c > data[data.length - 10].c ? "O'suvchi" : "Tushuvchi";
        
        const botMsg = document.getElementById('bot-message');
        const signalBox = document.getElementById('signal-info');

        botMsg.innerText = `Bozorda hozirda ${trend} trend kuzatilmoqda va narx Trend Line ustida harakat qilyapti. Narx chiziqni tana bilan yorib o'tsa xabar beriladi.`;
        
        const tp = (lastPrice * 1.01618).toFixed(2);
        const sl = (lastPrice * 0.994).toFixed(2);

        signalBox.innerHTML = `
            <div style="font-weight: 900; color: var(--blue); margin-bottom: 5px;">📊 REAL-TIME SIGNAL</div>
            <div>🎯 TP (1.618): <span style="color: var(--neon)">${tp}</span></div>
            <div>🛑 SL (Fibo 0): <span style="color: var(--pink)">${sl}</span></div>
        `;
    }
</script>
</body>
</html>
