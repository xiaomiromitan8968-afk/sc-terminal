<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Kimyogar - Smart Chem AI</title>
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
    <style>
        :root {
            --p: #0a0f1e; 
            --a: #22d3ee; 
            --s: #00ff00; 
            --d: #f87171; 
            --key-bg: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--p);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Mobil qurilmada tepadan boshlash uchun */
            min-height: 100vh;
            transition: box-shadow 0.5s ease;
            padding: 10px;
        }

        /* --- O'zMU YONIB O'CHUVCHI YON PANEL --- */
        .ozmu-header {
            text-align: center;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 10px var(--a), 0 0 20px var(--a);
            margin-bottom: 20px;
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            from { opacity: 0.6; text-shadow: 0 0 5px var(--a); }
            to { opacity: 1; text-shadow: 0 0 20px var(--a), 0 0 40px var(--s); }
        }

        .card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 255, 0, 0.2);
            width: 100%;
            max-width: 500px; /* Mobil format uchun qulflash */
            border-radius: 20px; 
            padding: 20px;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.15);
            position: relative;
            transition: all 0.5s ease;
            display: flex;
            flex-direction: column;
            gap: 15px; /* Barcha elementlar orasidagi aniq masofa */
        }

        /* Issiqlik effektlari */
        .exothermic { box-shadow: inset 0 0 60px rgba(248, 113, 113, 0.4), 0 0 40px rgba(248, 113, 113, 0.2) !important; border-color: var(--d) !important; }
        .endothermic { box-shadow: inset 0 0 60px rgba(59, 130, 246, 0.4), 0 0 40px rgba(59, 130, 246, 0.2) !important; border-color: #3b82f6 !important; }

        .mode-switcher {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-mode {
            background: #1e293b;
            border: 1px solid var(--a);
            color: var(--a);
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-mode.active {
            background: var(--a);
            color: var(--p);
            box-shadow: 0 0 15px var(--a);
        }

        .screen {
            background: #000;
            border-radius: 15px;
            padding: 20px;
            border: 2px solid var(--s);
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        #display {
            font-size: 24px;
            color: var(--s);
            text-shadow: 0 0 10px var(--s);
            min-height: 35px;
            word-break: break-all;
            font-weight: bold;
        }

        #kb-input-container { display: none; }

        #manual-input {
            width: 100%;
            background: #000;
            border: 1px solid var(--a);
            color: var(--s);
            padding: 15px;
            border-radius: 12px;
            font-size: 18px;
            outline: none;
            text-align: center;
        }

        .zone {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 6px;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 15px;
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid rgba(0, 255, 0, 0.1);
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 12px 5px;
            cursor: pointer;
            color: #fff;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-el {
            background: var(--key-bg);
            border: 1px solid rgba(0, 255, 0, 0.3);
            font-size: 15px;
        }
        .btn-el span { display: block; font-size: 9px; opacity: 0.5; margin-top: 2px; }

        .btn-ai {
            background: linear-gradient(45deg, var(--a), #3b82f6);
            color: #fff;
            width: 100%;
            font-size: 20px;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.5);
        }

        .controls-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .btn-op { background: #475569; border: 1px solid var(--s); font-size: 16px; }
        .btn-res { background: var(--d); box-shadow: 0 0 15px var(--d); font-size: 16px; }

        /* --- NATIJALAR BLOKI (YANGI VA TARTIBLI) --- */
        #output-section {
            display: none;
            flex-direction: column;
            gap: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 12px;
            margin-top: 5px;
        }

        #res-box {
            padding: 15px;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 12px;
            border-left: 4px solid var(--s);
            font-size: 14px;
            line-height: 1.5;
        }

        #mol-3d-view {
            width: 100%;
            height: 220px; /* Aniq balandlik */
            border-radius: 12px;
            border: 1px solid var(--a);
            background: #000;
            overflow: hidden;
            display: none;
        }

        #visual-container {
            position: relative;
            width: 100%;
            height: 180px; /* Aniq balandlik */
            background: radial-gradient(circle, #0f172a 0%, #000 100%);
            border-radius: 12px;
            border: 1px solid rgba(34, 211, 238, 0.3);
            overflow: hidden;
            display: none;
        }

        #ph-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
            color: #fff;
            display: none;
            z-index: 10;
        }

        .molar-btn-container {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 10000;
            touch-action: none; 
        }

        .btn-molar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #0f172a;
            border: 2px solid #00ff00;
            color: #00ff00;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
        }
    </style>
</head>
<body>

<div class="molar-btn-container" id="draggable-mr">
    <button class="btn-molar">M<sub>r</sub></button>
</div>

<div class="card" id="mainCard">
    <div class="ozmu-header">O‘zMU</div>

    <div class="mode-switcher">
        <button id="mode-kb" class="btn-mode" onclick="switchMode('kb')">⌨️ KLAVIATURA</button>
        <button id="mode-grid" class="btn-mode active" onclick="switchMode('grid')">🧪 JADVAL</button>
    </div>

    <div class="screen">
        <div id="display">...</div>
        <div id="status" style="font-size: 11px; color: var(--a); margin-top: 8px; font-weight: bold;">TAYYOR</div>
    </div>

    <div id="kb-input-container">
        <input type="text" id="manual-input" placeholder="Masalan: NaOH + HCl" oninput="syncInput()">
    </div>

    <div id="grid-container">
        <div class="zone" id="el-keys"></div>
    </div>

    <div class="controls-row">
        <button class="btn-op" onclick="addChar(' + ')">+</button>
        <button class="btn-op" onclick="addChar('2')">2</button>
        <button class="btn-op" onclick="addChar('3')">3</button>
        <button class="btn-res" onclick="reset()">CLR</button>
    </div>

    <button class="btn-ai" onclick="askAI()">Tahlil Qilish ⚗️</button>

    <div id="output-section">
        <div id="res-box"></div>
        <div id="mol-3d-view"></div>
        <div id="visual-container">
            <canvas id="reactionCanvas"></canvas>
            <div id="ph-tag"></div>
        </div>
    </div>
</div>

<script>
    const KEY = "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";
    const URL = "https://api.groq.com/openai/v1/chat/completions";

    let currentInput = "";
    let currentMode = "grid";

    const elements = [
        {s:'H', n:'Vodorod'}, {s:'He', n:'Geliy'}, {s:'Li', n:'Litiy'}, {s:'Be', n:'Berilliy'}, {s:'B', n:'Bor'}, {s:'C', n:'Uglerod'}, {s:'N', n:'Azot'}, {s:'O', n:'Kislorod'}, {s:'F', n:'Ftor'}, {s:'Ne', n:'Neon'},
        {s:'Na', n:'Natriy'}, {s:'Mg', n:'Magniy'}, {s:'Al', n:'Alyuminiy'}, {s:'Si', n:'Kremniy'}, {s:'P', n:'Fosfor'}, {s:'S', n:'Oltingugurt'}, {s:'Cl', n:'Xlor'}, {s:'Ar', n:'Argon'},
        {s:'K', n:'Kaliy'}, {s:'Ca', n:'Kalsiy'}, {s:'Sc', n:'Skandiy'}, {s:'Ti', n:'Titan'}, {s:'V', n:'Vanadiy'}, {s:'Cr', n:'Xrom'}, {s:'Mn', n:'Marganes'}, {s:'Fe', n:'Temir'}, {s:'Co', n:'Kobalt'}, {s:'Ni', n:'Nikel'}, {s:'Cu', n:'Mis'}, {s:'Zn', n:'Rux'}, {s:'Ag', n:'Kumush'}, {s:'Au', n:'Oltin'}, {s:'Hg', n:'Simob'}, {s:'Pb', n:'Qorgoshin'}
    ];

    const keysDiv = document.getElementById('el-keys');
    elements.forEach(el => {
        const b = document.createElement('button');
        b.className = 'btn-el';
        b.innerHTML = `${el.s}<span>${el.n}</span>`;
        b.onclick = () => addChar(el.s);
        keysDiv.appendChild(b);
    });

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('mode-kb').classList.toggle('active', mode === 'kb');
        document.getElementById('mode-grid').classList.toggle('active', mode === 'grid');
        document.getElementById('kb-input-container').style.display = (mode === 'kb') ? 'block' : 'none';
        document.getElementById('grid-container').style.display = (mode === 'grid') ? 'block' : 'none';
    }

    function syncInput() {
        currentInput = document.getElementById('manual-input').value;
        document.getElementById('display').innerText = currentInput || "...";
    }

    function addChar(v) {
        if(currentInput === "" || document.getElementById('display').innerText.includes("→")) currentInput = "";
        currentInput += v;
        document.getElementById('display').innerText = currentInput;
        document.getElementById('manual-input').value = currentInput;
    }

    function reset() {
        currentInput = "";
        document.getElementById('display').innerText = "...";
        document.getElementById('manual-input').value = "";
        
        // Barcha natijalarni tozalash va yashirish
        document.getElementById('output-section').style.display = "none";
        document.getElementById('res-box').innerHTML = "";
        document.getElementById('mol-3d-view').style.display = "none";
        document.getElementById('visual-container').style.display = "none";
        
        document.getElementById('display').style.color = "var(--s)";
        document.getElementById('mainCard').className = "card";
        document.getElementById('status').innerText = "TAYYOR";
        cancelAnimationFrame(animationId);
    }

    function show3D(smiles) {
        if(!smiles) return;
        const view = document.getElementById('mol-3d-view');
        view.style.display = "block";
        view.innerHTML = "";
        let viewer = $3Dmol.createViewer(view, { backgroundColor: '#000000' });
        
        fetch(`https://cactus.nci.nih.gov/chemical/structure/${smiles}/sdf`)
            .then(res => res.text())
            .then(data => {
                viewer.addModel(data, "sdf");
                viewer.setStyle({}, { stick: { radius: 0.2 }, sphere: { scale: 0.3 } });
                viewer.zoomTo();
                viewer.render();
                viewer.spin(true);
            }).catch(e => {
                view.style.display = "none"; // Xato bo'lsa yashirish
            });
    }

    let canvas = document.getElementById('reactionCanvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    let animationId;

    class Particle {
        constructor(x, y, mode, color) {
            this.x = x; this.y = y; this.mode = mode;
            this.color = color || "rgba(255,255,255,0.8)";
            this.radius = Math.random() * 3 + 2;
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = mode === 'gas' ? (-Math.random() * 5 - 2) : (Math.random() * 2 + 1);
            this.opacity = 1;
            this.maxRadius = Math.random() * 25 + 15;
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color.replace('0.8', this.opacity); ctx.fill();
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if(this.mode === 'gas') {
                if(this.radius < this.maxRadius) this.radius += 0.3;
                this.opacity -= 0.005; this.vy += 0.015;
            } else {
                if(this.y > canvas.height - 5) { this.vy = 0; this.vx = 0; this.opacity -= 0.008; }
            }
        }
    }

    function startVisual(mode, color, env, heat) {
        const container = document.getElementById('visual-container');
        const phTag = document.getElementById('ph-tag');
        const card = document.getElementById('mainCard');
        
        container.style.display = "block";
        // Canvas o'lchamlarini konteynerga moslash
        canvas.width = container.clientWidth; 
        canvas.height = container.clientHeight;
        particles = [];
        
        card.className = "card " + (heat === "exothermic" ? "exothermic" : (heat === "endothermic" ? "endothermic" : ""));
        
        if(env && env !== "none") {
            phTag.style.display = "block"; 
            phTag.innerText = "MUHIT: " + env.toUpperCase();
            phTag.style.background = env === 'kislotali' ? '#f87171' : (env === 'ishqoriy' ? '#3b82f6' : '#10b981');
        } else {
            phTag.style.display = "none";
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(particles.length < 300) { // Mobil uchun optimizatsiya
                for(let i=0; i<6; i++) {
                    let px = mode === 'gas' ? (canvas.width/2 + (Math.random()-0.5)*40) : (Math.random()*canvas.width);
                    let py = mode === 'gas' ? (canvas.height*0.9) : 0;
                    particles.push(new Particle(px, py, mode, color));
                }
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if (particles[i].opacity <= 0) particles.splice(i, 1);
            }
            animationId = requestAnimationFrame(loop);
        }
        loop();
    }

    async function askAI() {
        if(!currentInput) return;
        const st = document.getElementById('status');
        st.innerText = "TAHLIL KETMOQDA...";
        
        // Natija chiqishidan oldin tozalash
        document.getElementById('output-section').style.display = "none";
        document.getElementById('mol-3d-view').style.display = "none";
        document.getElementById('visual-container').style.display = "none";

        try {
            const response = await fetch(URL, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{
                        role: "user", 
                        content: `Sen kimyogarsan. Reaksiyani tugalla: ${currentInput}. FAQAT JSON qaytar: {"t": "equation", "i": "explanation", "possible": true, "gas": true, "precipitate": true, "color": "hex_code", "env": "kislotali|ishqoriy|neytral", "heat": "exothermic|endothermic|none", "smiles": "SMILES_code_of_main_product"}.`
                    }],
                    response_format: { type: "json_object" }
                })
            });
            const data = await response.json();
            const res = JSON.parse(data.choices[0].message.content);
            
            if (!res.possible) {
                document.getElementById('display').innerText = "BU REAKSIYA BORMAYDI";
                document.getElementById('display').style.color = "var(--d)";
                st.innerText = "XATO";
            } else {
                document.getElementById('display').innerText = res.t;
                document.getElementById('display').style.color = "var(--s)";
                st.innerText = "TAYYOR";
                
                // Natijalar blokini ko'rsatish
                document.getElementById('output-section').style.display = "flex";
                document.getElementById('res-box').innerHTML = `<b>Xulosa:</b> ${res.i}`;
                
                if(res.smiles) show3D(res.smiles);

                if(res.gas) startVisual('gas', 'rgba(255,255,255,0.8)', res.env, res.heat);
                else if(res.precipitate) startVisual('precipitate', res.color, res.env, res.heat);
                else startVisual('none', null, res.env, res.heat);
            }
        } catch (e) { 
            st.innerText = "Xatolik yuz berdi. Internetni tekshiring."; 
        }
    }
</script>
</body>
</html>
