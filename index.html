<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WIZARD TERMINAL | NO-PYTHON</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --neon: #00ff88; --blue: #00c2ff; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        .terminal { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .box { width: 100%; max-width: 400px; background: var(--glass); border: 1px solid var(--neon); border-radius: 15px; padding: 20px; text-align: center; margin-top: 15px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid var(--blue); background: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn:active { background: var(--blue); color: black; }
        .grid-tf { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        #chart-container { width: 100%; height: 200px; margin-top: 10px; border-radius: 10px; overflow: hidden; }
        .status-msg { color: var(--neon); font-size: 14px; margin: 15px 0; text-align: left; line-height: 1.4; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="color: var(--neon); letter-spacing: 2px;">WIZARD TERMINAL</h2>

    <div id="step-1" class="box">
        <p>VALYUTA JUFTLIGINI TANLANG</p>
        <button class="btn" onclick="selectPair('BTCUSDT')">BTC / USDT</button>
        <button class="btn" onclick="selectPair('ETHUSDT')">ETH / USDT</button>
        <button class="btn" onclick="selectPair('XAUUSD')">GOLD (XAUUSD)</button>
    </div>

    <div id="step-2" class="box hidden">
        <p id="pair-name"></p>
        <div class="grid-tf">
            <button class="btn" style="padding: 10px;" onclick="analyze('15')">15M</button>
            <button class="btn" style="padding: 10px;" onclick="analyze('60')">1H</button>
            <button class="btn" style="padding: 10px;" onclick="analyze('240')">4H</button>
        </div>
        <button class="btn" style="border-color: #ff007f; margin-top: 10px;" onclick="location.reload()">ORQAGA</button>
    </div>

    <div id="step-3" class="box hidden">
        <div id="chart-container"></div>
        <div id="bot-message" class="status-msg"></div>
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="border-color: var(--neon);" onclick="subscribe()">HA</button>
            <button class="btn" style="border-color: #ff007f;" onclick="location.reload()">YO'Q</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let pair = ''; let tf = '';

    function selectPair(p) {
        pair = p;
        document.getElementById('pair-name').innerText = "Tanlandi: " + p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    async function analyze(selectedTf) {
        tf = selectedTf;
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');

        // Grafikka "qo'lda chizilgan" effektini berish
        const chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { backgroundColor: '#030303', textColor: '#d1d4dc' },
            grid: { vertLines: { visible: false }, horzLines: { visible: false } },
            rightPriceScale: { visible: false },
            timeScale: { visible: false },
        });
        const lineSeries = chart.addLineSeries({ color: '#00c2ff', lineWidth: 2 });
        
        // Simulyatsiya qilingan ma'lumotlar (Aslida buni API dan olasiz)
        const data = [
            { time: '2023-01-01', value: 10 }, { time: '2023-01-02', value: 12 },
            { time: '2023-01-03', value: 11 }, { time: '2023-01-04', value: 15 }
        ];
        lineSeries.setData(data);

        // Strategiyani aniqlash mantiqi (Sodda misol)
        let pattern = "o'suvchi Trend"; 
        document.getElementById('bot-message').innerText = `Hozirda bozorda ${pattern} mavjud va u Trend Line'da harakat qilyapti. Agar narx chiziqni tanasi bilan buzib yopilsa, xabar beraymi?`;
    }

    function subscribe() {
        tg.showConfirm("Kuzatuv yoqilsinmi? Narx tana bilan yopilsa xabar olasiz.", (ok) => {
            if(ok) {
                // Xabar yuborish mantiqi (Telegram Bot API orqali bevosita yuborish mumkin)
                tg.showAlert("Kuzatuv boshlandi! Fibo 1.618 TP va 0 SL o'rnatildi.");
                tg.close();
            }
        });
    }
</script>
</body>
</html>
