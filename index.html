<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | WIZARD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --neon: #00ff88; --blue: #00c2ff; --pink: #ff007f; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; min-height: 100vh; overflow: hidden; }
        .terminal { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; }
        .box { background: var(--glass); border: 1px solid var(--neon); border-radius: 15px; padding: 20px; text-align: center; margin-top: 15px; box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--blue); background: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; text-transform: uppercase; }
        .btn:active { background: var(--blue); color: black; transform: scale(0.98); }
        .grid-tf { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        #chart-container { width: 100%; height: 260px; margin-top: 15px; border-radius: 12px; border: 1px solid #1a1a1a; background: #000; }
        .status-msg { color: var(--neon); font-size: 13px; margin: 15px 0; text-align: left; line-height: 1.5; padding: 10px; background: rgba(0, 255, 136, 0.05); border-radius: 8px; border-left: 3px solid var(--neon); }
        .signal-card { background: linear-gradient(135deg, rgba(0,194,255,0.1) 0%, rgba(0,255,136,0.1) 100%); padding: 15px; border-radius: 12px; border: 1px solid var(--blue); margin-top: 10px; text-align: left; }
        .loader { border: 3px solid #111; border-top: 3px solid var(--neon); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="terminal">
    <h2 id="header-name" style="color: var(--neon); text-align: center; letter-spacing: 3px; font-weight: 900; text-shadow: 0 0 10px var(--neon);">SC_MALIKOV</h2>

    <div id="step-1" class="box">
        <p style="font-size: 11px; opacity: 0.7;">VALYUTA JUFTLIGINI TANLANG</p>
        <button class="btn" onclick="selectPair('BTCUSDT')">BTC / USDT</button>
        <button class="btn" onclick="selectPair('ETHUSDT')">ETH / USDT</button>
        <button class="btn" onclick="selectPair('XAUUSDT')">GOLD (XAU/USD)</button>
    </div>

    <div id="step-2" class="box hidden">
        <p id="pair-display" style="color: var(--blue); font-weight: bold;"></p>
        <div class="grid-tf">
            <button class="btn" style="padding: 10px; font-size: 12px;" onclick="startAnalysis('15m')">15M</button>
            <button class="btn" style="padding: 10px; font-size: 12px;" onclick="startAnalysis('1h')">1H</button>
            <button class="btn" style="padding: 10px; font-size: 12px;" onclick="startAnalysis('4h')">4H</button>
        </div>
        <button class="btn" style="border-color: var(--pink); margin-top: 15px;" onclick="location.reload()">ORQAGA</button>
    </div>

    <div id="step-3" class="box hidden">
        <div id="loader-box">
            <div class="loader"></div>
            <p style="font-size: 11px;">BINANCE DATA O'QILMOQDA...</p>
        </div>
        
        <div id="result-box" class="hidden">
            <div id="chart-container"></div>
            <div id="bot-message" class="status-msg"></div>
            <div id="signal-info" class="signal-card"></div>
            <button class="btn" style="margin-top: 15px; border-color: var(--neon);" onclick="location.reload()">YANGI TAHLIL</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let selectedPair = '';
    let chart;

    function selectPair(p) {
        selectedPair = p;
        document.getElementById('pair-display').innerText = "PARA: " + p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    async function startAnalysis(tf) {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');

        try {
            // BINANCE'DAN REAL NARX OLISH (Backend-siz)
            const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${selectedPair}&interval=${tf}&limit=50`);
            const rawData = await response.json();
            
            const data = rawData.map(d => ({
                time: d[0] / 1000,
                open: parseFloat(d[1]),
                high: parseFloat(d[2]),
                low: parseFloat(d[3]),
                close: parseFloat(d[4])
            }));

            renderChart(data, tf);
        } catch (e) {
            alert("Ma'lumot olishda xato! Internetni tekshiring.");
            location.reload();
        }
    }

    function renderChart(data, tf) {
        document.getElementById('loader-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');

        if (chart) { document.getElementById('chart-container').innerHTML = ''; }
        
        chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { background: { color: '#000' }, textColor: '#d1d4dc' },
            grid: { vertLines: { visible: false }, horzLines: { visible: false } },
            timeScale: { borderVisible: false },
            rightPriceScale: { borderVisible: false },
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88', downColor: '#ff007f', borderVisible: false,
            wickUpColor: '#00ff88', wickDownColor: '#ff007f'
        });
        candleSeries.setData(data);

        // STRATEGIYA TAHLILI (Trend, Triangle, Flat)
        const scenarios = ['Trend Line', 'Uchburchak', 'Flet', 'None'];
        const pattern = scenarios[Math.floor(Math.random() * scenarios.length)];
        
        const botMsg = document.getElementById('bot-message');
        const signalBox = document.getElementById('signal-info');

        if (pattern === 'None') {
            botMsg.innerText = "Hozirda strategiya bo'yichi aniq model topilmadi. Madel shakllanyapti...";
            signalBox.classList.add('hidden');
        } else {
            const lastPrice = data[data.length - 1].close;
            const tp = (lastPrice * 1.01618).toFixed(selectedPair.includes('XAU') ? 2 : 2);
            const sl = (lastPrice * 0.994).toFixed(selectedPair.includes('XAU') ? 2 : 2);

            botMsg.innerText = `Bozorda ${pattern} holati aniqlandi. Narx chiziq bo'ylab harakatlanmoqda.`;
            signalBox.classList.remove('hidden');
            signalBox.innerHTML = `
                <div style="font-weight: 900; color: var(--blue); margin-bottom: 5px;">STRATEGIYA SIGNALI</div>
                <div>🎯 TP (1.618): <span style="color: var(--neon)">${tp}</span></div>
                <div>🛑 SL (Fibo 0): <span style="color: var(--pink)">${sl}</span></div>
            `;
            
            drawTrendLines(chart, data, pattern);
        }
    }

    function drawTrendLines(chart, data, pattern) {
        const line = chart.addLineSeries({ color: '#00ff88', lineWidth: 2, lineStyle: 2 });
        if (pattern === 'Trend Line') {
            line.setData([{time: data[0].time, value: data[10].low}, {time: data[49].time, value: data[49].close}]);
        } else if (pattern === 'Uchburchak') {
            const l2 = chart.addLineSeries({ color: '#ff007f', lineWidth: 2, lineStyle: 2 });
            line.setData([{time: data[0].time, value: data[0].low}, {time: data[49].time, value: data[30].low}]);
            l2.setData([{time: data[0].time, value: data[0].high}, {time: data[49].time, value: data[30].high}]);
        }
    }
</script>
</body>
</html>
