<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | WIZARD TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #030303; --main-neon: #00ff88; --ai-glow: #00c2ff; --glass: rgba(255, 255, 255, 0.05);
        }
        body { margin: 0; background: var(--bg-deep); color: #fff; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        .terminal { width: 100%; height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .hidden { display: none !important; }
        .step-box { width: 90%; background: var(--glass); border: 1px solid var(--main-neon); border-radius: 15px; padding: 20px; text-align: center; }
        .btn { background: none; border: 1px solid var(--ai-glow); color: white; padding: 15px; margin: 10px; width: 80%; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn:active { background: var(--ai-glow); color: black; }
        .status-msg { color: var(--main-neon); font-size: 0.9em; margin-bottom: 15px; line-height: 1.5; }
        .analysis-img { width: 100%; border-radius: 10px; border: 1px solid #444; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="color: var(--main-neon); letter-spacing: 2px;">WIZARD TERMINAL</h2>

    <div id="step-1" class="step-box">
        <p>VALYUTA JUFTLIGINI TANLANG</p>
        <button class="btn" onclick="selectPair('BINANCE:BTCUSDT')">BTC / USD</button>
        <button class="btn" onclick="selectPair('FX:XAUUSD')">GOLD (XAUUSD)</button>
    </div>

    <div id="step-2" class="step-box hidden">
        <p id="selected-pair-text"></p>
        <p>TAYMFREYMNI TANLANG</p>
        <button class="btn" onclick="runAnalysis('15')">15 MINUT</button>
        <button class="btn" onclick="runAnalysis('60')">1 SOAT</button>
        <button class="btn" onclick="runAnalysis('240')">4 SOAT</button>
    </div>

    <div id="step-3" class="step-box hidden">
        <div id="loader">Tahlil qilinmoqda...</div>
        <div id="result-content" class="hidden">
            <img src="" id="chart-img" class="analysis-img" alt="Analiz">
            <div id="bot-msg" class="status-msg"></div>
            <button class="btn" style="border-color: var(--main-neon);" onclick="subscribe()">HA</button>
            <button class="btn" style="border-color: #ff007f;" onclick="location.reload()">YO'Q</button>
        </div>
    </div>
</div>

<script>
    let pair = ''; let tf = '';

    function selectPair(p) {
        pair = p;
        document.getElementById('selected-pair-text').innerText = "Tanlandi: " + p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    function runAnalysis(time) {
        tf = time;
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');

        // BOT TAHLILI (Simulyatsiya)
        setTimeout(() => {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('result-content').classList.remove('hidden');
            document.getElementById('chart-img').src = "https://via.placeholder.com/400x200/030303/00ff88?text=BTC+Trend+Line+Analysis";
            document.getElementById('bot-msg').innerText = "Hozirda bozorda o'suvchi Trend mavjud va u Trend Line'da harakat qilyapti. Agar narx chiziqni tanasi bilan buzib yopilsa, xabar beraymi?";
        }, 2000);
    }

    function subscribe() {
        alert("Siz obuna bo'ldingiz! Chiziq buzilsa, TP: 1.618 va SL: 0 darajalari bilan xabar yuboramiz.");
    }
</script>
</body>
</html>
