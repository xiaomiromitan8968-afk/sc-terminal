<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | WIZARD TERMINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --neon: #00ff88; --blue: #00c2ff; --pink: #ff007f; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .terminal { width: 100%; max-width: 420px; padding: 20px; box-sizing: border-box; }
        .box { background: var(--glass); border: 1px solid var(--neon); border-radius: 15px; padding: 20px; text-align: center; margin-top: 15px; box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 15px; margin: 8px 0; border: 1px solid var(--blue); background: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:active { background: var(--blue); color: black; transform: scale(0.98); }
        .grid-tf { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        #chart-container { width: 100%; height: 250px; margin-top: 15px; border-radius: 10px; border: 1px solid #222; position: relative; }
        .status-msg { color: var(--neon); font-size: 14px; margin: 15px 0; text-align: left; line-height: 1.5; border-left: 2px solid var(--neon); padding-left: 10px; }
        .signal-box { background: rgba(0, 255, 136, 0.1); padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 13px; text-align: left; }
        .loader { border: 3px solid #111; border-top: 3px solid var(--neon); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="color: var(--neon); text-align: center; letter-spacing: 2px; font-weight: 900;">WIZARD TERMINAL</h2>

    <div id="step-1" class="box">
        <p style="font-size: 13px; letter-spacing: 1px;">VALYUTA JUFTLIGINI TANLANG</p>
        <button class="btn" onclick="selectPair('BTCUSDT')">BTC / USDT</button>
        <button class="btn" onclick="selectPair('ETHUSDT')">ETH / USDT</button>
        <button class="btn" onclick="selectPair('XAUUSD')">XAU / USD (GOLD)</button>
    </div>

    <div id="step-2" class="box hidden">
        <p id="pair-display" style="color: var(--blue); font-weight: bold;"></p>
        <div class="grid-tf">
            <button class="btn" style="padding: 10px;" onclick="startAnalysis('15')">15M</button>
            <button class="btn" style="padding: 10px;" onclick="startAnalysis('60')">1H</button>
            <button class="btn" style="padding: 10px;" onclick="startAnalysis('240')">4H</button>
        </div>
        <button class="btn" style="border-color: var(--pink); margin-top: 15px;" onclick="location.reload()">ORQAGA</button>
    </div>

    <div id="step-3" class="box hidden">
        <div id="loader-box">
            <div class="loader"></div>
            <p>BOZOR TAHLIL QILINMOQDA...</p>
        </div>
        
        <div id="result-box" class="hidden">
            <div id="chart-container"></div>
            <div id="bot-message" class="status-msg"></div>
            <div id="signal-info" class="signal-box"></div>
            <button class="btn" style="margin-top: 15px;" onclick="location.reload()">YANGILASH</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let selectedPair = '';
    let chart;

    function selectPair(p) {
        selectedPair = p;
        document.getElementById('pair-display').innerText = "PARA: " + p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    async function startAnalysis(tf) {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');

        // TradingView dan ma'lumot olish simulyatsiyasi (Fetch orqali real API ulasa bo'ladi)
        setTimeout(() => {
            renderResult(tf);
        }, 2000);
    }

    function renderResult(tf) {
        document.getElementById('loader-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');

        // Grafikni yaratish
        if (chart) { document.getElementById('chart-container').innerHTML = ''; }
        chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { backgroundColor: 'transparent', textColor: '#d1d4dc' },
            grid: { vertLines: { visible: false }, horzLines: { visible: false } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderVisible: false },
            timeScale: { borderVisible: false },
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88', downColor: '#ff007f', borderVisible: false,
            wickUpColor: '#00ff88', wickDownColor: '#ff007f'
        });

        // Test uchun shamchalar (Data)
        const dummyData = generateDummyData();
        candleSeries.setData(dummyData);

        // Strategiya mantiqi (Tasodifiy model tanlash - Realda bu matematik hisoblanadi)
        const models = ['Trend Line', 'Uchburchak', 'Flet', 'None'];
        const pattern = models[Math.floor(Math.random() * models.length)];
        
        const botMsg = document.getElementById('bot-message');
        const signalBox = document.getElementById('signal-info');

        if (pattern === 'None') {
            botMsg.innerText = "Hozirda aniq model topilmadi. Model shakllanyapti...";
            signalBox.classList.add('hidden');
        } else {
            botMsg.innerText = `Bozorda ${pattern} holati aniqlandi. Narx chiziq bo'ylab harakatlanmoqda.`;
            signalBox.classList.remove('hidden');
            
            // Narx va Fibo hisobi
            const lastPrice = dummyData[dummyData.length - 1].close;
            const tp = (lastPrice * 1.01618).toFixed(2);
            const sl = (lastPrice * 0.995).toFixed(2); // 0 nuqtasi simulyatsiyasi

            signalBox.innerHTML = `
                <b style="color: var(--blue)">SIGNAL: BUY / SELL</b><br>
                🟢 TP (1.618): ${tp}<br>
                🔴 SL (0): ${sl}<br>
                ⚠️ Status: Line yorilishi kutilmoqda
            `;

            // Grafikda "qo'lda chizilgandek" chiziqlar
            drawManualLines(chart, dummyData, pattern);
        }
    }

    function drawManualLines(chart, data, pattern) {
        // Bu yerda grafik ustiga qo'shimcha chiziqlar chizish mantiqi
        const lineSeries = chart.addLineSeries({ color: '#00ff88', lineWidth: 2, lineStyle: 2 });
        if (pattern === 'Trend Line') {
            lineSeries.setData([
                { time: data[0].time, value: data[0].low },
                { time: data[data.length-1].time, value: data[data.length-1].close }
            ]);
        }
    }

    function generateDummyData() {
        const data = [];
        let time = new Date(Date.UTC(2023, 0, 1, 0, 0, 0));
        for (let i = 0; i < 50; i++) {
            data.push({
                time: time.getTime() / 1000,
                open: 20000 + i * 10,
                high: 20050 + i * 10,
                low: 19950 + i * 10,
                close: 20020 + i * 10
            });
            time.setMinutes(time.getMinutes() + 15);
        }
        return data;
    }
</script>
</body>
</html>
