<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Chem AI - Final</title>
    <style>
        :root { --p: #0f172a; --a: #38bdf8; --s: #4ade80; --d: #f87171; }
        body { background: var(--p); color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px; border-radius: 25px; padding: 20px; text-align: center; }
        .screen { background: #000; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; min-height: 80px; display: flex; flex-direction: column; justify-content: center; }
        #display { font-size: 24px; color: var(--s); margin-bottom: 5px; }
        #status { font-size: 10px; color: var(--a); font-weight: bold; }
        .grid { display: grid; grid-template-columns: 3fr 1fr; gap: 10px; }
        .elements { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .controls { display: flex; flex-direction: column; gap: 8px; }
        button { border: none; border-radius: 12px; padding: 15px 5px; cursor: pointer; color: #fff; font-weight: bold; transition: 0.2s; }
        .btn-el { background: #334155; }
        .btn-ai { background: var(--a); color: var(--p); height: 60px; }
        .btn-res { background: var(--d); }
        .btn-op { background: #475569; }
        #res-box { margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 10px; font-size: 13px; display: none; text-align: left; border-left: 4px solid var(--a); }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0 0 5px 0; font-size: 20px; color: var(--a);">SMART CHEM AI</h2>
    <p style="font-size: 10px; opacity: 0.5; margin-bottom: 15px;">National University of Uzbekistan</p>

    <div class="screen">
        <div id="display">...</div>
        <div id="status">TAYYOR</div>
    </div>

    <div class="grid">
        <div class="elements" id="el-keys"></div>
        <div class="controls">
            <button class="btn-ai" onclick="ask()">AI TAHLIL</button>
            <button class="btn-op" onclick="add(' + ')">+</button>
            <button class="btn-op" onclick="add('2')">2</button>
            <button class="btn-op" onclick="add('3')">3</button>
            <button class="btn-res" onclick="reset()">CLR</button>
        </div>
    </div>
    <div id="res-box"></div>
</div>

<script>
    const KEY = "AIzaSyDR7TGZxIZLm-odXszDoaqZXiNwYp2w3VA";
    // DIQQAT: Endpointni eng aniq versiyaga o'zgartirdik
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${KEY}`;

    let input = "";
    const els = ['H', 'O', 'Na', 'Cl', 'C', 'N', 'S', 'Fe', 'Cu', 'Al', 'Mg', 'K'];
    
    const keysDiv = document.getElementById('el-keys');
    els.forEach(e => {
        const b = document.createElement('button');
        b.className = 'btn-el';
        b.innerText = e;
        b.onclick = () => add(e);
        keysDiv.appendChild(b);
    });

    function add(v) {
        if(input === "" || document.getElementById('display').innerText.includes("→")) input = "";
        input += v;
        document.getElementById('display').innerText = input;
    }

    function reset() {
        input = "";
        document.getElementById('display').innerText = "...";
        document.getElementById('status').innerText = "TAYYOR";
        document.getElementById('res-box').style.display = "none";
    }

    async function ask() {
        if(!input) return;
        const st = document.getElementById('status');
        const box = document.getElementById('res-box');
        
        st.innerText = "ALOKA O'RNATILMOQDA...";
        
        try {
            const r = await fetch(URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: [{ text: `Sen kimyogarsan. Reaksiyani tugalla va muvozanatla: ${input}. FAQAT JSON qaytar: {"t": "tenglama", "i": "izoh"}` }] }] })
            });

            const d = await r.json();
            if(d.error) throw new Error(d.error.message);

            const txt = d.candidates[0].content.parts[0].text;
            const res = JSON.parse(txt.match(/\{.*\}/s)[0]);

            document.getElementById('display').innerText = res.t;
            st.innerText = "MUVAFFAQIYATLI!";
            box.innerHTML = `<b>Izoh:</b> ${res.i}`;
            box.style.display = "block";
        } catch (e) {
            st.innerText = "XATO: " + e.message;
            console.error(e);
        }
    }
</script>
</body>
</html>
