<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Chem - Kimyo Laboratoriyasi</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --bg: #f0f3f5;
        }
        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }
        .app-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 24px; }
        
        .display-area {
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
            border-radius: 12px;
            min-height: 80px;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #333;
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .key {
            padding: 15px 5px;
            border: none;
            background: #ecf0f1;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .key:hover { background: var(--accent); color: white; }
        .key.special { background: #dcdde1; }
        .key.action { background: var(--success); color: white; grid-column: span 2; }

        .history {
            border-top: 1px solid #eee;
            padding-top: 15px;
            font-size: 14px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1>Smart Chem Lab</h1>
        <p>Elementlarni tanlang va reaksiya hosil qiling</p>
    </div>

    <div id="display" class="display-area">Kiritishni boshlang...</div>

    <div class="keyboard">
        <button class="key" onclick="add('H')">H</button>
        <button class="key" onclick="add('O')">O</button>
        <button class="key" onclick="add('C')">C</button>
        <button class="key" onclick="add('N')">N</button>
        <button class="key" onclick="add('S')">S</button>
        
        <button class="key" onclick="add('Fe')">Fe</button>
        <button class="key" onclick="add('Cu')">Cu</button>
        <button class="key" onclick="add('Zn')">Zn</button>
        <button class="key" onclick="add('Na')">Na</button>
        <button class="key" onclick="add('Cl')">Cl</button>

        <button class="key special" onclick="add('2')">2</button>
        <button class="key special" onclick="add('3')">3</button>
        <button class="key special" onclick="add('4')">4</button>
        <button class="key special" onclick="add(' + ')">+</button>
        <button class="key special" onclick="backspace()">⌫</button>

        <button class="key action" onclick="process()">Reaksiyani ko'rish</button>
        <button class="key action" style="background:#e74c3c" onclick="clearAll()">Tozalash</button>
    </div>

    <div class="history">
        <strong>Status:</strong> <span id="status">Tayyor</span>
    </div>
</div>

<script>
    let currentInput = "";
    const display = document.getElementById('display');

    function add(char) {
        currentInput += char;
        updateDisplay();
    }

    function clearAll() {
        currentInput = "";
        updateDisplay();
    }

    function backspace() {
        currentInput = currentInput.slice(0, -1);
        updateDisplay();
    }

    function updateDisplay() {
        display.innerHTML = currentInput || "Kiritishni boshlang...";
    }

    function process() {
        const status = document.getElementById('status');
        if(currentInput.includes("H") && currentInput.includes("O")) {
            display.innerHTML = "2H₂ + O₂ → 2H₂O";
            status.innerText = "Reaksiya muvaffaqiyatli!";
        } else {
            status.innerText = "Noma'lum birikma. Algoritm tahlil qilmoqda...";
        }
    }
</script>

</body>
</html>
