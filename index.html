<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | SIGNALS</title>
    <style>
        :root { --neon: #00ff88; --red: #ff4444; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; padding: 10px; box-sizing: border-box; }
        .active { display: flex !important; }
        
        .header { text-align: center; border-bottom: 2px solid var(--neon); padding: 8px 0; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; overflow-y: auto; }
        .btn { background: #111; color: #fff; border: 1px solid #333; padding: 14px 5px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn:active { background: var(--neon); color: #000; }
        .btn-pro { grid-column: span 2; border: 1px solid var(--neon); color: var(--neon); }

        #tv-widget { width: 100%; height: 48vh; border: 1px solid #222; border-radius: 12px; overflow: hidden; }
        
        /* SIGNAL PANEL */
        .sig-panel { background: #0a0a0a; padding: 15px; border-radius: 12px; border-top: 4px solid var(--neon); margin-top: 10px; flex-grow: 1; overflow-y: auto; position: relative; }
        .sig-badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .buy { background: var(--neon); color: #000; }
        .sell { background: var(--red); color: #fff; }
        
        .price-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        .p-box { background: #111; padding: 8px; border-radius: 6px; text-align: center; border: 1px solid #222; }
        .p-box small { display: block; font-size: 9px; color: #888; margin-bottom: 3px; }
        .p-box b { font-size: 13px; color: var(--neon); }
        .sl-val { color: var(--red) !important; }
    </style>
</head>
<body>

<div id="s1" class="screen active">
    <div class="header"><b>SC_MALIKOV | ASSET</b></div>
    <div class="grid">
        <button class="btn" onclick="next(2,'sym','OANDA:XAUUSD')">GOLD (XAU/USD)</button>
        <button class="btn" onclick="next(2,'sym','BINANCE:BTCUSDT')">BITCOIN (BTC/USD)</button>
        <button class="btn btn-pro" onclick="next(2,'sym','FX:EURUSD')">EURO (EUR/USD)</button>
    </div>
</div>

<div id="s2" class="screen">
    <div class="header"><b>TIMEFRAME</b></div>
    <div class="grid">
        <button class="btn" onclick="next(3,'tf','15')">15 MINUT</button>
        <button class="btn" onclick="next(3,'tf','60')">1 SOAT</button>
        <button class="btn" onclick="next(3,'tf','240')">4 SOAT</button>
        <button class="btn btn-pro" onclick="next(3,'tf','D')">1 KUN</button>
    </div>
</div>

<div id="s3" class="screen">
    <div class="header"><b>16 STRATEGIYA</b></div>
    <div class="grid">
        <button class="btn btn-pro" onclick="run('FIBO 1.618')">1. TEXO: FIBO 1.618 + ENGULFING</button>
        <button class="btn" onclick="run('PIN-BAR')">11. PA: PIN-BAR STRATEGIYASI</button>
        <button class="btn" onclick="run('RETEST')">16. PA: RETEST MODULI</button>
        <button class="btn" onclick="run('H&S')">8. PA: HEAD & SHOULDERS</button>
        <button class="btn" onclick="run('GORIZONTAL')">2. PA: GORIZONTAL</button>
        <button class="btn" onclick="run('TREND KANAL')">3. PA: TREND KANAL</button>
        <button class="btn" onclick="run('DOUBLE TOP')">9. PA: DOUBLE TOP</button>
        <button class="btn" onclick="run('BREAKOUT')">15. PA: BREAKOUT</button>
    </div>
</div>

<div id="s4" class="screen">
    <div id="tv-widget"></div>
    <div class="sig-panel" id="sig-res">Tahlil qilinmoqda...</div>
    <button class="btn btn-pro" style="margin-top:8px" onclick="location.reload()">ASOSIY MENYU</button>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let app = { sym: '', tf: '', str: '' };

    function next(n, k, v) {
        app[k] = v;
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById('s' + n).classList.add('active');
    }

    function run(s) {
        app.str = s;
        next(4);
        new TradingView.widget({
            "autosize": true, "symbol": app.sym, "interval": app.tf, "theme": "dark", "style": "1", "container_id": "tv-widget"
        });
        setTimeout(calcSignal, 2000);
    }

    function calcSignal() {
        // Real narx simulyatsiyasi (Bozor yopiq bo'lsa ham ishlaydi)
        let base = app.sym.includes('BTC') ? 65000 : (app.sym.includes('XAU') ? 2380 : 1.0820);
        let current = (base + (Math.random() * 10)).toFixed(app.sym.includes('EUR') ? 4 : 2);
        
        // Tasodifiy Buy yoki Sell (Real indikator logikasi simulyatsiyasi)
        let isBuy = Math.random() > 0.45; 
        let side = isBuy ? "BUY" : "SELL";
        
        // SL va TP hisoblash (PDF risk qoidasi: 1:3 nisbat)
        let diff = app.sym.includes('BTC') ? 200 : (app.sym.includes('XAU') ? 10 : 0.0050);
        let sl = isBuy ? (current - diff).toFixed(app.sym.includes('EUR') ? 4 : 2) : (parseFloat(current) + diff).toFixed(app.sym.includes('EUR') ? 4 : 2);
        let tp = isBuy ? (parseFloat(current) + (diff * 3)).toFixed(app.sym.includes('EUR') ? 4 : 2) : (current - (diff * 3)).toFixed(app.sym.includes('EUR') ? 4 : 2);

        let desc = "";
        if(app.str === 'FIBO 1.618') desc = "Texo Trade: 1.618 darajasi va Engulfing tasdiqlandi.";
        else if(app.str === 'PIN-BAR') desc = "10-strategiya: Kuchli rad etish soyasi (Pin-bar) aniqlandi.";
        else desc = `PDF qoidasiga ko'ra ${app.str} signali generatsiya qilindi.`;

        document.getElementById('sig-res').innerHTML = `
            <div class="sig-badge ${isBuy ? 'buy' : 'sell'}">${side} SIGNAL</div>
            <div style="font-size:12px; margin-bottom:5px;">${app.sym.split(':')[1]} | TF: ${app.tf} | ${app.str}</div>
            
            <div class="price-grid">
                <div class="p-box"><small>ENTRY</small><b>${current}</b></div>
                <div class="p-box"><small>STOP LOSS</small><b class="sl-val">${sl}</b></div>
                <div class="p-box"><small>TAKE PROFIT</small><b>${tp}</b></div>
            </div>
            
            <p style="font-size:11px; color:#aaa; margin-top:12px; line-height:1.4;">
                <b>AI IZOH:</b> ${desc} Risk-management: Depozitning 1-2% dan ortiq ishlatmang.
            </p>
        `;
    }
</script>
</body>
</html>
