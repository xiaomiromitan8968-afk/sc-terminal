<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | GOLD V21</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #010101; --gold: #FFD700; --neon: #00ff88; --pink: #ff007f; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .terminal { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; }
        .box { background: var(--glass); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 15px; padding: 20px; text-align: center; margin-top: 15px; backdrop-filter: blur(10px); }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 14px; border: 1px solid var(--gold); background: none; color: white; border-radius: 10px; cursor: pointer; font-weight: 900; font-size: 11px; text-transform: uppercase; transition: 0.2s; margin: 5px 0; }
        .btn:active { background: var(--gold); color: #000; transform: scale(0.95); }
        #chart-canvas { width: 100%; height: 260px; background: #000; border-radius: 12px; border: 1px solid #1a1a1a; margin-top: 15px; }
        .signal-card { background: rgba(255, 215, 0, 0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--gold); margin-top: 10px; text-align: left; }
        .price-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-msg { color: var(--gold); font-size: 11px; margin: 10px 0; font-weight: bold; letter-spacing: 1px; text-align: left; border-left: 2px solid var(--gold); padding-left: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="color: var(--gold); text-align: center; font-weight: 900; letter-spacing: 4px; text-shadow: 0 0 10px rgba(255,215,0,0.3);">SC_MALIKOV</h2>

    <div id="step-1" class="box">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" onclick="selectPair('XAUUSDT')">GOLD (XAU)</button>
            <button class="btn" onclick="selectPair('BTCUSDT')">BTC / USDT</button>
            <button class="btn" onclick="selectPair('EURUSDT')">EUR / USD</button>
            <button class="btn" onclick="selectPair('SOLUSDT')">SOL / USDT</button>
        </div>
    </div>

    <div id="step-2" class="box hidden">
        <p id="pair-display" style="color: var(--gold); font-weight: 900;"></p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" onclick="startAnalysis('15m')">M15 (RECOM)</button>
            <button class="btn" onclick="startAnalysis('1h')">H1</button>
            <button class="btn" onclick="startAnalysis('4h')">H4</button>
            <button class="btn" onclick="startAnalysis('5m')">M5</button>
        </div>
    </div>

    <div id="step-3" class="box hidden">
        <div id="loader-box"><p style="font-size: 10px; color: var(--gold);">GOLD MARKET STRUCTURE TAHLILI...</p></div>
        <div id="result-box" class="hidden">
            <canvas id="chart-canvas"></canvas>
            <div id="bot-message" class="status-msg"></div>
            <div id="signal-info" class="signal-card"></div>
            <button class="btn" style="border-color: var(--pink); color: var(--pink); margin-top: 15px;" onclick="cancelSignal()">RESET ANALYSIS</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let selectedPair = '';
    let storageKey = '';

    function selectPair(p) {
        selectedPair = p;
        storageKey = `sc_gold_v21_${p}`;
        document.getElementById('pair-display').innerText = p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    async function startAnalysis(tf) {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${selectedPair}&interval=${tf}&limit=120`);
            const data = (await res.json()).map(d => ({ o: +d[1], h: +d[2], l: +d[3], c: +d[4] }));
            processGoldSMC(data);
        } catch (e) { alert("Data fetch error!"); }
    }

    function processGoldSMC(data) {
        document.getElementById('loader-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');

        const canvas = document.getElementById('chart-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth * 2; canvas.height = canvas.offsetHeight * 2;
        ctx.scale(2, 2);
        const w = canvas.offsetWidth, h = canvas.offsetHeight;

        const maxP = Math.max(...data.map(d => d.h)), minP = Math.min(...data.map(d => d.l));
        const getY = (p) => h - 40 - ((p - minP) / (maxP - minP)) * (h - 80);
        const getX = (i) => (i / data.length) * w;

        // 1. Gold uchun Pivotlar (Ko'proq oraliq bilan)
        let highs = [], lows = [];
        for (let i = 10; i < data.length - 2; i++) {
            if (data[i].h === Math.max(...data.slice(i-8, i+8).map(d => d.h))) highs.push({ idx: i, val: data[i].h });
            if (data[i].l === Math.min(...data.slice(i-8, i+8).map(d => d.l))) lows.push({ idx: i, val: data[i].l });
        }

        // Chizish (Candlesticks)
        data.forEach((d, i) => {
            ctx.strokeStyle = ctx.fillStyle = d.c >= d.o ? '#00ff88' : '#ff007f';
            const x = getX(i) + (w/data.length/2);
            ctx.beginPath(); ctx.moveTo(x, getY(d.h)); ctx.lineTo(x, getY(d.l)); ctx.stroke();
            ctx.fillRect(x - 1, Math.min(getY(d.o), getY(d.c)), 2, Math.max(Math.abs(getY(d.o) - getY(d.c)), 1));
        });

        // 2. Pattern Height Logic (Rasmlardagi vizual o'lcham)
        let patternHeight = 0;
        if (highs.length > 0 && lows.length > 0) {
            patternHeight = highs[0].val - lows[0].val; // Shaklning boshidagi kenglik (H)
        } else {
            patternHeight = (maxP - minP) * 0.4; // Default range
        }

        let resY = maxP, supY = minP;
        if (highs.length >= 2) {
            const h1 = highs[highs.length-2], h2 = highs[highs.length-1];
            resY = h1.val + ((h2.val - h1.val)/(h2.idx - h1.idx)) * (data.length - 1 - h1.idx);
            ctx.setLineDash([3,3]); ctx.strokeStyle = '#ff007f'; ctx.beginPath();
            ctx.moveTo(getX(h1.idx), getY(h1.val)); ctx.lineTo(w, getY(resY)); ctx.stroke();
        }
        if (lows.length >= 2) {
            const l1 = lows[lows.length-2], l2 = lows[lows.length-1];
            supY = l1.val + ((l2.val - l1.val)/(l2.idx - l1.idx)) * (data.length - 1 - l1.idx);
            ctx.setLineDash([3,3]); ctx.strokeStyle = '#00ff88'; ctx.beginPath();
            ctx.moveTo(getX(l1.idx), getY(l1.val)); ctx.lineTo(w, getY(supY)); ctx.stroke();
        }

        // 3. SIGNAL MATEMATIKASI (GOLD SPECIFIC)
        const last = data[data.length - 1];
        const precision = 2; // GOLD uchun har doim 2 xona
        let activeSignal = JSON.parse(localStorage.getItem(storageKey));

        if (!activeSignal) {
            if (last.c > resY + (patternHeight * 0.05)) { // Breakout tasdiqlanganda
                const entry = last.c;
                const tp = entry + (patternHeight * 0.9); // Rasmdagi H balandligi (TP)
                const sl = entry - (patternHeight * 0.4); // Mantiqiy SL (shakl ichiga qaytish)

                activeSignal = { type: "BUY", entry: entry, tp: +tp.toFixed(precision), sl: +sl.toFixed(precision) };
                localStorage.setItem(storageKey, JSON.stringify(activeSignal));
            } 
            else if (last.c < supY - (patternHeight * 0.05)) {
                const entry = last.c;
                const tp = entry - (patternHeight * 0.9);
                const sl = entry + (patternHeight * 0.4);

                activeSignal = { type: "SELL", entry: entry, tp: +tp.toFixed(precision), sl: +sl.toFixed(precision) };
                localStorage.setItem(storageKey, JSON.stringify(activeSignal));
            }
        }

        // Output
        if (activeSignal) {
            document.getElementById('bot-message').innerText = `GOLD ${activeSignal.type} SIGNAL DETECTED`;
            document.getElementById('signal-info').innerHTML = `
                <div style="color:var(--gold); font-weight:900; font-size:14px; margin-bottom:10px;">${activeSignal.type} SETUP</div>
                <div class="price-row"><span>ENTRY:</span> <b style="color:#fff;">${activeSignal.entry}</b></div>
                <div class="price-row"><span>TARGET (TP):</span> <b style="color:var(--neon);">${activeSignal.tp}</b></div>
                <div class="price-row" style="border:none;"><span>STOP LOSS:</span> <b style="color:var(--pink);">${activeSignal.sl}</b></div>
            `;
        } else {
            document.getElementById('bot-message').innerText = "GOLD: SCANNING BREAKOUT...";
            document.getElementById('signal-info').innerHTML = "<center style='opacity:0.3; font-size:10px;'>CHIZIQLAR BUZILISHINI KUTING...</center>";
        }
    }

    function cancelSignal() {
        localStorage.removeItem(storageKey);
        location.reload();
    }
</script>
</body>
</html>
