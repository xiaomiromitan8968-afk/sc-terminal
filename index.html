<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimyoviy Reaksiya Kalkulyatori</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
        }
        p {
            color: #7f8c8d;
            text-align: center;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input {
            padding: 12px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #3498db;
            outline: none;
        }
        button {
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #ecf0f1;
            border-left: 5px solid #27ae60;
            border-radius: 4px;
            min-height: 60px;
            display: flex;
            align-items: center;
            font-size: 18px;
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Kimyo yordamchisi</h1>
        <p>Reaksiyaga kirishuvchi moddalarni kiriting</p>
        
        <div class="input-group">
            <input type="text" id="reactionInput" placeholder="Masalan: Zn + H2SO4">
            <button onclick="calculateReaction()">Reaksiyani yozish</button>
        </div>

        <div id="resultBox" class="result-box">
            Natija bu yerda ko'rsatiladi...
        </div>
    </div>

    <script>
        function calculateReaction() {
            // Foydalanuvchi kiritgan ma'lumotni olish
            const input = document.getElementById('reactionInput').value.trim().toUpperCase();
            const resultBox = document.getElementById('resultBox');

            // Agar hech narsa kiritilmagan bo'lsa
            if (!input) {
                resultBox.innerHTML = "<span style='color: #e74c3c; font-size: 14px;'>Iltimos, avval moddalarni kiriting!</span>";
                return;
            }

            let output = "";

            // Hozircha sinov uchun bir nechta tayyor reaksiyalar (Keyin bu yerga haqiqiy algoritm ulaymiz)
            if (input === "H2 + O2" || input === "O2 + H2") {
                output = "2H<sub>2</sub> + O<sub>2</sub> &rarr; 2H<sub>2</sub>O";
            } 
            else if (input === "ZN + H2SO4") {
                output = "Zn + H<sub>2</sub>SO<sub>4</sub> &rarr; ZnSO<sub>4</sub> + H<sub>2</sub>&uarr;";
            } 
            else if (input === "NA + H2O") {
                output = "2Na + 2H<sub>2</sub>O &rarr; 2NaOH + H<sub>2</sub>&uarr;";
            }
            else {
                output = `${input} &rarr; <em>[Kutilayotgan mahsulotlarni topish uchun algoritm kiritilmagan]</em>`;
            }

            // Natijani ekranga chiqarish
            resultBox.innerHTML = `<strong>Tenglama:</strong> <br><br> ${output}`;
        }
    </script>

</body>
</html>
