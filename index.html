<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | V23</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #010101; --gold: #FFD700; --neon: #00ff88; --pink: #ff007f; --blue: #00c2ff; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .terminal { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; }
        .box { background: var(--glass); border: 1px solid rgba(0, 194, 255, 0.2); border-radius: 15px; padding: 20px; text-align: center; margin-top: 15px; backdrop-filter: blur(10px); }
        .hidden { display: none !important; }
        .pair-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn { width: 100%; padding: 12px; border: 1px solid var(--blue); background: none; color: white; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 10px; text-transform: uppercase; transition: 0.2s; }
        .btn:active { background: var(--blue); color: #000; transform: scale(0.96); }
        .btn-gold { border-color: var(--gold); color: var(--gold); font-weight: 900; }
        #chart-canvas { width: 100%; height: 260px; background: #000; border-radius: 12px; border: 1px solid #222; margin-top: 15px; }
        .signal-card { background: rgba(0, 255, 136, 0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--neon); margin-top: 10px; text-align: left; }
        .price-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
        .status-msg { color: var(--blue); font-size: 11px; margin: 10px 0; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; border-left: 3px solid var(--blue); padding-left: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="color: var(--neon); text-align: center; font-weight: 900; letter-spacing: 4px; text-shadow: 0 0 10px rgba(0,255,136,0.3);">SC_MALIKOV</h2>

    <div id="step-1" class="box">
        <p style="font-size: 9px; opacity: 0.6; margin-bottom: 10px;">INSTRUMENTNI TANLANG</p>
        <button class="btn btn-gold" style="margin-bottom: 10px;" onclick="selectPair('XAUUSDT')">🏆 GOLD (XAU/USD)</button>
        <div class="pair-grid">
            <button class="btn" onclick="selectPair('EURUSDT')">EUR/USD</button>
            <button class="btn" onclick="selectPair('GBPUSDT')">GBP/USD</button>
            <button class="btn" onclick="selectPair('USDJPY')">USD/JPY</button>
            <button class="btn" onclick="selectPair('AUDUSDT')">AUD/USD</button>
            <button class="btn" onclick="selectPair('USDCAD')">USD/CAD</button>
            <button class="btn" onclick="selectPair('BTCUSDT')">BTC/USDT</button>
        </div>
    </div>

    <div id="step-2" class="box hidden">
        <p id="pair-display" style="color: var(--neon); font-weight: 900;"></p>
        <div class="pair-grid">
            <button class="btn" onclick="startAnalysis('5m')">M5</button>
            <button class="btn" onclick="startAnalysis('15m')">M15</button>
            <button class="btn" onclick="startAnalysis('1h')">H1</button>
            <button class="btn" onclick="startAnalysis('4h')">H4</button>
        </div>
    </div>

    <div id="step-3" class="box hidden">
        <div id="loader-box" class="status-msg">TAHLIL QILINMOQDA...</div>
        <div id="result-box" class="hidden">
            <canvas id="chart-canvas"></canvas>
            <div id="bot-message" class="status-msg"></div>
            <div id="signal-info" class="signal-card"></div>
            <button class="btn" style="border-color: var(--pink); color: var(--pink); margin-top: 15px;" onclick="cancelSignal()">YANGI TAHLIL</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let selectedPair = '';
    let storageKey = '';

    function selectPair(p) {
        selectedPair = p;
        storageKey = `sc_v23_${p}`;
        document.getElementById('pair-display').innerText = p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    async function startAnalysis(tf) {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${selectedPair}&interval=${tf}&limit=120`);
            const data = (await res.json()).map(d => ({ o: +d[1], h: +d[2], l: +d[3], c: +d[4] }));
            processAdvancedLogic(data);
        } catch (e) { alert("API Error! Juftlik nomi yoki internetni tekshiring."); }
    }

    function processAdvancedLogic(data) {
        document.getElementById('loader-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');

        const canvas = document.getElementById('chart-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth * 2; canvas.height = canvas.offsetHeight * 2;
        ctx.scale(2, 2);
        const w = canvas.offsetWidth, h = canvas.offsetHeight;

        const maxP = Math.max(...data.map(d => d.h)), minP = Math.min(...data.map(d => d.l));
        const getY = (p) => h - 40 - ((p - minP) / (maxP - minP)) * (h - 80);
        const getX = (i) => (i / data.length) * w;

        // 1. Pivotlar (Pattern topish uchun)
        let highs = [], lows = [];
        for (let i = 5; i < data.length - 2; i++) {
            if (data[i].h === Math.max(...data.slice(i-4, i+4).map(d => d.h))) highs.push({ idx: i, val: data[i].h });
            if (data[i].l === Math.min(...data.slice(i-4, i+4).map(d => d.l))) lows.push({ idx: i, val: data[i].l });
        }

        // Shamchalar
        data.forEach((d, i) => {
            ctx.strokeStyle = ctx.fillStyle = d.c >= d.o ? '#00ff88' : '#ff007f';
            const x = getX(i) + (w/data.length/2);
            ctx.beginPath(); ctx.moveTo(x, getY(d.h)); ctx.lineTo(x, getY(d.l)); ctx.stroke();
            ctx.fillRect(x - 1, Math.min(getY(d.o), getY(d.c)), 2, Math.max(Math.abs(getY(d.o) - getY(d.c)), 1));
        });

        // 2. IMAGE-BASED H-TARGET LOGIC
        let patternH = (maxP - minP) * 0.4; 
        if (highs.length > 0 && lows.length > 0) patternH = highs[highs.length-1].val - lows[lows.length-1].val;

        let resY = maxP, supY = minP;
        if (highs.length >= 2) {
            const h1 = highs[highs.length-2], h2 = highs[highs.length-1];
            resY = h1.val + ((h2.val - h1.val)/(h2.idx - h1.idx)) * (data.length - 1 - h1.idx);
            ctx.setLineDash([3,3]); ctx.strokeStyle = '#ff007f'; ctx.beginPath();
            ctx.moveTo(getX(h1.idx), getY(h1.val)); ctx.lineTo(w, getY(resY)); ctx.stroke();
        }
        if (lows.length >= 2) {
            const l1 = lows[lows.length-2], l2 = lows[lows.length-1];
            supY = l1.val + ((l2.val - l1.val)/(l2.idx - l1.idx)) * (data.length - 1 - l1.idx);
            ctx.setLineDash([3,3]); ctx.strokeStyle = '#00ff88'; ctx.beginPath();
            ctx.moveTo(getX(l1.idx), getY(l1.val)); ctx.lineTo(w, getY(supY)); ctx.stroke();
        }

        // 3. SIGNAL MATEMATIKASI (Barcha juftliklar uchun moslashuvchan)
        const last = data[data.length - 1];
        const precision = selectedPair.includes('JPY') || selectedPair.includes('XAU') ? 2 : 5;
        let activeSignal = JSON.parse(localStorage.getItem(storageKey));

        if (!activeSignal) {
            if (last.c > resY) {
                const entry = last.c;
                activeSignal = { type: "BUY", entry: entry, tp: +(entry + (patternH * 0.9)).toFixed(precision), sl: +(entry - (patternH * 0.4)).toFixed(precision) };
            } else if (last.c < supY) {
                const entry = last.c;
                activeSignal = { type: "SELL", entry: entry, tp: +(entry - (patternH * 0.9)).toFixed(precision), sl: +(entry + (patternH * 0.4)).toFixed(precision) };
            }
            if(activeSignal) localStorage.setItem(storageKey, JSON.stringify(activeSignal));
        }

        // Result Render
        if (activeSignal) {
            document.getElementById('bot-message').innerText = "SIGNAL DETECTED";
            document.getElementById('signal-info').innerHTML = `
                <div style="font-weight:900; color:var(--neon); margin-bottom:10px;">${activeSignal.type} POSITION</div>
                <div class="price-row"><span>ENTRY:</span> <b style="color:#fff;">${activeSignal.entry}</b></div>
                <div class="price-row"><span>TARGET (TP):</span> <b style="color:var(--neon);">${activeSignal.tp}</b></div>
                <div class="price-row" style="border:none;"><span>STOP LOSS:</span> <b style="color:var(--pink);">${activeSignal.sl}</b></div>
            `;
        } else {
            document.getElementById('bot-message').innerText = "CONSOLIDATION: WAITING...";
            document.getElementById('signal-info').innerHTML = "<center style='opacity:0.3; font-size:10px;'>BREAKOUT SODIR BO'LISHINI KUTING...</center>";
        }
    }

    function cancelSignal() {
        localStorage.removeItem(storageKey);
        location.reload();
    }
</script>
</body>
</html>
