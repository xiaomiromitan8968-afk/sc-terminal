<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | V15</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #010101; --neon: #00ff88; --blue: #00c2ff; --pink: #ff007f; --glass: rgba(255, 255, 255, 0.03); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .terminal { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; }
        .box { background: var(--glass); border: 1px solid rgba(0, 255, 136, 0.2); border-radius: 15px; padding: 20px; text-align: center; margin-top: 15px; }
        .hidden { display: none !important; }
        .pair-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { width: 100%; padding: 12px; border: 1px solid var(--blue); background: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; transition: 0.2s; }
        .btn:active { background: var(--blue); color: #000; transform: scale(0.96); }
        #chart-canvas { width: 100%; height: 260px; background: #000; border-radius: 12px; border: 1px solid #1a1a1a; margin-top: 15px; }
        .status-msg { color: var(--neon); font-size: 12px; margin: 15px 0; text-align: left; padding: 10px; border-left: 3px solid var(--neon); background: rgba(0, 255, 136, 0.05); }
        .signal-card { background: rgba(0, 194, 255, 0.08); padding: 15px; border-radius: 12px; border: 1px solid var(--blue); margin-top: 10px; }
        .loader { border: 3px solid #111; border-top: 3px solid var(--neon); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .pattern-badge { display: inline-block; padding: 3px 8px; background: rgba(0, 194, 255, 0.2); color: var(--blue); border-radius: 5px; font-size: 9px; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="color: var(--neon); text-align: center; font-weight: 900; letter-spacing: 2px;">SC_MALIKOV</h2>

    <div id="step-1" class="box">
        <div class="pair-grid">
            <button class="btn" onclick="selectPair('EURUSDT')">EUR / USD</button>
            <button class="btn" onclick="selectPair('BTCUSDT')">BTC / USDT</button>
            <button class="btn" onclick="selectPair('SOLUSDT')">SOL / USDT</button>
            <button class="btn" onclick="selectPair('PAXGUSDT')">GOLD (XAU)</button>
        </div>
    </div>

    <div id="step-2" class="box hidden">
        <p id="pair-display" style="color: var(--blue); font-weight: 900;"></p>
        <div class="pair-grid">
            <button class="btn" onclick="startAnalysis('5m')">M5</button>
            <button class="btn" onclick="startAnalysis('15m')">M15</button>
            <button class="btn" onclick="startAnalysis('1h')">H1</button>
            <button class="btn" onclick="startAnalysis('4h')">H4</button>
        </div>
    </div>

    <div id="step-3" class="box hidden">
        <div id="loader-box"><div class="loader"></div><p style="font-size: 10px;">PATTERN VA TREND ANIQLANMOQDA...</p></div>
        <div id="result-box" class="hidden">
            <div id="pattern-name" class="pattern-badge">TAHLIL...</div>
            <canvas id="chart-canvas"></canvas>
            <div id="bot-message" class="status-msg"></div>
            <div id="signal-info" class="signal-card"></div>
            <button class="btn" style="margin-top: 15px; border-color: var(--pink);" onclick="cancelSignal()">YANGI TAHLIL (RESET)</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let selectedPair = '';
    let storageKey = '';

    function selectPair(p) {
        selectedPair = p;
        storageKey = `sc_signal_${p}`; // Har bir para uchun alohida xotira
        document.getElementById('pair-display').innerText = p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    async function startAnalysis(tf) {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${selectedPair}&interval=${tf}&limit=120`);
            const data = (await res.json()).map(d => ({ o: +d[1], h: +d[2], l: +d[3], c: +d[4] }));
            processAdvancedTrendline(data);
        } catch (e) { alert("Xatolik! Internetni tekshiring."); }
    }

    function processAdvancedTrendline(data) {
        document.getElementById('loader-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');

        // 1. Pivotlarni topish
        let highs = [], lows = [];
        for (let i = 2; i < data.length - 5; i++) {
            if (data[i].h > data[i-1].h && data[i].h > data[i-2].h && data[i].h > data[i+1].h && data[i].h > data[i+2].h) highs.push({ idx: i, val: data[i].h });
            if (data[i].l < data[i-1].l && data[i].l < data[i-2].l && data[i].l < data[i+1].l && data[i].l < data[i+2].l) lows.push({ idx: i, val: data[i].l });
        }

        const canvas = document.getElementById('chart-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth * 2; canvas.height = canvas.offsetHeight * 2;
        ctx.scale(2, 2);
        const w = canvas.offsetWidth, h = canvas.offsetHeight;

        const maxP = Math.max(...data.map(d => d.h)), minP = Math.min(...data.map(d => d.l));
        const getY = (p) => h - 40 - ((p - minP) / (maxP - minP)) * (h - 80);
        const getX = (i) => (i / data.length) * w;

        // Shamchalarni chizish
        data.forEach((d, i) => {
            const x = getX(i) + (w/data.length/2);
            ctx.strokeStyle = ctx.fillStyle = d.c >= d.o ? '#00ff88' : '#ff007f';
            ctx.beginPath(); ctx.moveTo(x, getY(d.h)); ctx.lineTo(x, getY(d.l)); ctx.stroke();
            ctx.fillRect(x - 1.5, Math.min(getY(d.o), getY(d.c)), 3, Math.max(Math.abs(getY(d.o) - getY(d.c)), 1));
        });

        // 2. PATTERN ANIQLASH (Flet, Uchburchak, Kanal)
        let getResY = () => maxP + 999; 
        let getSupY = () => minP - 999; 
        let patternName = "TREND KANALI";

        ctx.setLineDash([5, 5]); ctx.lineWidth = 2;

        let resSlope = 0, supSlope = 0;

        if (highs.length >= 2) {
            const h1 = highs[highs.length - 2], h2 = highs[highs.length - 1];
            resSlope = (h2.val - h1.val) / (h2.idx - h1.idx);
            getResY = (idx) => h1.val + resSlope * (idx - h1.idx);
            ctx.strokeStyle = '#ff007f'; ctx.beginPath(); ctx.moveTo(getX(h1.idx), getY(h1.val)); ctx.lineTo(w, getY(getResY(data.length - 1))); ctx.stroke();
        }

        if (lows.length >= 2) {
            const l1 = lows[lows.length - 2], l2 = lows[lows.length - 1];
            supSlope = (l2.val - l1.val) / (l2.idx - l1.idx);
            getSupY = (idx) => l1.val + supSlope * (idx - l1.idx);
            ctx.strokeStyle = '#00ff88'; ctx.beginPath(); ctx.moveTo(getX(l1.idx), getY(l1.val)); ctx.lineTo(w, getY(getSupY(data.length - 1))); ctx.stroke();
        }

        // Shaklni logikasi
        if (resSlope < 0 && supSlope > 0) patternName = "UCHBURCHAK (TRIANGLE)";
        else if (Math.abs(resSlope) < (maxP-minP)*0.001 && Math.abs(supSlope) < (maxP-minP)*0.001) patternName = "FLET (KONSOLIDATSIYA)";
        else if (resSlope > 0 && supSlope > 0) patternName = "O'SUVCHI KANAL (UP-TREND)";
        else if (resSlope < 0 && supSlope < 0) patternName = "TUSHUVCHI KANAL (DOWN-TREND)";

        document.getElementById('pattern-name').innerText = patternName;

        // 3. SIGNAL QULFLASH VA TEKSHIRISH
        const last = data[data.length - 1];
        const currentRes = getResY(data.length - 1);
        const currentSup = getSupY(data.length - 1);
        const precision = selectedPair.includes('EUR') ? 5 : 2;

        let activeSignal = JSON.parse(localStorage.getItem(storageKey));
        let msg = "Kutilmoqda. Buzilish sodir bo'lmadi.";
        let signalUI = `<div style="text-align:center; opacity:0.5;">WAITING BREAKOUT...</div>`;

        if (activeSignal) {
            // Agar oldin signal berilgan bo'lsa, TP/SL ni tekshiramiz
            let hitTP = false, hitSL = false;
            
            if (activeSignal.type === "BUY") {
                if (last.h >= activeSignal.tp) hitTP = true;
                if (last.l <= activeSignal.sl) hitSL = true;
            } else {
                if (last.l <= activeSignal.tp) hitTP = true;
                if (last.h >= activeSignal.sl) hitSL = true;
            }

            if (hitTP) {
                msg = "✅ TAKE PROFIT OLINDI! Foyda muborak.";
                signalUI = renderUI(activeSignal.type, activeSignal.entry, activeSignal.tp, activeSignal.sl, true);
                localStorage.removeItem(storageKey); // Signalni xotiradan tozalaymiz
            } else if (hitSL) {
                msg = "❌ STOP LOSS URIB KETDI.";
                signalUI = renderUI(activeSignal.type, activeSignal.entry, activeSignal.tp, activeSignal.sl, false, true);
                localStorage.removeItem(storageKey); // Tozalash
            } else {
                msg = "🔒 SIGNAL FAOL! TP yoki SL ga borish kutilmoqda...";
                signalUI = renderUI(activeSignal.type, activeSignal.entry, activeSignal.tp, activeSignal.sl);
            }
        } 
        else {
            // Agar signal yo'q bo'lsa va yangi buzilish bo'lsa
            if (last.c > currentRes && highs.length >= 2) {
                const fiboZero = minP; 
                const tp = (last.c + (last.c - fiboZero) * 0.618).toFixed(precision);
                
                activeSignal = { type: "BUY", entry: last.c, tp: parseFloat(tp), sl: parseFloat(fiboZero.toFixed(precision)) };
                localStorage.setItem(storageKey, JSON.stringify(activeSignal)); // XOTIRAGA SAQLASH
                
                msg = `🔥 ${patternName} BUZILDI! BUY SIGNAL SAQLANDI.`;
                signalUI = renderUI("BUY", activeSignal.entry, activeSignal.tp, activeSignal.sl);
            } 
            else if (last.c < currentSup && lows.length >= 2) {
                const fiboZero = maxP; 
                const tp = (last.c - (fiboZero - last.c) * 0.618).toFixed(precision);
                
                activeSignal = { type: "SELL", entry: last.c, tp: parseFloat(tp), sl: parseFloat(fiboZero.toFixed(precision)) };
                localStorage.setItem(storageKey, JSON.stringify(activeSignal)); // XOTIRAGA SAQLASH
                
                msg = `📉 ${patternName} BUZILDI! SELL SIGNAL SAQLANDI.`;
                signalUI = renderUI("SELL", activeSignal.entry, activeSignal.tp, activeSignal.sl);
            }
        }

        document.getElementById('bot-message').innerText = msg;
        document.getElementById('signal-info').innerHTML = signalUI;
    }

    function renderUI(type, ent, tp, sl, isTP = false, isSL = false) {
        let c = type === "BUY" ? "var(--neon)" : "var(--pink)";
        let titleColor = c;
        let titleText = `${type} SIGNAL FAOL`;

        if (isTP) { c = "#00ff88"; titleColor = "#00ff88"; titleText = "🎉 TAKE PROFIT HIT"; }
        if (isSL) { c = "#ff007f"; titleColor = "#ff007f"; titleText = "💔 STOP LOSS HIT"; }

        return `<div style="font-weight:900; color:${titleColor}; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px;">${titleText}</div>
            <div style="display:flex; justify-content:space-between; margin-top:10px; font-size:13px;">
                <span>ENTRY: <b>${ent}</b></span>
                <span style="color:${isTP ? '#00ff88' : 'var(--neon)'}">TP: <b>${tp}</b></span>
            </div>
            <div style="margin-top:5px; font-size:10px; opacity:0.7; color:${isSL ? '#ff007f' : 'white'}">STOP LOSS (0): ${sl}</div>`;
    }

    function cancelSignal() {
        localStorage.removeItem(storageKey);
        location.reload();
    }
</script>
</body>
</html>
