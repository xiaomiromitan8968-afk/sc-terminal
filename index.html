<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC_ MALIKOV - Slayd App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .slide-container {
            width: 80%;
            height: 70%;
            background: #1e1e1e;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        .slide {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .active {
            display: block;
        }

        h1 { color: #00d4ff; font-size: 3rem; }
        p { font-size: 1.5rem; color: #ccc; }

        .controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            background: #00d4ff;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #008fb3;
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="slide-container">
        <div class="slide active">
            <h1>Xush kelibsiz!</h1>
            <p>Bu sizning shaxsiy HTML mini slayd-shou ilovangiz.</p>
        </div>

        <div class="slide">
            <h1>Texnologiyalar</h1>
            <p>HTML, CSS va JavaScript yordamida yaratilgan.</p>
        </div>

        <div class="slide">
            <h1>Loyihalar</h1>
            <p>Bu yerga o'z ishlaringiz yoki ilmiy ishingiz haqida yozishingiz mumkin.</p>
        </div>

        <div class="controls">
            <button onclick="prevSlide()">Oldingi</button>
            <button onclick="nextSlide()">Keyingi</button>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll(".slide");

        function showSlide(index) {
            slides.forEach(s => s.classList.remove("active"));
            if (index >= slides.length) currentSlide = 0;
            if (index < 0) currentSlide = slides.length - 1;
            slides[currentSlide].classList.add("active");
        }

        function nextSlide() {
            currentSlide++;
            showSlide(currentSlide);
        }

        function prevSlide() {
            currentSlide--;
            showSlide(currentSlide);
        }

        // Klaviaturada boshqarish (chap/o'ng tugmalari)
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowRight") nextSlide();
            if (e.key === "ArrowLeft") prevSlide();
        });
    </script>
</body>
</html>
