<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | REAL-CORE</title>
    <style>
        :root { --neon: #00ff88; --red: #ff4444; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; padding: 10px; box-sizing: border-box; }
        .active { display: flex !important; }
        
        .header { text-align: center; border-bottom: 2px solid var(--neon); padding: 10px 0; margin-bottom: 10px; }
        .header b { font-size: 16px; color: var(--neon); letter-spacing: 1px; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; overflow-y: auto; flex-grow: 1; padding-bottom: 10px; }
        .btn { background: #111; color: #fff; border: 1px solid #333; padding: 15px 5px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn:active { background: var(--neon); color: #000; }
        .btn-pro { grid-column: span 2; border: 1px solid var(--neon); color: var(--neon); background: rgba(0, 255, 136, 0.05); }

        #tv-widget { width: 100%; height: 55vh; border: 1px solid #222; border-radius: 12px; overflow: hidden; }
        .analysis-card { background: #0a0a0a; padding: 15px; border-radius: 12px; border-top: 4px solid var(--neon); margin-top: 10px; flex-grow: 1; overflow-y: auto; }
        
        .row { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 8px 0; }
        .row span { color: #888; font-size: 11px; }
        .row b { color: var(--neon); font-size: 13px; }
    </style>
</head>
<body>

<div id="step1" class="screen active">
    <div class="header"><b>SC_MALIKOV | ASSET</b></div>
    <div class="btn-grid">
        <button class="btn" onclick="next(2, 'symbol', 'OANDA:XAUUSD')">GOLD (XAU/USD)</button>
        <button class="btn" onclick="next(2, 'symbol', 'BINANCE:BTCUSDT')">BITCOIN (BTC/USD)</button>
        <button class="btn btn-pro" onclick="next(2, 'symbol', 'FX:EURUSD')">EURO (EUR/USD)</button>
    </div>
</div>

<div id="step2" class="screen">
    <div class="header"><b>TIMEFRAME (M1-D1)</b></div>
    <div class="btn-grid">
        <button class="btn" onclick="next(3, 'tf', '1')">1 MINUT</button>
        <button class="btn" onclick="next(3, 'tf', '5')">5 MINUT</button>
        <button class="btn" onclick="next(3, 'tf', '15')">15 MINUT</button>
        <button class="btn" onclick="next(3, 'tf', '30')">30 MINUT</button>
        <button class="btn" onclick="next(3, 'tf', '60')">1 SOAT</button>
        <button class="btn" onclick="next(3, 'tf', '240')">4 SOAT</button>
        <button class="btn btn-pro" onclick="next(3, 'tf', 'D')">1 KUN (DAILY)</button>
    </div>
</div>

<div id="step3" class="screen">
    <div class="header"><b>16 TA STRATEGIYA</b></div>
    <div class="btn-grid">
        <button class="btn btn-pro" onclick="run('FIBO 1.618')">1. TEXO: FIBO 1.618 + ENGULFING</button>
        <button class="btn" onclick="run('GORIZONTAL')">2. PA: GORIZONTAL</button>
        <button class="btn" onclick="run('TREND KANAL')">3. PA: TREND KANAL</button>
        <button class="btn" onclick="run('SIMMETRIK')">4. PA: SIMMETRIK</button>
        <button class="btn" onclick="run('ASCENDING')">5. PA: ASCENDING</button>
        <button class="btn" onclick="run('DESCENDING')">6. PA: DESCENDING</button>
        <button class="btn" onclick="run('BAYROQ')">7. PA: BAYROQ</button>
        <button class="btn" onclick="run('H&S')">8. PA: H&S</button>
        <button class="btn" onclick="run('DOUBLE TOP')">9. PA: DOUBLE TOP</button>
        <button class="btn" onclick="run('WEDGE')">10. PA: WEDGE</button>
        <button class="btn" onclick="run('PIN-BAR')">11. PA: PIN-BAR</button>
        <button class="btn" onclick="run('ENGULFING')">12. PA: ENGULFING</button>
        <button class="btn" onclick="run('M-PATTERN')">13. PA: M-PATTERN</button>
        <button class="btn" onclick="run('W-PATTERN')">14. PA: W-PATTERN</button>
        <button class="btn" onclick="run('BREAKOUT')">15. PA: BREAKOUT</button>
        <button class="btn" onclick="run('RETEST')">16. PA: RETEST MODULI</button>
    </div>
</div>

<div id="step4" class="screen">
    <div id="tv-widget"></div>
    <div class="analysis-card" id="analysis-res">
        Tahlil qilinmoqda...
    </div>
    <button class="btn btn-pro" style="margin-top:10px" onclick="location.reload()">ASOSIY MENYU</button>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let config = { symbol: '', tf: '', strat: '' };

    function next(s, k, v) {
        config[k] = v;
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
    }

    function run(s) {
        config.strat = s;
        next(4);
        
        // TradingView Widget O'rnatish
        new TradingView.widget({
            "autosize": true,
            "symbol": config.symbol,
            "interval": config.tf,
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "tv-widget"
        });

        setTimeout(showFinalResult, 1500);
    }

    function showFinalResult() {
        let text = "";
        if(config.strat.includes('FIBO')) {
            text = "<b>PDF TAHLILI:</b> Texo Trade bo'yicha Engulfing tasdiqlandi. Fibo 1.618 darajasi kutilmoqda.";
        } else if(config.strat.includes('PIN')) {
            text = "<b>PDF TAHLILI:</b> 10-strategiya bo'yicha Pin-bar shakllandi. Trend o'zgarishi mumkin.";
        } else {
            text = `<b>AI TAHLILI:</b> ${config.strat} strategiyasi PDF qoidalariga ko'ra ko'rib chiqildi.`;
        }

        document.getElementById('analysis-res').innerHTML = `
            <div style="color:var(--neon); font-weight:bold; margin-bottom:10px;">${config.symbol.split(':')[1]} | TF: ${config.tf} | ${config.strat}</div>
            <div class="row"><span>BOZOR HOLATI</span><b>REAL-TIME LIVE</b></div>
            <div class="row"><span>VOLATILLIK</span><b>YUQORI</b></div>
            <p style="font-size:12px; color:#ccc; line-height:1.4; margin-top:10px;">${text}</p>
        `;
    }
</script>
</body>
</html>
