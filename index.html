<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WIZARD TERMINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --neon: #00ff88; --blue: #00c2ff; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; height: 100vh; overflow-y: auto; -webkit-tap-highlight-color: transparent; }
        .terminal { width: 100%; padding: 15px; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }
        .box { width: 100%; background: var(--glass); border: 1px solid var(--neon); border-radius: 12px; padding: 15px; text-align: center; margin-top: 15px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--blue); background: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn:active { background: var(--blue); color: black; transform: scale(0.98); }
        .grid-tf { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .status-text { color: var(--neon); font-size: 14px; margin: 15px 0; line-height: 1.4; text-align: left; }
        #analysis-plot { width: 100%; border-radius: 8px; margin-top: 10px; display: block; }
        .loader { border: 3px solid #333; border-top: 3px solid var(--neon); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="color: var(--neon); text-shadow: 0 0 10px rgba(0,255,136,0.3);">WIZARD TERMINAL</h2>

    <div id="step-1" class="box">
        <p style="font-weight: 700;">VALYUTA JUFTLIGINI TANLANG</p>
        <button class="btn" onclick="selectPair('BTCUSDT')">BTC / USDT</button>
        <button class="btn" onclick="selectPair('ETHUSDT')">ETH / USDT</button>
        <button class="btn" onclick="selectPair('XAUUSD')">XAU / USD (GOLD)</button>
    </div>

    <div id="step-2" class="box hidden">
        <p style="font-weight: 700;">TAYMFREYMNI TANLANG</p>
        <div class="grid-tf">
            <button class="btn" onclick="startBot('1m')">1M</button>
            <button class="btn" onclick="startBot('5m')">5M</button>
            <button class="btn" onclick="startBot('15m')">15M</button>
            <button class="btn" onclick="startBot('1h')">1H</button>
            <button class="btn" onclick="startBot('4h')">4H</button>
            <button class="btn" onclick="startBot('1d')">1D</button>
        </div>
        <button class="btn" style="border-color: #ff007f; margin-top: 15px;" onclick="goBack()">ORQAGA</button>
    </div>

    <div id="step-3" class="box hidden">
        <div id="loading-ui">
            <div class="loader"></div>
            <p>BOZORNI TAHLIL QILISH...</p>
        </div>
        <div id="result-ui" class="hidden">
            <img id="analysis-plot" src="" alt="Market Analysis">
            <div id="bot-message" class="status-text"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="border-color: var(--neon);" onclick="confirmTracking()">HA</button>
                <button class="btn" style="border-color: #ff007f;" onclick="goBack()">YO'Q</button>
            </div>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); // Ilovani to'liq ekranga yoyish

    let selectedPair = '';
    let selectedTF = '';

    function selectPair(p) {
        selectedPair = p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    function goBack() {
        document.querySelectorAll('.box').forEach(el => el.classList.add('hidden'));
        document.getElementById('step-1').classList.remove('hidden');
    }

    async function startBot(tf) {
        selectedTF = tf;
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');
        document.getElementById('loading-ui').classList.remove('hidden');
        document.getElementById('result-ui').classList.add('hidden');

        try {
            // BACKEND URL ni bu yerga qo'ying
            const response = await fetch('https://SIZNING-SERVERINGIZ.com/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pair: selectedPair, tf: selectedTF })
            });
            const data = await response.json();
            
            document.getElementById('loading-ui').classList.add('hidden');
            document.getElementById('result-ui').classList.remove('hidden');
            
            document.getElementById('bot-message').innerText = data.message;
            document.getElementById('analysis-plot').src = "data:image/png;base64," + data.image;
        } catch (e) {
            tg.showAlert("Backend bilan aloqa o'rnatib bo'lmadi!");
            goBack();
        }
    }

    function confirmTracking() {
        tg.showConfirm("Bot ushbu modelni kuzatishni boshlasinmi?", (isConfirmed) => {
            if (isConfirmed) {
                tg.sendData(JSON.stringify({action: "subscribe", pair: selectedPair, tf: selectedTF}));
                tg.close(); // Ma'lumotni botga yuborib yopadi
            }
        });
    }
</script>
</body>
</html>
