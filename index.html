<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | PRO TERMINAL</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --neon: #00ff88; --red: #ff3333; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .active { display: flex !important; }
        h2 { color: var(--neon); text-align: center; font-size: 18px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Grid tizimi 16 ta strategiya uchun */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; overflow-y: auto; padding-bottom: 20px; }
        .btn { 
            background: #111; color: var(--neon); border: 1px solid #333; padding: 12px 5px; 
            border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; text-align: center;
        }
        .btn:active { background: var(--neon); color: #000; border-color: var(--neon); }
        .btn-smc { grid-column: span 2; background: rgba(0, 255, 136, 0.1); border: 1px solid var(--neon); font-size: 13px; }

        /* Analiz qismi */
        #chart-res { width: 100%; height: 45vh; border: 1px solid #222; }
        .report { background: #0a0a0a; padding: 12px; border-top: 2px solid var(--neon); flex-grow: 1; font-size: 12px; line-height: 1.4; overflow-y: auto; }
        .price-box { display: flex; justify-content: space-around; background: #111; padding: 10px; border-radius: 8px; margin: 10px 0; border: 1px dashed #444; }
    </style>
</head>
<body>

<div id="p1" class="screen active">
    <h2>1. VALYUTA PARASI</h2>
    <div class="grid">
        <button class="btn" onclick="next(2,'pair','BTCUSDT')">BTC / USDT</button>
        <button class="btn" onclick="next(2,'pair','XAUUSD')">GOLD (XAU)</button>
        <button class="btn" onclick="next(2,'pair','EURUSD')">EUR / USD</button>
        <button class="btn" onclick="next(2,'pair','ETHUSDT')">ETH / USDT</button>
    </div>
</div>

<div id="p2" class="screen">
    <h2>2. TIMEFRAME</h2>
    <div class="grid">
        <button class="btn" onclick="next(3,'tf','15m')">15 MINUT</button>
        <button class="btn" onclick="next(3,'tf','1h')">1 SOAT</button>
        <button class="btn" onclick="next(3,'tf','4h')">4 SOAT</button>
        <button class="btn" onclick="next(3,'tf','1D')">1 KUN</button>
    </div>
</div>

<div id="p3" class="screen">
    <h2>3. STRATEGIYANI TANLANG</h2>
    <div class="grid">
        <button class="btn btn-smc" onclick="run('SMC')">16. SC_MALIKOV SMC (BOS/ChoCh)</button>
        <button class="btn" onclick="run('1')">1. GORIZONTAL LINIYA</button>
        <button class="btn" onclick="run('2')">2. TREND KANALLARI</button>
        <button class="btn" onclick="run('3')">3. SIMMETRIK UCHBURCHAK</button>
        <button class="btn" onclick="run('4')">4. O'SUVCHI UCHBURCHAK</button>
        <button class="btn" onclick="run('5')">5. PASAYUVCHI UCHBURCHAK</button>
        <button class="btn" onclick="run('6')">6. BAYROQ (FLAG)</button>
        <button class="btn" onclick="run('7')">7. HEAD AND SHOULDERS</button>
        <button class="btn" onclick="run('8')">8. DOUBLE TOP/BOTTOM</button>
        <button class="btn" onclick="run('9')">9. LIMON (WEDGE)</button>
        <button class="btn" onclick="run('10')">10. PIN-BAR</button>
        <button class="btn" onclick="run('11')">11. ENGULFING</button>
        <button class="btn" onclick="run('12')">12. OUTSIDE BAR</button>
        <button class="btn" onclick="run('13')">13. INSIDE BAR</button>
        <button class="btn" onclick="run('14')">14. FAKEOUT (YOLG'ON)</button>
        <button class="btn" onclick="run('15')">15. RETEST STRATEGIYASI</button>
    </div>
</div>

<div id="p4" class="screen" style="padding:0;">
    <div id="chart-res"></div>
    <div class="report" id="report">
        AI Tahlil qilmoqda...
    </div>
    <button class="btn" onclick="location.reload()" style="margin: 10px;">QAYTA BOSHLASH</button>
</div>

<script>
    let state = { pair: '', tf: '', strat: '' };

    function next(s, k, v) {
        state[k] = v;
        document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
        document.getElementById('p' + s).classList.add('active');
    }

    function run(s) {
        state.strat = s;
        next(4);
        setTimeout(initAnalysis, 500);
    }

    function initAnalysis() {
        const container = document.getElementById('chart-res');
        const chart = LightweightCharts.createChart(container, {
            layout: { background: { color: '#000' }, textColor: '#00ff88' },
            grid: { vertLines: { color: '#111' }, horzLines: { color: '#111' } },
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88', downColor: '#ff3333', borderVisible: false, wickUpColor: '#00ff88', wickDownColor: '#ff3333'
        });

        // Grafik ma'lumotlarini yasash
        let data = [];
        let price = 50000;
        for(let i=0; i<100; i++) {
            let open = price;
            let close = open + (Math.random() - 0.5) * 200;
            data.push({ time: i * 86400, open: open, high: Math.max(open,close)+50, low: Math.min(open,close)-50, close: close });
            price = close;
        }
        candleSeries.setData(data);

        // STRATEGIYAGA QARAB CHIZISH
        let desc = "";
        let entry = data[99].close.toFixed(2);
        
        if(state.strat === 'SMC') {
            candleSeries.createPriceLine({ price: data[80].high, color: '#ff3333', title: 'BOS' });
            candleSeries.createPriceLine({ price: data[90].low, color: '#00ff88', title: 'ChoCh' });
            desc = "SMC ANALIZ: Liquidity olindi. BOS va ChoCh tasdiqlandi. Kirish nuqtasi Order Block zonasida.";
        } else if(state.strat === '10') {
            candleSeries.setMarkers([{ time: data[99].time, position: 'aboveBar', color: '#ff3333', shape: 'arrowDown', text: 'PIN-BAR' }]);
            desc = "PDF 10-BET: Kuchli Pin-bar shakllandi. Trend qaytishi kutilmoqda.";
        } else {
            candleSeries.createPriceLine({ price: data[95].high, color: '#888', title: 'Pattern Line' });
            desc = "PDF ANALIZ: Tanlangan strategiya bo'yicha grafikda pattern aniqlandi. Retest kutish tavsiya etiladi.";
        }

        document.getElementById('report').innerHTML = `
            <div style="color:var(--neon); font-weight:bold; border-bottom:1px solid #333; pb:5px;">
                ${state.pair} | ${state.tf} | STRATEGIYA: ${state.strat}
            </div>
            <div class="price-box">
                <div style="color:#fff">ENTRY<br><b>${entry}</b></div>
                <div style="color:var(--red)">S/L<br><b>${(entry*0.99).toFixed(2)}</b></div>
                <div style="color:var(--neon)">T/P<br><b>${(entry*1.02).toFixed(2)}</b></div>
            </div>
            <p>${desc}</p>
        `;
    }
</script>
</body>
</html>
