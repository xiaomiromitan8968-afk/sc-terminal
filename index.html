<div id="p5" class="page">
    <div class="result-box">
        <h3 id="res-sig" style="text-align:center;"></h3>
        <p class="label">STRATEGIYA: <span id="res-strat" style="color:var(--neon);"></span></p>
        
        <div id="diagram-container" style="background: #111; border: 1px dashed #333; margin: 10px 0; border-radius: 10px; position: relative;">
            <canvas id="strategyCanvas" width="300" height="200" style="width:100%; height:auto;"></canvas>
            <div id="diag-label" style="position:absolute; top:5px; right:10px; font-size:10px; color:#555;">SC_ MALIKOV VISUALIZER</div>
        </div>

        <hr style="border:0; border-top:1px solid #222;">
        <div style="display:flex; justify-content:space-between;">
            <span class="label">ENTRY:</span> <span class="val" id="res-ent"></span>
        </div>
        <div style="display:flex; justify-content:space-between;">
            <span class="label">TP (1.618):</span> <span class="val" id="res-tp" style="color:var(--neon);"></span>
        </div>
        <div style="display:flex; justify-content:space-between;">
            <span class="label">STOP LOSS:</span> <span class="val" id="res-sl" style="color:#ff4444;"></span>
        </div>
        <button class="btn" style="width:100%; margin-top:15px;" onclick="location.reload()">YANGI TAHLIL</button>
    </div>
</div>

<script>
// Sxematik rasmni chizish funksiyasi
function drawStrategyDiagram(type, signalType, entry, tp, sl) {
    const canvas = document.getElementById('strategyCanvas');
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const color = signalType === 'BUY' ? '#00ffcc' : '#ff4444';
    ctx.lineWidth = 2;

    if (type === 'SC_PRO') { // Engulfing chizmasi
        // Birinchi sham (kichik)
        ctx.strokeStyle = signalType === 'BUY' ? '#ff4444' : '#00ffcc';
        ctx.strokeRect(80, 80, 30, 40);
        // Ikkinchi sham (yutib yuboruvchi katta)
        ctx.fillStyle = color;
        if(signalType === 'BUY') ctx.fillRect(120, 50, 35, 90);
        else ctx.fillRect(120, 80, 35, 90);
    } 
    else if (type === 'PINBAR') { // Pin Bar chizmasi
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        if (signalType === 'BUY') {
            ctx.beginPath(); ctx.moveTo(150, 50); ctx.lineTo(150, 160); ctx.stroke(); // Uzun soya
            ctx.fillRect(135, 50, 30, 20); // Tana tepada
        } else {
            ctx.beginPath(); ctx.moveTo(150, 40); ctx.lineTo(150, 150); ctx.stroke(); // Uzun soya
            ctx.fillRect(135, 130, 30, 20); // Tana pastda
        }
    }

    // Narx chiziqlari (Xuddi rasmda ko'rsatilgandek)
    ctx.setLineDash([5, 5]);
    // Entry
    ctx.strokeStyle = '#fff'; ctx.beginPath(); ctx.moveTo(160, 90); ctx.lineTo(280, 90); ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.fillText('ENTRY', 230, 85);
    // TP
    ctx.strokeStyle = '#00ffcc'; ctx.beginPath(); ctx.moveTo(160, 40); ctx.lineTo(280, 40); ctx.stroke();
    ctx.fillStyle = '#00ffcc'; ctx.fillText('TP', 230, 35);
    // SL
    ctx.strokeStyle = '#ff4444'; ctx.beginPath(); ctx.moveTo(160, 140); ctx.lineTo(280, 140); ctx.stroke();
    ctx.fillStyle = '#ff4444'; ctx.fillText('SL', 230, 135);
}

// analyze funksiyasida showResult chaqirilganda drawStrategyDiagram-ni ham chaqiramiz
function showResult(s) {
    next(4, 5);
    // ... avvalgi kodlar ...
    if (s) {
        drawStrategyDiagram(state.strategy, s.type, s.ent, s.tp, s.sl);
    }
}
</script>
