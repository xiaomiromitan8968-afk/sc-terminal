<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC_MALIKOV | Multi-Step AI</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root { --neon: #00ff88; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: sans-serif; margin: 0; overflow-x: hidden; }
        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex !important; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; }
        button { 
            background: #111; color: var(--neon); border: 2px solid var(--neon); 
            padding: 20px; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: bold;
        }
        button:active { background: var(--neon); color: #000; }
        #chart-screen { height: 100vh; flex-direction: column; }
        #tv_chart { flex-grow: 1; width: 100%; }
        #ai-sidebar { background: #111; border-top: 2px solid var(--neon); padding: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div id="step1" class="screen active">
    <h2 style="text-shadow: 0 0 10px var(--neon);">1. PARA TANLANG</h2>
    <div class="btn-grid">
        <button onclick="go(2, 'pair', 'BINANCE:BTCUSDT')">BTC/USDT</button>
        <button onclick="go(2, 'pair', 'OANDA:XAUUSD')">GOLD</button>
        <button onclick="go(2, 'pair', 'FX:EURUSD')">EUR/USD</button>
        <button onclick="go(2, 'pair', 'BINANCE:ETHUSDT')">ETH/USDT</button>
    </div>
</div>

<div id="step2" class="screen">
    <h2>2. TIMEFRAME</h2>
    <div class="btn-grid">
        <button onclick="go(3, 'tf', '15')">15 MIN</button>
        <button onclick="go(3, 'tf', '60')">1 SOAT</button>
        <button onclick="go(3, 'tf', '240')">4 SOAT</button>
        <button onclick="go(3, 'tf', 'D')">1 KUN</button>
    </div>
</div>

<div id="step3" class="screen">
    <h2>3. STRATEGIYA</h2>
    <div class="btn-grid" style="grid-template-columns: 1fr;">
        <button onclick="finish('SMC')">SC_MALIKOV SMC (BOS/ChoCh)</button>
        <button onclick="finish('PIN')">PIN-BAR (PDF 10-dars)</button>
        <button onclick="finish('TREND')">TREND KANALI (PDF 2-dars)</button>
        <button onclick="finish('RETEST')">RETEST (PDF 15-dars)</button>
    </div>
</div>

<div id="chart-screen" class="screen">
    <div id="tv_chart"></div>
    <div id="ai-sidebar">
        <div id="report">Analiz tayyorlanmoqda...</div>
        <button onclick="location.reload()" style="margin-top:10px; padding:10px; width:100%;">QAYTA BOSHLASH</button>
    </div>
</div>

<script>
    let data = { pair: '', tf: '', strat: '' };

    function go(next, key, val) {
        data[key] = val;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + next).classList.add('active');
        window.scrollTo(0,0);
    }

    function finish(s) {
        data.strat = s;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('chart-screen').classList.add('active');

        new TradingView.widget({
            "autosize": true,
            "symbol": data.pair,
            "interval": data.tf,
            "theme": "dark",
            "container_id": "tv_chart",
            "locale": "uz"
        });

        setTimeout(() => {
            let info = data.strat === 'SMC' ? "OB va ChoCh tasdiqlandi. Kutilayotgan harakat: BUY." : "PDF qoidasi bo'yicha signal aniqlandi.";
            document.getElementById('report').innerHTML = <b>PARA:</b> ${data.pair} | <b>STRAT:</b> ${data.strat}<br><b>AI TAHLIL:</b> ${info};
        }, 2000);
    }
</script>
</body>
</html>
