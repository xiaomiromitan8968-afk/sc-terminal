<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WIZARD TERMINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --neon: #00ff88; --blue: #00c2ff; --pink: #ff007f; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .terminal { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; }
        .box { background: var(--glass); border: 1px solid var(--neon); border-radius: 15px; padding: 20px; text-align: center; margin-top: 15px; box-shadow: 0 0 15px rgba(0, 255, 136, 0.1); position: relative; overflow: hidden; }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--blue); background: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .btn:active { background: var(--blue); color: black; transform: scale(0.98); }
        .grid-tf { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        #chart-container { width: 100%; height: 280px; margin-top: 15px; border-radius: 12px; border: 1px solid #1a1a1a; }
        .status-msg { color: var(--neon); font-size: 14px; margin: 15px 0; text-align: left; line-height: 1.5; padding: 10px; background: rgba(0, 255, 136, 0.05); border-radius: 8px; }
        .signal-card { background: linear-gradient(135deg, rgba(0,194,255,0.1) 0%, rgba(0,255,136,0.1) 100%); padding: 15px; border-radius: 12px; border: 1px solid var(--blue); margin-top: 10px; text-align: left; }
        .loader { border: 3px solid #111; border-top: 3px solid var(--neon); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tp-text { color: var(--neon); font-weight: 900; }
        .sl-text { color: var(--pink); font-weight: 900; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="color: var(--neon); text-align: center; letter-spacing: 3px; font-weight: 900; text-shadow: 0 0 10px var(--neon);">SC_MALIKOV</h2>

    <div id="step-1" class="box">
        <p style="font-size: 12px; opacity: 0.7;">BOSQICH-1: JUFTLIKNI TANLANG</p>
        <button class="btn" onclick="selectPair('BTCUSDT')">BTC / USDT</button>
        <button class="btn" onclick="selectPair('ETHUSDT')">ETH / USDT</button>
        <button class="btn" onclick="selectPair('XAUUSD')">GOLD (XAUUSD)</button>
    </div>

    <div id="step-2" class="box hidden">
        <p id="pair-display" style="color: var(--blue); font-weight: bold;"></p>
        <div class="grid-tf">
            <button class="btn" style="padding: 10px;" onclick="startAnalysis('15')">15M</button>
            <button class="btn" style="padding: 10px;" onclick="startAnalysis('60')">1H</button>
            <button class="btn" style="padding: 10px;" onclick="startAnalysis('240')">4H</button>
        </div>
        <button class="btn" style="border-color: var(--pink); margin-top: 15px;" onclick="location.reload()">ORQAGA</button>
    </div>

    <div id="step-3" class="box hidden">
        <div id="loader-box">
            <div class="loader"></div>
            <p style="font-size: 12px;">STRATEGIYA BO'YICHA SKANERLANMOQDA...</p>
        </div>
        
        <div id="result-box" class="hidden">
            <div id="chart-container"></div>
            <div id="bot-message" class="status-msg"></div>
            <div id="signal-info" class="signal-card"></div>
            <button class="btn" style="margin-top: 15px; border-color: var(--neon);" onclick="location.reload()">YANGI TAHLIL</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let selectedPair = '';
    let chart;

    function selectPair(p) {
        selectedPair = p;
        document.getElementById('pair-display').innerText = "TAHLIL: " + p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    async function startAnalysis(tf) {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');

        // Haqiqiy ma'lumot olish simulyatsiyasi
        setTimeout(() => {
            generateSignal(tf);
        }, 2500);
    }

    function generateSignal(tf) {
        document.getElementById('loader-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');

        if (chart) { document.getElementById('chart-container').innerHTML = ''; }
        
        chart = LightweightCharts.createChart(document.getElementById('chart-container'), {
            layout: { backgroundColor: 'transparent', textColor: '#d1d4dc' },
            grid: { vertLines: { visible: false }, horzLines: { visible: false } },
            rightPriceScale: { borderVisible: false },
            timeScale: { borderVisible: false },
        });

        const candleSeries = chart.addCandlestickSeries({
            upColor: '#00ff88', downColor: '#ff007f', borderVisible: false,
            wickUpColor: '#00ff88', wickDownColor: '#ff007f'
        });

        // Grafik ma'lumotlari
        const dummyData = generateDummyData();
        candleSeries.setData(dummyData);

        // STRATEGIYA MANTIQI (Trend, Uchburchak, Flet)
        const scenarios = ['Trend Line', 'Uchburchak', 'Flet', 'None'];
        const pattern = scenarios[Math.floor(Math.random() * scenarios.length)];
        
        const botMsg = document.getElementById('bot-message');
        const signalBox = document.getElementById('signal-info');

        if (pattern === 'None') {
            botMsg.innerText = "❌ Hozirda strategiyaga mos signal topilmadi. Model shakllanyapti...";
            signalBox.classList.add('hidden');
        } else {
            const lastPrice = dummyData[dummyData.length - 1].close;
            const tp = (lastPrice * 1.01618).toFixed(2); // Fibo 1.618
            const sl = (lastPrice * 0.992).toFixed(2);   // Fibonacci 0 nuqta simulyatsiyasi

            botMsg.innerText = `✅ Bozorda ${pattern} aniqlandi. Narx chiziq bo'ylab harakatlanmoqda.`;
            signalBox.classList.remove('hidden');
            signalBox.innerHTML = `
                <div style="font-weight: 900; font-size: 16px; margin-bottom: 10px; color: var(--blue);">🚀 SIGNAL: BUY / LONG</div>
                <div>🎯 TP (1.618): <span class="tp-text">${tp}</span></div>
                <div>🛑 SL (Fibo 0): <span class="sl-text">${sl}</span></div>
                <div style="font-size: 11px; margin-top: 8px; opacity: 0.6;">* Tana bilan yorib o'tganda kirish tavsiya etiladi.</div>
            `;

            drawPattern(chart, dummyData, pattern);
        }
    }

    function drawPattern(chart, data, pattern) {
        const lineSeries = chart.addLineSeries({ color: '#00ff88', lineWidth: 2, lineStyle: 2 });
        if (pattern === 'Trend Line') {
            lineSeries.setData([
                { time: data[0].time, value: data[0].low },
                { time: data[data.length-1].time, value: data[data.length-1].close }
            ]);
        } else if (pattern === 'Uchburchak') {
            const upLine = chart.addLineSeries({ color: '#ff007f', lineWidth: 2, lineStyle: 2 });
            upLine.setData([{ time: data[0].time, value: data[0].high }, { time: data[data.length-1].time, value: data[data.length-1].close }]);
            lineSeries.setData([{ time: data[0].time, value: data[0].low }, { time: data[data.length-1].time, value: data[data.length-1].close }]);
        } else if (pattern === 'Flet') {
            const upLine = chart.addLineSeries({ color: '#00c2ff', lineWidth: 2, lineStyle: 2 });
            upLine.setData([{ time: data[0].time, value: data[10].high }, { time: data[data.length-1].time, value: data[10].high }]);
            lineSeries.setData([{ time: data[0].time, value: data[10].low }, { time: data[data.length-1].time, value: data[10].low }]);
        }
    }

    function generateDummyData() {
        const data = [];
        let time = new Date(Date.UTC(2023, 0, 1, 0, 0, 0));
        for (let i = 0; i < 60; i++) {
            const val = 25000 + (Math.random() * 200);
            data.push({
                time: time.getTime() / 1000,
                open: val, high: val + 50, low: val - 50, close: val + 10
            });
            time.setMinutes(time.getMinutes() + 15);
        }
        return data;
    }
</script>
</body>
</html>
