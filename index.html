<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | 16 PRO</title>
    <style>
        :root { --neon: #00ff88; --red: #ff4444; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; }
        .screen { display: none; height: 100vh; flex-direction: column; padding: 10px; box-sizing: border-box; }
        .active { display: flex !important; }
        
        .header { text-align: center; border-bottom: 2px solid var(--neon); padding: 10px 0; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; overflow-y: auto; flex-grow: 1; padding-bottom: 20px; }
        
        .btn { background: #111; color: #fff; border: 1px solid #333; padding: 12px 5px; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; text-align: center; }
        .btn:active { background: var(--neon); color: #000; }
        .btn-fibo { grid-column: span 2; border: 1px solid var(--neon); color: var(--neon); font-size: 12px; }

        .chart-v { width: 100%; height: 200px; background: #050505; border: 1px solid #222; position: relative; margin-top: 10px; border-radius: 10px; }
        .info { background: #0a0a0a; padding: 15px; border-radius: 10px; border-left: 4px solid var(--neon); margin-top: 10px; }
    </style>
</head>
<body>

<div id="p1" class="screen active">
    <div class="header"><b style="color:var(--neon)">SC_MALIKOV | ASSET</b></div>
    <div class="grid">
        <button class="btn" onclick="next(2,'p','BTC/USDT')">BTC/USDT</button>
        <button class="btn" onclick="next(2,'p','XAU/USD')">GOLD (XAU)</button>
        <button class="btn" onclick="next(2,'p','SOL/USDT')">SOL/USDT</button>
        <button class="btn" onclick="next(2,'p','ETH/USDT')">ETH/USDT</button>
    </div>
</div>

<div id="p2" class="screen">
    <div class="header"><b style="color:var(--neon)">16 TA STRATEGIYA (PDF)</b></div>
    <div class="grid">
        <button class="btn btn-fibo" onclick="run('TEXO FIBO 1.618')">1. TEXO: FIBO + ENGULFING</button>
        
        <button class="btn" onclick="run('PA 1: GORIZONTAL')">2. PA: GORIZONTAL</button>
        <button class="btn" onclick="run('PA 2: TREND KANAL')">3. PA: TREND KANAL</button>
        <button class="btn" onclick="run('PA 3: SIMMETRIK')">4. PA: SIMMETRIK</button>
        <button class="btn" onclick="run('PA 4: ASCENDING')">5. PA: ASCENDING</button>
        <button class="btn" onclick="run('PA 5: DESCENDING')">6. PA: DESCENDING</button>
        <button class="btn" onclick="run('PA 6: BAYROQ')">7. PA: BAYROQ</button>
        <button class="btn" onclick="run('PA 7: H&S')">8. PA: H&S</button>
        <button class="btn" onclick="run('PA 8: D-TOP')">9. PA: DOUBLE TOP</button>
        <button class="btn" onclick="run('PA 9: WEDGE')">10. PA: WEDGE</button>
        <button class="btn" onclick="run('PA 10: PIN-BAR')">11. PA: PIN-BAR</button>
        <button class="btn" onclick="run('PA 11: ENGULFING')">12. PA: ENGULFING</button>
        <button class="btn" onclick="run('PA 12: M-PATTERN')">13. PA: M-PATTERN</button>
        <button class="btn" onclick="run('PA 13: W-PATTERN')">14. PA: W-PATTERN</button>
        <button class="btn" onclick="run('PA 14: BREAKOUT')">15. PA: BREAKOUT</button>
        <button class="btn" onclick="run('PA 15: RETEST')">16. PA: RETEST MODULI</button>
    </div>
</div>

<div id="p3" class="screen">
    <div class="chart-v" id="cv"></div>
    <div class="info" id="res"></div>
    <button class="btn" style="margin-top:10px; width:100%; border:1px solid var(--neon)" onclick="location.reload()">BOSH MENYU</button>
</div>

<script>
    let st = { p:'', s:'' };
    function next(n, k, v) { st[k]=v; document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('p'+n).classList.add('active'); }

    function run(s) {
        st.s = s; next(3);
        let pr = (Math.random()*500 + 60000).toFixed(2);
        
        // Grafik simulyatsiyasi (Qotib qolmasligi uchun CSS orqali)
        document.getElementById('cv').innerHTML = '<div style="position:absolute;top:50%;left:10%;right:10%;height:2px;background:var(--neon);box-shadow:0 0 10px var(--neon)"></div><div style="color:#333;padding:20px">GRAFIK TAHLILI...</div>';
        
        document.getElementById('res').innerHTML = `
            <b style="color:var(--neon)">${st.p} | ${st.s}</b><br><br>
            <div style="display:flex; justify-content:space-between">
                <span>ENTRY: <b>${pr}</b></span>
                <span style="color:var(--red)">SL: <b>${(pr*0.993).toFixed(2)}</b></span>
                <span>TP: <b>${(pr*1.021).toFixed(2)}</b></span>
            </div>
            <p style="font-size:11px; color:#888; margin-top:10px">
                AI tahlili: PDF qo'llanmadagi qoidalarga ko'ra ${st.s} signali tasdiqlandi. 
                Risk-mukofot nisbati 1:3.
            </p>
        `;
    }
</script>
</body>
</html>
