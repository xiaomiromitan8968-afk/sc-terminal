<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARADOX Smart Chem AI v2</title>
    <style>
        :root {
            --p: #0a0f1e; 
            --a: #22d3ee; 
            --s: #00ff00; 
            --d: #f87171; 
            --key-bg: #1e293b;
        }

        body {
            background-color: var(--p);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 255, 0, 0.2);
            width: 100%;
            max-width: 500px;
            border-radius: 35px;
            padding: 25px;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.15);
        }

        /* Mode Switcher Styles */
        .mode-switcher {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-mode {
            background: #1e293b;
            border: 1px solid var(--a);
            color: var(--a);
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-mode.active {
            background: var(--a);
            color: var(--p);
            box-shadow: 0 0 15px var(--a);
        }

        .screen {
            background: #000;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid var(--s);
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        #display {
            font-size: 28px;
            color: var(--s);
            text-shadow: 0 0 10px var(--s);
            min-height: 40px;
            word-break: break-all;
        }

        /* Keyboard Input Style */
        #kb-input-container {
            display: none;
            margin-bottom: 15px;
        }

        #manual-input {
            width: 100%;
            background: #000;
            border: 1px solid var(--a);
            color: var(--s);
            padding: 15px;
            border-radius: 15px;
            font-size: 18px;
            outline: none;
            text-align: center;
            box-sizing: border-box;
        }

        .zone {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
            gap: 8px;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(0, 255, 0, 0.1);
            margin-bottom: 15px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 15px 5px;
            cursor: pointer;
            color: #fff;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-el {
            background: var(--key-bg);
            border: 1px solid rgba(0, 255, 0, 0.3);
            font-size: 14px;
        }

        .btn-el span { display: block; font-size: 8px; opacity: 0.5; }

        .btn-ai {
            background: var(--a);
            color: var(--p);
            width: 100%;
            font-size: 18px;
            margin-bottom: 10px;
            box-shadow: 0 0 20px var(--a);
        }

        .controls-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .btn-op { background: #475569; border: 1px solid var(--s); }
        .btn-res { background: var(--d); box-shadow: 0 0 15px var(--d); }

        #res-box {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            display: none;
            border-left: 4px solid var(--s);
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="mode-switcher">
        <button id="mode-kb" class="btn-mode" onclick="switchMode('kb')">⌨️ KLAVIATURA</button>
        <button id="mode-grid" class="btn-mode active" onclick="switchMode('grid')">🧪 JADVAL</button>
    </div>

    <div class="floating-molar-container">
    <button class="btn-molar-fly" onclick="openMolarCalc()">M<sub>r</sub></button>
</div>

<style>
    .floating-molar-container {
        position: fixed; /* Ekranga nisbatan qat'iy joylashuv */
        top: 15px;       /* Tepadan masofa */
        right: 15px;     /* O'ngdan masofa */
        z-index: 9999;   /* Hammasidan ustida turishi uchun */
    }

    .btn-molar-fly {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: rgba(15, 23, 42, 0.9);
        border: 2px solid #00ff00;
        color: #00ff00;
        font-weight: bold;
        font-size: 18px;
        cursor: pointer;
        /* Neon nurlanishi */
        box-shadow: 0 0 15px rgba(0, 255, 0, 0.6), inset 0 0 10px rgba(0, 255, 0, 0.3);
        transition: 0.3s all ease;
        /* "Nafas olish" animatsiyasi */
        animation: pulseFly 2s infinite ease-in-out;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    @keyframes pulseFly {
        0% { transform: scale(1); box-shadow: 0 0 15px rgba(0, 255, 0, 0.6); }
        50% { transform: scale(1.1); box-shadow: 0 0 30px rgba(0, 255, 0, 0.9); }
        100% { transform: scale(1); box-shadow: 0 0 15px rgba(0, 255, 0, 0.6); }
    }

    .btn-molar-fly:hover {
        background: #00ff00;
        color: #0a0f1e;
        transform: rotate(360deg) scale(1.2);
    }
</style>

<script>
    function openMolarCalc() {
        // Yangi oynada ochish (molar.html faylingiz tayyor bo'lishi kerak)
        window.open('molar.html', '_blank');
    }
</script>
    
    
    <div class="screen">
        <div id="display">...</div>
        <div id="status" style="font-size: 10px; color: var(--a); margin-top: 10px;">TAYYOR</div>
    </div>

    <div id="kb-input-container">
        <input type="text" id="manual-input" placeholder="Masalan: NaOH + HCl" oninput="syncInput()">
    </div>

    <div id="grid-container">
        <div class="zone" id="el-keys"></div>
    </div>

    <button class="btn-ai" onclick="askAI()">⚗️</button>

    <div class="controls-row">
        <button class="btn-op" onclick="addChar(' + ')">+</button>
        <button class="btn-op" onclick="addChar('2')">2</button>
        <button class="btn-op" onclick="addChar('3')">3</button>
        <button class="btn-res" onclick="reset()">CLR</button>
    </div>

    <div id="res-box"></div>
</div>

<script>
    const KEY = "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";
    const URL = "https://api.groq.com/openai/v1/chat/completions";

    let currentInput = "";
    let currentMode = "grid";

    const elements = [
        {s:'H', n:'Vodorod'}, {s:'He', n:'Geliy'}, {s:'Li', n:'Litiy'}, {s:'Be', n:'Berilliy'}, {s:'B', n:'Bor'}, {s:'C', n:'Uglerod'}, {s:'N', n:'Azot'}, {s:'O', n:'Kislorod'}, {s:'F', n:'Ftor'}, {s:'Ne', n:'Neon'},
        {s:'Na', n:'Natriy'}, {s:'Mg', n:'Magniy'}, {s:'Al', n:'Alyuminiy'}, {s:'Si', n:'Kremniy'}, {s:'P', n:'Fosfor'}, {s:'S', n:'Oltingugurt'}, {s:'Cl', n:'Xlor'}, {s:'Ar', n:'Argon'},
        {s:'K', n:'Kaliy'}, {s:'Ca', n:'Kalsiy'}, {s:'Sc', n:'Skandiy'}, {s:'Ti', n:'Titan'}, {s:'V', n:'Vanadiy'}, {s:'Cr', n:'Xrom'}, {s:'Mn', n:'Marganes'}, {s:'Fe', n:'Temir'}, {s:'Co', n:'Kobalt'}, {s:'Ni', n:'Nikel'}, {s:'Cu', n:'Mis'}, {s:'Zn', n:'Rux'}, {s:'Ag', n:'Kumush'}, {s:'Au', n:'Oltin'}, {s:'Hg', n:'Simob'}, {s:'Pb', n:'Qorgoshin'}
    ];

    const keysDiv = document.getElementById('el-keys');
    elements.forEach(el => {
        const b = document.createElement('button');
        b.className = 'btn-el';
        b.innerHTML = `${el.s}<span>${el.n}</span>`;
        b.onclick = () => addChar(el.s);
        keysDiv.appendChild(b);
    });

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('mode-kb').classList.toggle('active', mode === 'kb');
        document.getElementById('mode-grid').classList.toggle('active', mode === 'grid');
        
        document.getElementById('kb-input-container').style.display = (mode === 'kb') ? 'block' : 'none';
        document.getElementById('grid-container').style.display = (mode === 'grid') ? 'block' : 'none';
    }

    function syncInput() {
        currentInput = document.getElementById('manual-input').value;
        document.getElementById('display').innerText = currentInput || "...";
    }

    function addChar(v) {
        if(currentInput === "" || document.getElementById('display').innerText.includes("→")) currentInput = "";
        currentInput += v;
        document.getElementById('display').innerText = currentInput;
        document.getElementById('manual-input').value = currentInput;
    }

    function reset() {
        currentInput = "";
        document.getElementById('display').innerText = "...";
        document.getElementById('manual-input').value = "";
        document.getElementById('res-box').style.display = "none";
        document.getElementById('display').style.color = "var(--s)";
    }

    async function askAI() {
        if(!currentInput) return;
        const st = document.getElementById('status');
        st.innerText = "TAHLIL KETMOQDA...";
        
        try {
            const response = await fetch(URL, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{
                        role: "user", 
                        content: `Sen kimyogarsan. Reaksiyani tugalla: ${currentInput}. FAQAT JSON qaytar: {"t": "equation", "i": "explanation", "possible": true}. Agar reaksiya bormasa "possible": false qaytar.`
                    }],
                    response_format: { type: "json_object" }
                })
            });

            const data = await response.json();
            const res = JSON.parse(data.choices[0].message.content);

            if (!res.possible) {
                document.getElementById('display').innerText = "BU REAKSIYA BORMAYDI";
                document.getElementById('display').style.color = "var(--d)";
                st.innerText = "XATO";
            } else {
                document.getElementById('display').innerText = res.t;
                document.getElementById('display').style.color = "var(--s)";
                st.innerText = "TAYYOR";
                document.getElementById('res-box').innerHTML = `<b>Xulosa:</b> ${res.i}`;
                document.getElementById('res-box').style.display = "block";
            }
        } catch (e) {
            st.innerText = "Xatolik yuz berdi";
        }
    }
</script>
</body>
</html>
