<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATS Signal Paneli</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --bull: #00e676;
            --bear: #ff5252;
            --accent: #2196f3;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* Filter qismi */
        .filter-panel {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            border: 1px solid #30363d;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        select, input {
            background: #0d1117;
            color: white;
            border: 1px solid #30363d;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
        }

        /* Signal kartochkalari */
        .signal-card { 
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 6px solid #444;
            transition: 0.3s;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .buy { border-left-color: var(--bull); }
        .sell { border-left-color: var(--bear); }

        .header { display: flex; justify-content: space-between; font-size: 1.2em; font-weight: bold; margin-bottom: 10px; }
        .grid-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; font-size: 0.9em; opacity: 0.9; }
        .badge { background: #30363d; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; }
        .score-val { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>SATS | Strategiya Signallari</h2>

    <div class="filter-panel">
        <div class="filter-group">
            <label>Valyuta juftligi (Symbol):</label>
            <input type="text" id="symbolInput" placeholder="Masalan: BTCUSDT" onkeyup="filterSignals()">
        </div>
        <div class="filter-group">
            <label>Taymfreym (TF):</label>
            <select id="tfInput" onchange="filterSignals()">
                <option value="all">Hammasi</option>
                <option value="5m">5 minut</option>
                <option value="15m">15 minut</option>
                <option value="1h">1 soat</option>
                <option value="4h">4 soat</option>
                <option value="D">Kunlik</option>
            </select>
        </div>
        <div class="filter-group">
            <button onclick="resetFilters()" style="background: var(--accent); color: white; border: none; padding: 9px 15px; border-radius: 6px; cursor: pointer;">Tozalash</button>
        </div>
    </div>

    <div id="signals-container">
        </div>
</div>

<script>
    // Namunaviy ma'lumotlar (Bular TradingView Webhook-dan keladi deb tasavvur qiling)
    const allSignals = [
        { action: "buy", ticker: "BTCUSDT", tf: "1h", price: 67200.50, sl: 66000, tp1: 68500, tp2: 69500, score: 92, tqi: 0.85 },
        { action: "sell", ticker: "ETHUSDT", tf: "15m", price: 3450.20, sl: 3520, tp1: 3380, tp2: 3300, score: 78, tqi: 0.65 },
        { action: "buy", ticker: "SOLUSDT", tf: "1h", price: 145.10, sl: 140, tp1: 155, tp2: 165, score: 88, tqi: 0.77 },
        { action: "sell", ticker: "BTCUSDT", tf: "5m", price: 67100.00, sl: 67500, tp1: 66500, tp2: 66000, score: 45, tqi: 0.40 }
    ];

    function renderSignals(data) {
        const container = document.getElementById('signals-container');
        container.innerHTML = '';

        if (data.length === 0) {
            container.innerHTML = '<p style="text-align:center; opacity:0.5;">Mos signallar topilmadi.</p>';
            return;
        }

        data.forEach(sig => {
            const card = document.createElement('div');
            card.className = `signal-card ${sig.action}`;
            card.innerHTML = `
                <div class="header">
                    <span style="color: ${sig.action === 'buy' ? 'var(--bull)' : 'var(--bear)'}">
                        ${sig.action.toUpperCase()} ${sig.ticker}
                    </span>
                    <span class="badge">TF: ${sig.tf}</span>
                </div>
                <div class="grid-info">
                    <div>Narx: <b>${sig.price}</b></div>
                    <div>Score: <span class="score-val">${sig.score}/102</span></div>
                    <div>TQI: <b>${sig.tqi}</b></div>
                    <div style="color: #ff8a80">SL: ${sig.sl}</div>
                    <div style="color: #b9f6ca">TP1: ${sig.tp1}</div>
                    <div style="color: #b9f6ca">TP2: ${sig.tp2}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function filterSignals() {
        const symbolValue = document.getElementById('symbolInput').value.toUpperCase();
        const tfValue = document.getElementById('tfInput').value;

        const filtered = allSignals.filter(sig => {
            const matchSymbol = sig.ticker.includes(symbolValue);
            const matchTF = tfValue === 'all' || sig.tf === tfValue;
            return matchSymbol && matchTF;
        });

        renderSignals(filtered);
    }

    function resetFilters() {
        document.getElementById('symbolInput').value = '';
        document.getElementById('tfInput').value = 'all';
        renderSignals(allSignals);
    }

    // Birinchi marta yuklanganda hammasini ko'rsatish
    renderSignals(allSignals);
</script>

</body>
</html>
