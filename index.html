<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | V20</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #010101; --neon: #00ff88; --blue: #00c2ff; --pink: #ff007f; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; min-height: 100vh; }
        .terminal { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; }
        .box { background: var(--glass); border: 1px solid rgba(0, 255, 136, 0.2); border-radius: 15px; padding: 20px; text-align: center; margin-top: 15px; backdrop-filter: blur(8px); }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 14px; border: 1px solid var(--blue); background: none; color: white; border-radius: 10px; cursor: pointer; font-weight: 900; font-size: 11px; text-transform: uppercase; transition: 0.2s; margin: 5px 0; }
        .btn:active { background: var(--blue); color: #000; transform: scale(0.95); }
        #chart-canvas { width: 100%; height: 260px; background: #000; border-radius: 12px; border: 1px solid #1a1a1a; margin-top: 15px; }
        .signal-card { background: rgba(0, 255, 136, 0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--neon); margin-top: 10px; text-align: left; position: relative; overflow: hidden; }
        .signal-card::before { content: 'SIGNAL'; position: absolute; right: -10px; top: -5px; font-size: 40px; font-weight: 900; opacity: 0.05; color: var(--neon); }
        .status-msg { color: var(--blue); font-size: 11px; margin: 10px 0; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="color: var(--neon); text-align: center; font-weight: 900; letter-spacing: 4px;">SC_MALIKOV</h2>

    <div id="step-1" class="box">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" onclick="selectPair('EURUSDT')">EUR / USD</button>
            <button class="btn" onclick="selectPair('BTCUSDT')">BTC / USDT</button>
            <button class="btn" onclick="selectPair('SOLUSDT')">SOL / USDT</button>
            <button class="btn" onclick="selectPair('XAUUSDT')">GOLD (XAU)</button>
        </div>
    </div>

    <div id="step-2" class="box hidden">
        <p id="pair-display" style="color: var(--neon); font-weight: 900;"></p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" onclick="startAnalysis('5m')">M5</button>
            <button class="btn" onclick="startAnalysis('15m')">M15</button>
            <button class="btn" onclick="startAnalysis('1h')">H1</button>
            <button class="btn" onclick="startAnalysis('4h')">H4</button>
        </div>
    </div>

    <div id="step-3" class="box hidden">
        <div id="loader-box"><p style="font-size: 10px; color: var(--blue);">RASMLAR ASOSIDA TAHLIL QILINMOQDA...</p></div>
        <div id="result-box" class="hidden">
            <canvas id="chart-canvas"></canvas>
            <div id="bot-message" class="status-msg"></div>
            <div id="signal-info" class="signal-card"></div>
            <button class="btn" style="border-color: var(--pink); color: var(--pink); margin-top: 15px;" onclick="cancelSignal()">YANGI TAHLIL</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let selectedPair = '';
    let storageKey = '';

    function selectPair(p) {
        selectedPair = p;
        storageKey = `sc_img_v20_${p}`;
        document.getElementById('pair-display').innerText = p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    async function startAnalysis(tf) {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${selectedPair}&interval=${tf}&limit=100`);
            const data = (await res.json()).map(d => ({ o: +d[1], h: +d[2], l: +d[3], c: +d[4] }));
            processLogic(data);
        } catch (e) { alert("Xatolik!"); }
    }

    function processLogic(data) {
        document.getElementById('loader-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');

        const canvas = document.getElementById('chart-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth * 2; canvas.height = canvas.offsetHeight * 2;
        ctx.scale(2, 2);
        const w = canvas.offsetWidth, h = canvas.offsetHeight;

        const maxP = Math.max(...data.map(d => d.h)), minP = Math.min(...data.map(d => d.l));
        const getY = (p) => h - 40 - ((p - minP) / (maxP - minP)) * (h - 80);
        const getX = (i) => (i / data.length) * w;

        // 1. Pivotlar (Shakl balandligini o'lchash uchun)
        let highs = [], lows = [];
        for (let i = 2; i < data.length - 2; i++) {
            if (data[i].h > data[i-1].h && data[i].h > data[i+1].h) highs.push({ idx: i, val: data[i].h });
            if (data[i].l < data[i-1].l && data[i].l < data[i+1].l) lows.push({ idx: i, val: data[i].l });
        }

        // Shamchalar
        data.forEach((d, i) => {
            ctx.strokeStyle = ctx.fillStyle = d.c >= d.o ? '#00ff88' : '#ff007f';
            const x = getX(i) + (w/data.length/2);
            ctx.beginPath(); ctx.moveTo(x, getY(d.h)); ctx.lineTo(x, getY(d.l)); ctx.stroke();
            ctx.fillRect(x - 1, Math.min(getY(d.o), getY(d.c)), 2, Math.max(Math.abs(getY(d.o) - getY(d.c)), 1));
        });

        // 2. Trendline va Pattern Height (Balandlik)
        let patternHeight = maxP - minP; // Default
        if (highs.length > 0 && lows.length > 0) {
            patternHeight = highs[0].val - lows[0].val; // Shakl boshidagi kenglik
        }

        let resY = maxP, supY = minP;
        if (highs.length >= 2 && lows.length >= 2) {
            const h1 = highs[highs.length-2], h2 = highs[highs.length-1];
            const l1 = lows[lows.length-2], l2 = lows[lows.length-1];
            
            resY = h1.val + ((h2.val - h1.val)/(h2.idx - h1.idx)) * (data.length - 1 - h1.idx);
            supY = l1.val + ((l2.val - l1.val)/(l2.idx - l1.idx)) * (data.length - 1 - l1.idx);

            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = '#ff007f'; ctx.beginPath(); ctx.moveTo(getX(h1.idx), getY(h1.val)); ctx.lineTo(w, getY(resY)); ctx.stroke();
            ctx.strokeStyle = '#00ff88'; ctx.beginPath(); ctx.moveTo(getX(l1.idx), getY(l1.val)); ctx.lineTo(w, getY(supY)); ctx.stroke();
        }

        // 3. SIGNAL LOCK (IMAGE LOGIC)
        const last = data[data.length - 1];
        const precision = selectedPair.includes('EUR') ? 5 : 2;
        let activeSignal = JSON.parse(localStorage.getItem(storageKey));

        if (!activeSignal) {
            if (last.c > resY) { // Breakout UP
                const entry = last.c;
                const target = entry + (patternHeight * 0.8); // Balandlikning 80%i (Target)
                const sl = resY - (patternHeight * 0.2); // Chiziqdan biroz pastda

                activeSignal = { type: "BUY", entry: entry, tp: +target.toFixed(precision), sl: +sl.toFixed(precision) };
                localStorage.setItem(storageKey, JSON.stringify(activeSignal));
            } 
            else if (last.c < supY) { // Breakout DOWN
                const entry = last.c;
                const target = entry - (patternHeight * 0.8);
                const sl = supY + (patternHeight * 0.2);

                activeSignal = { type: "SELL", entry: entry, tp: +target.toFixed(precision), sl: +sl.toFixed(precision) };
                localStorage.setItem(storageKey, JSON.stringify(activeSignal));
            }
        }

        // Result Render
        if (activeSignal) {
            document.getElementById('bot-message').innerText = "SIGNAL DETECTED / LOCK ACTIVE";
            document.getElementById('signal-info').innerHTML = `
                <div style="font-size: 16px; font-weight: 900; color: var(--neon); margin-bottom: 10px;">${activeSignal.type} POSITION</div>
                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 5px 0;">
                    <span>ENTRY:</span> <b style="color:white;">${activeSignal.entry}</b>
                </div>
                <div style="display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 5px 0;">
                    <span>TARGET (TP):</span> <b style="color:var(--neon);">${activeSignal.tp}</b>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 5px 0;">
                    <span>STOP LOSS:</span> <b style="color:var(--pink);">${activeSignal.sl}</b>
                </div>
            `;
        } else {
            document.getElementById('bot-message').innerText = "WAITING FOR PATTERN BREAKOUT...";
            document.getElementById('signal-info').innerHTML = "<center style='opacity:0.3; font-size:10px;'>SCANNING MARKET STRUCTURE...</center>";
        }
    }

    function cancelSignal() {
        localStorage.removeItem(storageKey);
        location.reload();
    }
</script>
</body>
</html>
