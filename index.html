<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PARADOX Smart Chem AI v2</title>
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
    <style>
        :root {
            --p: #0a0f1e; 
            --a: #22d3ee; 
            --s: #00ff00; 
            --d: #f87171; 
            --key-bg: #1e293b;
        }

        body {
            background-color: var(--p);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0; 
            transition: box-shadow 0.5s ease;
        }

        .ozmu-header {
            text-align: center;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 10px var(--a), 0 0 20px var(--a);
            margin-bottom: 15px;
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            from { opacity: 0.4; text-shadow: 0 0 5px var(--a); }
            to { opacity: 1; text-shadow: 0 0 20px var(--a), 0 0 40px var(--s); }
        }

        .card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(0, 255, 0, 0.2);
            width: 100%;
            max-width: 100%; 
            min-height: 100vh; 
            border-radius: 0; 
            padding: 25px;
            box-shadow: 0 0 40px rgba(0, 255, 0, 0.15);
            box-sizing: border-box; 
            position: relative;
            transition: all 0.5s ease;
        }

        .exothermic { box-shadow: inset 0 0 100px rgba(248, 113, 113, 0.4) !important; border-color: var(--d) !important; }
        .endothermic { box-shadow: inset 0 0 100px rgba(59, 130, 246, 0.4) !important; border-color: #3b82f6 !important; }

        .mode-switcher {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-mode {
            background: #1e293b;
            border: 1px solid var(--a);
            color: var(--a);
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-mode.active {
            background: var(--a);
            color: var(--p);
            box-shadow: 0 0 15px var(--a);
        }

        .screen {
            background: #000;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid var(--s);
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        #display {
            font-size: 28px;
            color: var(--s);
            text-shadow: 0 0 10px var(--s);
            min-height: 40px;
            word-break: break-all;
        }

        #kb-input-container {
            display: none;
            margin-bottom: 15px;
        }

        #manual-input {
            width: 100%;
            background: #000;
            border: 1px solid var(--a);
            color: var(--s);
            padding: 15px;
            border-radius: 15px;
            font-size: 18px;
            outline: none;
            text-align: center;
            box-sizing: border-box;
        }

        .zone {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
            gap: 8px;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 20px;
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid rgba(0, 255, 0, 0.1);
            margin-bottom: 15px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 15px 5px;
            cursor: pointer;
            color: #fff;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-el {
            background: var(--key-bg);
            border: 1px solid rgba(0, 255, 0, 0.3);
            font-size: 14px;
        }

        .btn-el span { display: block; font-size: 8px; opacity: 0.5; }

        .btn-ai {
            background: var(--a);
            color: var(--p);
            width: 100%;
            font-size: 18px;
            margin-bottom: 10px;
            box-shadow: 0 0 20px var(--a);
        }

        .controls-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .btn-op { background: #475569; border: 1px solid var(--s); }
        .btn-res { background: var(--d); box-shadow: 0 0 15px var(--d); }

        #res-box {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.6);
            border-radius: 15px;
            display: none;
            border-left: 4px solid var(--s);
            font-size: 13px;
        }

        #visual-container {
            display: none;
            margin-top: 15px;
            position: relative;
            width: 100%;
            height: 200px;
            background: radial-gradient(circle, #0f172a 0%, #000 100%);
            border-radius: 20px;
            border: 1px solid rgba(34, 211, 238, 0.3);
            overflow: hidden;
        }

        #ph-tag {
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            display: none;
        }

        /* YANGI QO'SHILGAN STIL: VIZUAL TUGMALAR UCHUN */
        #visual-btns-container {
            display: none;
            grid-template-columns: 1fr;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn-viz {
            background: linear-gradient(45deg, #22d3ee, #00ff00);
            color: #000;
            padding: 12px;
            font-size: 14px;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }

        /* 3D MODAL OYNASI */
        #mol-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 20000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #mol-viewer {
            width: 90%;
            height: 70%;
            background: #000;
            border-radius: 20px;
            border: 1px solid var(--a);
        }

        .close-modal {
            margin-top: 20px;
            background: var(--d);
            padding: 10px 30px;
            border-radius: 10px;
        }

        .molar-btn-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            touch-action: none; 
            cursor: grab;
        }

        .btn-molar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #0f172a;
            border: 2px solid #00ff00;
            color: #00ff00;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
            pointer-events: none; 
        }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <div class="ozmu-header">O‘zMU</div>

    <div class="mode-switcher">
        <button id="mode-kb" class="btn-mode" onclick="switchMode('kb')">⌨️ KLAVIATURA</button>
        <button id="mode-grid" class="btn-mode active" onclick="switchMode('grid')">🧪 JADVAL</button>
    </div>

    <div class="molar-btn-container" id="draggable-mr">
        <button class="btn-molar">M<sub>r</sub></button>
    </div>

    <div class="screen">
        <div id="display">...</div>
        <div id="status" style="font-size: 10px; color: var(--a); margin-top: 10px;">TAYYOR</div>
    </div>

    <div id="kb-input-container">
        <input type="text" id="manual-input" placeholder="Masalan: NaOH + HCl" oninput="syncInput()">
    </div>

    <div id="grid-container">
        <div class="zone" id="el-keys"></div>
    </div>

    <button class="btn-ai" onclick="askAI()">⚗️</button>

    <div class="controls-row">
        <button class="btn-op" onclick="addChar(' + ')">+</button>
        <button class="btn-op" onclick="addChar('2')">2</button>
        <button class="btn-op" onclick="addChar('3')">3</button>
        <button class="btn-res" onclick="reset()">CLR</button>
    </div>

    <div id="res-box"></div>

    <div id="visual-btns-container"></div>

    <div id="visual-container">
        <canvas id="reactionCanvas"></canvas>
        <div id="ph-tag"></div>
    </div>
</div>

<div id="mol-modal">
    <div id="mol-viewer"></div>
    <button class="close-modal" onclick="closeMol()">YOPISH</button>
</div>

<script>
    const dragEl = document.getElementById('draggable-mr');
    let isDragging = false;
    let startX, startY;

    dragEl.addEventListener('pointerdown', (e) => {
        isDragging = false;
        startX = e.clientX;
        startY = e.clientY;
        const rect = dragEl.getBoundingClientRect();
        dragEl.dataset.offsetX = e.clientX - rect.left;
        dragEl.dataset.offsetY = e.clientY - rect.top;
        dragEl.setPointerCapture(e.pointerId);
        dragEl.addEventListener('pointermove', onDragMove);
    });

    function onDragMove(e) {
        if (Math.abs(e.clientX - startX) > 5 || Math.abs(e.clientY - startY) > 5) { isDragging = true; }
        if (isDragging) {
            const offX = parseFloat(dragEl.dataset.offsetX);
            const offY = parseFloat(dragEl.dataset.offsetY);
            dragEl.style.left = (e.clientX - offX) + 'px';
            dragEl.style.top = (e.clientY - offY) + 'px';
            dragEl.style.right = 'auto';
        }
    }

    dragEl.addEventListener('pointerup', (e) => {
        dragEl.removeEventListener('pointermove', onDragMove);
        dragEl.releasePointerCapture(e.pointerId);
        if (!isDragging) { window.open('molar.html', '_blank'); }
        setTimeout(() => { isDragging = false; }, 10);
    });

    const KEY = "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";
    const URL = "https://api.groq.com/openai/v1/chat/completions";

    let currentInput = "";
    let currentMode = "grid";

    const elements = [
        {s:'H', n:'Vodorod'}, {s:'He', n:'Geliy'}, {s:'Li', n:'Litiy'}, {s:'Be', n:'Berilliy'}, {s:'B', n:'Bor'}, {s:'C', n:'Uglerod'}, {s:'N', n:'Azot'}, {s:'O', n:'Kislorod'}, {s:'F', n:'Ftor'}, {s:'Ne', n:'Neon'},
        {s:'Na', n:'Natriy'}, {s:'Mg', n:'Magniy'}, {s:'Al', n:'Alyuminiy'}, {s:'Si', n:'Kremniy'}, {s:'P', n:'Fosfor'}, {s:'S', n:'Oltingugurt'}, {s:'Cl', n:'Xlor'}, {s:'Ar', n:'Argon'},
        {s:'K', n:'Kaliy'}, {s:'Ca', n:'Kalsiy'}, {s:'Sc', n:'Skandiy'}, {s:'Ti', n:'Titan'}, {s:'V', n:'Vanadiy'}, {s:'Cr', n:'Xrom'}, {s:'Mn', n:'Marganes'}, {s:'Fe', n:'Temir'}, {s:'Co', n:'Kobalt'}, {s:'Ni', n:'Nikel'}, {s:'Cu', n:'Mis'}, {s:'Zn', n:'Rux'}, {s:'Ag', n:'Kumush'}, {s:'Au', n:'Oltin'}, {s:'Hg', n:'Simob'}, {s:'Pb', n:'Qorgoshin'}
    ];

    const keysDiv = document.getElementById('el-keys');
    elements.forEach(el => {
        const b = document.createElement('button');
        b.className = 'btn-el';
        b.innerHTML = `${el.s}<span>${el.n}</span>`;
        b.onclick = () => addChar(el.s);
        keysDiv.appendChild(b);
    });

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('mode-kb').classList.toggle('active', mode === 'kb');
        document.getElementById('mode-grid').classList.toggle('active', mode === 'grid');
        document.getElementById('kb-input-container').style.display = (mode === 'kb') ? 'block' : 'none';
        document.getElementById('grid-container').style.display = (mode === 'grid') ? 'block' : 'none';
    }

    function syncInput() {
        currentInput = document.getElementById('manual-input').value;
        document.getElementById('display').innerText = currentInput || "...";
    }

    function addChar(v) {
        if(currentInput === "" || document.getElementById('display').innerText.includes("→")) currentInput = "";
        currentInput += v;
        document.getElementById('display').innerText = currentInput;
        document.getElementById('manual-input').value = currentInput;
    }

    function reset() {
        currentInput = "";
        document.getElementById('display').innerText = "...";
        document.getElementById('manual-input').value = "";
        document.getElementById('res-box').style.display = "none";
        document.getElementById('visual-container').style.display = "none";
        document.getElementById('visual-btns-container').style.display = "none";
        document.getElementById('display').style.color = "var(--s)";
        document.getElementById('mainCard').className = "card";
        cancelAnimationFrame(animationId);
    }

    // YANGI FUNKSIYA: 3D MODALNI OCHISH VA CHIZISH
    function open3D(molName) {
        const modal = document.getElementById('mol-modal');
        const viewerDiv = document.getElementById('mol-viewer');
        modal.style.display = 'flex';
        viewerDiv.innerHTML = ''; 

        let viewer = $3Dmol.createViewer(viewerDiv, { backgroundColor: 'black' });
        
        // Ism orqali modelni yuklash (PubChem API orqali)
        fetch(`https://cactus.nci.nih.gov/chemical/structure/${molName}/sdf`)
            .then(res => res.text())
            .then(data => {
                viewer.addModel(data, "sdf");
                viewer.setStyle({}, { stick: { radius: 0.15 }, sphere: { scale: 0.25 } });
                viewer.zoomTo();
                viewer.render();
                viewer.spin(true);
            })
            .catch(err => {
                viewerDiv.innerHTML = '<p style="color:red; text-align:center; padding-top:50px;">Modelni yuklab bo\'lmadi</p>';
            });
    }

    function closeMol() {
        document.getElementById('mol-modal').style.display = 'none';
    }

    let canvas = document.getElementById('reactionCanvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    let animationId;

    class Particle {
        constructor(x, y, mode, color) {
            this.x = x; this.y = y; this.mode = mode;
            this.color = color || "rgba(255,255,255,0.8)";
            this.radius = Math.random() * 3 + 2;
            this.vx = (Math.random() - 0.5) * 4;
            this.vy = mode === 'gas' ? (-Math.random() * 5 - 2) : (Math.random() * 2 + 1);
            this.opacity = 1;
            this.maxRadius = Math.random() * 25 + 15;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color.replace('0.8', this.opacity);
            ctx.fill();
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if(this.mode === 'gas') {
                if(this.radius < this.maxRadius) this.radius += 0.3;
                this.opacity -= 0.004; this.vy += 0.01;
            } else {
                if(this.y > canvas.height - 5) { this.vy = 0; this.vx = 0; this.opacity -= 0.005; }
            }
        }
    }

    function startVisual(mode, color, env, heat) {
        const container = document.getElementById('visual-container');
        const phTag = document.getElementById('ph-tag');
        const card = document.getElementById('mainCard');
        container.style.display = "block";
        canvas.width = container.offsetWidth;
        canvas.height = container.offsetHeight;
        particles = [];
        
        card.className = "card " + (heat === "exothermic" ? "exothermic" : (heat === "endothermic" ? "endothermic" : ""));

        if(env) {
            phTag.style.display = "block";
            phTag.innerText = "MUHIT: " + env.toUpperCase();
            phTag.style.background = env === 'kislotali' ? '#f87171' : (env === 'ishqoriy' ? '#3b82f6' : '#10b981');
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(particles.length < 400) {
                for(let i=0; i<8; i++) {
                    let px = mode === 'gas' ? (canvas.width/2 + (Math.random()-0.5)*50) : (Math.random()*canvas.width);
                    let py = mode === 'gas' ? (canvas.height*0.9) : 0;
                    particles.push(new Particle(px, py, mode, color));
                }
            }
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw();
                if (particles[i].opacity <= 0) particles.splice(i, 1);
            }
            animationId = requestAnimationFrame(loop);
        }
        loop();
    }

    async function askAI() {
        if(!currentInput) return;
        const st = document.getElementById('status');
        st.innerText = "TAHLIL KETMOQDA...";
        try {
            const response = await fetch(URL, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{
                        role: "user", 
                        // Promptga "products" listini qo'shdik
                        content: `Sen kimyogarsan. Reaksiyani tugalla: ${currentInput}. FAQAT JSON qaytar: {"t": "equation", "i": "explanation", "possible": true, "gas": true, "precipitate": true, "color": "hex_code", "env": "kislotali|ishqoriy|neytral", "heat": "exothermic|endothermic|none", "products": ["Product1", "Product2"]}.`
                    }],
                    response_format: { type: "json_object" }
                })
            });
            const data = await response.json();
            const res = JSON.parse(data.choices[0].message.content);
            if (!res.possible) {
                document.getElementById('display').innerText = "BU REAKSIYA BORMAYDI";
                document.getElementById('display').style.color = "var(--d)";
                st.innerText = "XATO";
            } else {
                document.getElementById('display').innerText = res.t;
                document.getElementById('display').style.color = "var(--s)";
                st.innerText = "TAYYOR";
                document.getElementById('res-box').innerHTML = `<b>Xulosa:</b> ${res.i}`;
                document.getElementById('res-box').style.display = "block";
                
                // YANGI: VIZUAL TUGMALARNI YARATISH
                const btnContainer = document.getElementById('visual-btns-container');
                btnContainer.innerHTML = '';
                if(res.products && res.products.length > 0) {
                    btnContainer.style.display = 'grid';
                    res.products.forEach(p => {
                        const b = document.createElement('button');
                        b.className = 'btn-viz';
                        b.innerText = `${p} Vizual Ko'rinishi`;
                        b.onclick = () => open3D(p);
                        btnContainer.appendChild(b);
                    });
                }

                if(res.gas) startVisual('gas', 'rgba(255,255,255,0.8)', res.env, res.heat);
                else if(res.precipitate) startVisual('precipitate', res.color, res.env, res.heat);
                else startVisual('none', null, res.env, res.heat);
            }
        } catch (e) { st.innerText = "Xatolik yuz berdi"; }
    }
</script>
</body>
</html>
