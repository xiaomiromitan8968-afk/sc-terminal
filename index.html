<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | LEGENDARY TERMINAL</title>
    <style>
        /* Asosiy sozlamalar */
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden; /* Sahifani surishni to'xtatish */
            font-family: sans-serif;
        }

        /* 1. Rasmni fon sifatida joylashtirish */
        #main-container {
            width: 100vw;
            height: 100vh;
            background: url('terminal_full_visual.png') no-repeat center center; /* Rasming nomi */
            background-size: contain; /* Rasmni butun ekran bo'ylab siqib joylash */
            position: relative;
        }

        /* 2. Tepadagi keraksiz yozuvni (Legenda) kod orqali "maskalash" yoki yopish */
        #mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10% !important; /* Yozuv turgan joyning balandligi */
            background: rgba(0, 0, 0, 0.9); /* Qora shaffof blok */
            backdrop-filter: blur(5px);
            z-index: 5; /* Boshqalardan ustun turishi */
        }

        /* 3. Shaffof tugma zonalarining umumiy uslubi */
        .click-zone {
            position: absolute;
            background: rgba(255, 255, 255, 0.0); /* Shaffof */
            border: 0px solid white; /* Agar tekshirmoqchi bo'lsang 1px qil */
            cursor: pointer;
            z-index: 10;
        }

        /* 4. TUGMALARNI JOYLASHTIRISH (Mutlaq koordinatalar) */
        /* Bu koordinatalar rasmning ekran o'lchamiga qarab biroz o'zgarishi mumkin, moslash kerak */

        #ai-terminal-btn {
            top: 15%; /* Rasmning 15% balandligidan boshlanadi */
            left: 10%; /* 10% chapdan */
            width: 80%; /* 80% kenglikda */
            height: 5%; /* 5% balandlikda */
        }

        #pair-selector {
            top: 25%;
            left: 5%;
            width: 40%;
            height: 6%;
        }

        #tf-selector {
            top: 25%;
            right: 5%;
            width: 40%;
            height: 6%;
        }

        /* Strategiya kapsulalari - Chap qator */
        .strat-left {
            left: 5%;
            width: 40%;
            height: 8%;
        }

        /* Strategiya kapsulalari - O'ng qator */
        .strat-right {
            right: 5%;
            width: 40%;
            height: 8%;
        }

        /* Har bir strategiyaning balandligi */
        #strat01 { top: 38%; } /* Fibonacci */
        #strat02 { top: 38%; } /* Trend Channel */
        #strat03 { top: 50%; } /* S/R Levels */
        #strat04 { top: 50%; } /* Sym Triangle */
        /* ...va h.k. qolganlarini qo'shib chiqish mumkin */

    </style>
</head>
<body>

    <div id="main-container">
        <div id="mask"></div>

        <div id="ai-terminal-btn" class="click-zone" onclick="window.location.href='dashboard.html'"></div>

        <div id="pair-selector" class="click-zone" onclick="alert('Tez orada pair selector qo\'shiladi')"></div>

        <div id="tf-selector" class="click-zone" onclick="alert('Tez orada taymfreym selector qo\'shiladi')"></div>

        <div id="strat01" class="click-zone strat-left" onclick="runStrat('fibo_strat.html')"></div>
        <div id="strat02" class="click-zone strat-right" onclick="runStrat('trend_channel.html')"></div>
        </div>

    <script>
        // Tanlangan para va taymfreymni strategiya fayliga yuborish
        function runStrat(fileName) {
            // Hozircha para va taymfreym tanlanmagan deb hisoblaymiz
            alert("Strategiya yuklanmoqda...");
            window.location.href = fileName + "?pair=BINANCE:BTCUSDT&tf=15";
        }
    </script>
</body>
</html>
