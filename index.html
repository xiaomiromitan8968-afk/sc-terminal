<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Chem AI Lab</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #38bdf8;
            --success: #4ade80;
            --danger: #f87171;
            --bg: #0f172a;
        }

        body {
            background-color: var(--bg);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .app-container {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 95%;
            max-width: 500px;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--accent); margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        .header p { font-size: 12px; opacity: 0.6; margin-top: 5px; }

        .screen {
            background: #000;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }

        #display {
            font-size: 28px;
            color: var(--success);
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.3);
            word-break: break-all;
        }

        #status {
            font-size: 10px;
            margin-top: 10px;
            color: var(--accent);
            letter-spacing: 1px;
            font-weight: bold;
        }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .elements-zone {
            grid-column: span 2;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .controls-zone {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button {
            border: none;
            border-radius: 12px;
            padding: 15px 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            color: white;
        }

        .btn-el { background: #334155; }
        .btn-el:hover { background: var(--accent); color: var(--primary); }
        .btn-el span { display: block; font-size: 8px; opacity: 0.5; }

        .btn-op { background: #475569; }
        .btn-ai { background: var(--accent); color: var(--primary); font-size: 16px; }
        .btn-del { background: var(--danger); }

        .result-box {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            font-size: 13px;
            display: none;
            border-left: 4px solid var(--accent);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>Smart Chem AI</h1>
        <p>Malikov Laboratory Edition</p>
    </div>

    <div class="screen">
        <div id="display">Kuting...</div>
        <div id="status">TAYYOR</div>
    </div>

    <div class="keyboard">
        <div class="elements-zone" id="el-keys"></div>
        <div class="controls-zone">
            <button class="btn-ai" onclick="askAI()">AI TAHLIL</button>
            <button class="btn-op" onclick="add('+')">+</button>
            <button class="btn-op" onclick="add('2')">2</button>
            <button class="btn-op" onclick="add('3')">3</button>
            <button class="btn-del" onclick="back()">⌫</button>
            <button class="btn-del" style="background:#dc2626" onclick="reset()">TOZALASH</button>
        </div>
    </div>

    <div id="result" class="result-box"></div>
</div>

<script>
    // Maxfiy kalit integratsiyasi
    const API_KEY = "AIzaSyDR7TGZxIZLm-odXszDoaqZXiNwYp2w3VA"; 
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    let input = "";
    const elDisplay = document.getElementById('display');
    const elStatus = document.getElementById('status');
    const elResult = document.getElementById('result');

    const elements = [
        {s:'H', n:'Vodorod'}, {s:'O', n:'Kislorod'}, {s:'Na', n:'Natriy'},
        {s:'Cl', n:'Xlor'}, {s:'C', n:'Uglerod'}, {s:'N', n:'Azot'},
        {s:'S', n:'Oltingugurt'}, {s:'Fe', n:'Temir'}, {s:'Cu', n:'Mis'}
    ];

    // Klaviaturani yaratish
    const keysDiv = document.getElementById('el-keys');
    elements.forEach(el => {
        const b = document.createElement('button');
        b.className = 'btn-el';
        b.innerHTML = `${el.s}<span>${el.n}</span>`;
        b.onclick = () => add(el.s);
        keysDiv.appendChild(b);
    });

    function add(v) {
        if(input === "") elDisplay.innerText = "";
        input += v;
        elDisplay.innerText = input;
        elResult.style.display = "none";
    }

    function reset() {
        input = "";
        elDisplay.innerText = "Reaksiyani kiriting...";
        elStatus.innerText = "TAYYOR";
        elResult.style.display = "none";
    }

    function back() {
        input = input.slice(0, -1);
        elDisplay.innerText = input || "Reaksiyani kiriting...";
    }

    async function askAI() {
        if(!input) return;
        
        elStatus.innerText = "AI TAHLIL QILMOQDA...";
        elStatus.style.color = "#fbbf24";

        const prompt = `Sen kimyogarsan. Ushbu reaksiyani tugalla va muvozanatla: ${input}. Javobni FAQAT ushbu formatda qaytar: {"t": "tenglama", "info": "izoh"}`;

        try {
            const resp = await fetch(URL, {
                method: 'POST',
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await resp.json();
            const text = data.candidates[0].content.parts[0].text;
            
            // JSONni matn ichidan ajratib olish (Xavfsiz usul)
            const jsonStr = text.match(/\{.*?\}/s)[0];
            const res = JSON.parse(jsonStr);

            elDisplay.innerText = res.t;
            elStatus.innerText = "MUVAFFARIYATLI!";
            elStatus.style.color = "#4ade80";
            
            elResult.innerHTML = `<b>Ma'lumot:</b> ${res.info}`;
            elResult.style.display = "block";

        } catch (e) {
            console.error(e);
            elStatus.innerText = "XATOLIK YUZ BERDI!";
            elStatus.style.color = "#f87171";
        }
    }

    reset();
</script>
</body>
</html>
