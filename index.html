<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | WIZARD V5</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --neon: #00ff88; --blue: #00c2ff; --pink: #ff007f; --glass: rgba(255, 255, 255, 0.08); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; min-height: 100vh; overflow: hidden; }
        .terminal { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; }
        .box { background: var(--glass); border: 1px solid var(--neon); border-radius: 15px; padding: 20px; text-align: center; margin-top: 15px; }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--blue); background: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        #chart-canvas { width: 100%; height: 280px; background: #000; border-radius: 12px; border: 1px solid #222; margin-top: 15px; }
        .status-msg { color: var(--neon); font-size: 13px; margin: 15px 0; text-align: left; padding: 12px; background: rgba(0, 255, 136, 0.05); border-radius: 8px; border-left: 3px solid var(--neon); }
        .signal-card { background: linear-gradient(135deg, rgba(0,194,255,0.15) 0%, rgba(0,255,136,0.1) 100%); padding: 18px; border-radius: 12px; border: 1px solid var(--blue); margin-top: 10px; text-align: left; }
        .loader { border: 4px solid #111; border-top: 4px solid var(--neon); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 25px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="color: var(--neon); text-align: center; letter-spacing: 4px; font-weight: 900;">SC_MALIKOV</h2>

    <div id="step-1" class="box">
        <button class="btn" onclick="selectPair('BTCUSDT')">BTC / USDT</button>
        <button class="btn" onclick="selectPair('ETHUSDT')">ETH / USDT</button>
        <button class="btn" onclick="selectPair('PAXGUSDT')">GOLD (XAU)</button>
    </div>

    <div id="step-2" class="box hidden">
        <p id="pair-display" style="color: var(--blue); font-weight: 900;"></p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" onclick="startAnalysis('1m')">M1</button>
            <button class="btn" onclick="startAnalysis('15m')">M15</button>
            <button class="btn" onclick="startAnalysis('1h')">H1</button>
            <button class="btn" onclick="startAnalysis('4h')">H4</button>
        </div>
    </div>

    <div id="step-3" class="box hidden">
        <div id="loader-box"><div class="loader"></div></div>
        <div id="result-box" class="hidden">
            <canvas id="chart-canvas"></canvas>
            <div id="bot-message" class="status-msg"></div>
            <div id="signal-info" class="signal-card"></div>
            <button class="btn" style="margin-top: 20px; border-color: var(--neon);" onclick="location.reload()">RE-SCAN</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let selectedPair = '';

    function selectPair(p) {
        selectedPair = p;
        document.getElementById('pair-display').innerText = p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    async function startAnalysis(tf) {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${selectedPair}&interval=${tf}&limit=60`);
            const data = (await res.json()).map(d => ({ o: +d[1], h: +d[2], l: +d[3], c: +d[4] }));
            renderWizard(data);
        } catch (e) { alert("API Error"); }
    }

    function renderWizard(data) {
        document.getElementById('loader-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');
        const canvas = document.getElementById('chart-canvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.width = canvas.offsetWidth * 2;
        const h = canvas.height = canvas.offsetHeight * 2;
        ctx.scale(2, 2);
        const sw = canvas.offsetWidth, sh = canvas.offsetHeight;

        const maxP = Math.max(...data.map(d => d.h)), minP = Math.min(...data.map(d => d.l));
        const range = maxP - minP, pad = range * 0.2;
        const getY = (p) => sh - 40 - ((p - minP) / range) * (sh - 80);
        const getX = (i) => (i / data.length) * sw;

        // 1. SHAMCHALAR
        data.forEach((d, i) => {
            const x = getX(i) + (sw/data.length/2);
            ctx.strokeStyle = ctx.fillStyle = d.c >= d.o ? '#00ff88' : '#ff007f';
            ctx.beginPath(); ctx.moveTo(x, getY(d.h)); ctx.lineTo(x, getY(d.l)); ctx.stroke();
            ctx.fillRect(x - 2, Math.min(getY(d.o), getY(d.c)), 4, Math.max(Math.abs(getY(d.o) - getY(d.c)), 1));
        });

        // 2. MADEL & ENTRY LOGIC ✊
        const last = data[data.length-1];
        let mTitle = "UCHBURCHAK";
        ctx.setLineDash([4, 4]); ctx.lineWidth = 2;

        // Yuqori nuqtalar (Resistance) va Pastki nuqtalar (Support)
        const h1 = maxP, h2 = last.h + (range * 0.05);
        const l1 = minP, l2 = last.l - (range * 0.05);

        // Model chizish
        ctx.strokeStyle = '#00c2ff';
        ctx.beginPath(); ctx.moveTo(getX(0), getY(h1)); ctx.lineTo(getX(data.length-1), getY(h2)); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(getX(0), getY(l1)); ctx.lineTo(getX(data.length-1), getY(l2)); ctx.stroke();

        // ENTRY NUQTASI (Narx yorib o'tish joyi)
        const entryPrice = (h2 + (range * 0.02)).toFixed(2);
        ctx.setLineDash([]); ctx.fillStyle = '#00ff88';
        ctx.beginPath(); ctx.arc(getX(data.length-1), getY(entryPrice), 5, 0, 7); ctx.fill();
        ctx.fillText("ENTRY", getX(data.length-5), getY(entryPrice) - 10);

        // 3. SIGNAL
        const tp = (last.c * 1.0161).toFixed(2), sl = (last.c * 0.992).toFixed(2);
        document.getElementById('bot-message').innerText = `Bozorda Consolidation (Uchburchak) aniqlandi. Yashil nuqta - ENTRY (Kirish) zonasi.`;
        document.getElementById('signal-info').innerHTML = `
            <b style="color:var(--blue)">🚀 SC_MALIKOV SIGNALS</b><br>
            💰 ENTRY: <b style="color:white">${entryPrice}</b><br>
            🎯 TP: <b style="color:var(--neon)">${tp}</b> | 🛑 SL: <b style="color:var(--pink)">${sl}</b>
        `;
    }
</script>
</body>
</html>
