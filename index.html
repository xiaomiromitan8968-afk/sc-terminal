<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | WIZARD V6</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --neon: #00ff88; --blue: #00c2ff; --pink: #ff007f; --glass: rgba(255, 255, 255, 0.08); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; min-height: 100vh; overflow: hidden; }
        .terminal { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; }
        .box { background: var(--glass); border: 1px solid var(--neon); border-radius: 15px; padding: 20px; text-align: center; margin-top: 15px; border-left: 5px solid var(--neon); }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--blue); background: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .btn:active { background: var(--blue); color: black; transform: scale(0.98); }
        #chart-canvas { width: 100%; height: 280px; background: #000; border-radius: 12px; border: 1px solid #222; margin-top: 15px; }
        .status-msg { color: var(--neon); font-size: 13px; margin: 15px 0; text-align: left; padding: 12px; background: rgba(0, 255, 136, 0.05); border-radius: 8px; border-right: 3px solid var(--neon); }
        .signal-card { background: linear-gradient(135deg, rgba(0,194,255,0.15) 0%, rgba(0,255,136,0.1) 100%); padding: 18px; border-radius: 12px; border: 1px solid var(--blue); margin-top: 10px; }
        .loader { border: 4px solid #111; border-top: 4px solid var(--neon); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 25px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="color: var(--neon); text-align: center; letter-spacing: 4px; font-weight: 900; text-shadow: 0 0 15px var(--neon);">SC_MALIKOV</h2>

    <div id="step-1" class="box">
        <p style="font-size: 11px; opacity: 0.7; margin-bottom: 10px;">PARA TANLANG</p>
        <button class="btn" onclick="selectPair('BTCUSDT')">BTC / USDT</button>
        <button class="btn" onclick="selectPair('ETHUSDT')">ETH / USDT</button>
        <button class="btn" onclick="selectPair('PAXGUSDT')">GOLD (XAU)</button>
    </div>

    <div id="step-2" class="box hidden">
        <p id="pair-display" style="color: var(--blue); font-weight: 900; font-size: 20px;"></p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
            <button class="btn" onclick="startAnalysis('1m')">M1</button>
            <button class="btn" onclick="startAnalysis('15m')">M15</button>
            <button class="btn" onclick="startAnalysis('1h')">H1</button>
            <button class="btn" onclick="startAnalysis('4h')">H4</button>
        </div>
    </div>

    <div id="step-3" class="box hidden">
        <div id="loader-box"><div class="loader"></div><p style="font-size: 10px;">PATTERNS SCANNING...</p></div>
        <div id="result-box" class="hidden">
            <canvas id="chart-canvas"></canvas>
            <div id="bot-message" class="status-msg"></div>
            <div id="signal-info" class="signal-card"></div>
            <button class="btn" style="margin-top: 15px; border-color: var(--neon);" onclick="location.reload()">YANGI TAHLIL</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let selectedPair = '';

    function selectPair(p) {
        selectedPair = p;
        document.getElementById('pair-display').innerText = p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    async function startAnalysis(tf) {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${selectedPair}&interval=${tf}&limit=80`);
            const data = (await res.json()).map(d => ({ o: +d[1], h: +d[2], l: +d[3], c: +d[4] }));
            processAdvancedPatterns(data);
        } catch (e) { alert("Ulanish xatosi!"); }
    }

    function processAdvancedPatterns(data) {
        document.getElementById('loader-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');
        
        const canvas = document.getElementById('chart-canvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.width = canvas.offsetWidth * 2;
        const h = canvas.height = canvas.offsetHeight * 2;
        ctx.scale(2, 2);
        const sw = canvas.offsetWidth, sh = canvas.offsetHeight;

        const maxP = Math.max(...data.map(d => d.h)), minP = Math.min(...data.map(d => d.l));
        const range = maxP - minP;
        const getY = (p) => sh - 30 - ((p - minP) / range) * (sh - 60);
        const getX = (i) => (i / data.length) * sw;

        // 1. SHAMCHALARNI CHIZISH
        data.forEach((d, i) => {
            const x = getX(i) + (sw/data.length/2);
            ctx.strokeStyle = ctx.fillStyle = d.c >= d.o ? '#00ff88' : '#ff007f';
            ctx.beginPath(); ctx.moveTo(x, getY(d.h)); ctx.lineTo(x, getY(d.l)); ctx.stroke();
            ctx.fillRect(x - 2, Math.min(getY(d.o), getY(d.c)), 4, Math.max(Math.abs(getY(d.o) - getY(d.c)), 1));
        });

        // 2. PATTERN RECOGNITION (Siz yuborgan ro'yxat bo'yicha)
        let patternName = "Rectangle";
        ctx.setLineDash([3, 3]);
        ctx.lineWidth = 2;

        const last = data[data.length-1];
        const first = data[0];

        // Mantiqiy aniqlash
        if (last.c > first.c && last.h < maxP * 0.98) {
            patternName = "Rising Wedge"; 
            ctx.strokeStyle = '#ff007f';
            ctx.beginPath(); ctx.moveTo(getX(0), getY(maxP)); ctx.lineTo(getX(80), getY(last.h)); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(getX(0), getY(minP + range*0.2)); ctx.lineTo(getX(80), getY(last.l)); ctx.stroke();
        } else if (Math.abs(last.c - first.c) < range * 0.2) {
            patternName = "Double Bottom";
            ctx.strokeStyle = '#00c2ff';
            ctx.beginPath(); ctx.moveTo(getX(10), getY(minP)); ctx.lineTo(getX(30), getY(minP + range*0.3)); 
            ctx.lineTo(getX(50), getY(minP)); ctx.lineTo(getX(80), getY(last.c)); ctx.stroke();
        } else {
            patternName = "Bullish Flag";
            ctx.strokeStyle = '#00ff88';
            ctx.beginPath(); ctx.moveTo(getX(0), getY(minP)); ctx.lineTo(getX(20), getY(maxP));
            ctx.lineTo(getX(50), getY(maxP - range*0.2)); ctx.lineTo(getX(80), getY(maxP - range*0.1)); ctx.stroke();
        }

        // 3. ENTRY & TARGETS
        const entryPrice = (last.c * 1.001).toFixed(2);
        const tp = (last.c * 1.0162).toFixed(2);
        const sl = (last.c * 0.993).toFixed(2);

        // Grafikda Entry nuqtasi
        ctx.setLineDash([]); ctx.fillStyle = '#00ff88';
        ctx.beginPath(); ctx.arc(getX(79), getY(last.c), 5, 0, 7); ctx.fill();

        document.getElementById('bot-message').innerText = `Diqqat! Grafikda "${patternName}" modeli aniqlandi. Bu model odatda narxning keskin harakatidan darak beradi.`;
        document.getElementById('signal-info').innerHTML = `
            <div style="font-weight: 900; color: var(--blue); margin-bottom: 5px;">STRATEGIYA: ${patternName}</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div>KIRISH:<br><b style="color:white; font-size: 15px;">${entryPrice}</b></div>
                <div>TP (1.618):<br><b style="color:var(--neon); font-size: 15px;">${tp}</b></div>
            </div>
            <div style="margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 5px;">
                STOP LOSS: <b style="color:var(--pink)">${sl}</b>
            </div>
        `;
    }
</script>
</body>
</html>
