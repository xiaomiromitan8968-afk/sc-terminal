<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Chem AI - Malikov Lab</title>
    <style>
        :root { --p: #0f172a; --a: #22d3ee; --s: #4ade80; --d: #f87171; }
        body { background: var(--p); color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .card { background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; border-radius: 30px; padding: 25px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        .screen { background: #000; border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 2px solid #1e293b; min-height: 90px; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        #display { font-size: 28px; color: var(--s); text-shadow: 0 0 10px rgba(74, 222, 128, 0.4); }
        #status { font-size: 10px; color: var(--a); font-weight: bold; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: 3fr 1.2fr; gap: 12px; }
        .elements { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .controls { display: flex; flex-direction: column; gap: 10px; }
        button { border: none; border-radius: 15px; padding: 15px 5px; cursor: pointer; color: #fff; font-weight: bold; transition: 0.2s; font-size: 14px; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        button:active { transform: translateY(2px); box-shadow: none; }
        .btn-el { background: #334155; }
        .btn-ai { background: var(--a); color: var(--p); height: 70px; font-size: 16px; }
        .btn-res { background: var(--d); }
        .btn-op { background: #475569; }
        #res-box { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; font-size: 13px; display: none; border-left: 5px solid var(--a); line-height: 1.5; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0 0 5px 0; color: var(--a); text-align:center;">SMART CHEM AI</h2>
    <p style="font-size: 10px; opacity: 0.5; text-align:center; margin-bottom: 20px;">O'zMU • Malikov Lab (Groq Engine)</p>

    <div class="screen">
        <div id="display">H2O + Na</div>
        <div id="status">TAYYOR</div>
    </div>

    <div class="grid">
        <div class="elements" id="el-keys"></div>
        <div class="controls">
            <button class="btn-ai" onclick="ask()">AI TAHLIL</button>
            <button class="btn-op" onclick="add(' + ')">+</button>
            <button class="btn-op" onclick="add('2')">2</button>
            <button class="btn-op" onclick="add('3')">3</button>
            <button class="btn-res" onclick="reset()">CLR</button>
        </div>
    </div>
    <div id="res-box"></div>
</div>

<script>
    // DIQQAT: Birinchi harf qat'iy ravishda kichkina 'g' bo'lishi kerak!
    const API_KEY = "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";
    const URL = "https://api.groq.com/openai/v1/chat/completions";

    let input = "H2O + Na";
    const els = ['H', 'O', 'Na', 'Cl', 'C', 'N', 'S', 'Fe', 'Cu', 'Al', 'Mg', 'K'];
    
    const keysDiv = document.getElementById('el-keys');
    els.forEach(e => {
        const b = document.createElement('button');
        b.className = 'btn-el';
        b.innerText = e;
        b.onclick = () => add(e);
        keysDiv.appendChild(b);
    });

    function add(v) {
        const display = document.getElementById('display');
        if(input === "" || display.innerText.includes("→")) input = "";
        input += v;
        display.innerText = input;
        document.getElementById('status').innerText = "TAYYOR";
        document.getElementById('status').style.color = "var(--a)";
    }

    function reset() {
        input = "";
        document.getElementById('display').innerText = "...";
        document.getElementById('status').innerText = "TAYYOR";
        document.getElementById('status').style.color = "var(--a)";
        document.getElementById('res-box').style.display = "none";
    }

    async function ask() {
        if(!input || input === "...") return;
        const st = document.getElementById('status');
        const box = document.getElementById('res-box');
        
        st.innerText = "TAHLIL KETMOQDA...";
        st.style.color = "var(--a)";
        
        try {
            const response = await fetch(URL, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{
                        role: "user", 
                        content: `Sen profissionalsan. Kimyoviy reaksiyani tugalla va muvozanatla: ${input}. FAQAT JSON formatda qaytar: {"t": "tenglama", "i": "izoh"}`
                    }],
                    response_format: { type: "json_object" }
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error.message || "Tarmoq xatosi");
            }

            const res = JSON.parse(data.choices[0].message.content);

            document.getElementById('display').innerText = res.t;
            st.innerText = "MUVAFFAQIYATLI!";
            st.style.color = "var(--s)";
            box.innerHTML = `<b>Natija:</b> ${res.i}`;
            box.style.display = "block";

        } catch (e) {
            st.innerText = "XATO: " + e.message;
            st.style.color = "var(--d)";
            console.error(e);
        }
    }
</script>
</body>
</html>
