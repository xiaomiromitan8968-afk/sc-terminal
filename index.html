<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Chem AI - Mistral Edition</title>
    <style>
        :root { --p: #0f172a; --a: #c084fc; --s: #4ade80; --d: #f87171; }
        body { background: var(--p); color: #fff; font-family: system-ui; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px; border-radius: 25px; padding: 25px; text-align: center; }
        .screen { background: #000; border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
        #display { font-size: 26px; color: var(--s); }
        .grid { display: grid; grid-template-columns: 3fr 1fr; gap: 10px; }
        .elements { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        button { border: none; border-radius: 12px; padding: 15px 5px; cursor: pointer; color: #fff; font-weight: bold; }
        .btn-el { background: #334155; }
        .btn-ai { background: var(--a); color: #000; height: 60px; }
        #res-box { margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px; display: none; font-size: 13px; text-align: left; border-left: 4px solid var(--a); }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: var(--a);">SMART CHEM AI (Mistral)</h2>
    <div class="screen">
        <div id="display">H2O + Na</div>
        <div id="status" style="font-size: 10px; color: var(--a); margin-top: 5px;">TAYYOR</div>
    </div>

    <div class="grid">
        <div class="elements" id="el-keys"></div>
        <div class="controls" style="display:flex; flex-direction:column; gap:8px;">
            <button class="btn-ai" onclick="askAI()">AI TAHLIL</button>
            <button style="background:#475569" onclick="add(' + ')">+</button>
            <button style="background:#f87171" onclick="reset()">CLR</button>
        </div>
    </div>
    <div id="res-box"></div>
</div>

<script>
    // Bu bepul API kalit (Hugging Face)
    const API_TOKEN = "AIzaSyB6R0stMD2iDqus63IgYVOk5KNGfuOOG8E"; // BU YERGA O'ZINGIZNI TOKENINGIZNI QO'YISHINGIZ KERAK
    
    let input = "H2O + Na";
    const els = ['H', 'O', 'Na', 'Cl', 'C', 'N', 'S', 'Fe', 'Cu', 'Al', 'Mg', 'K'];
    const keysDiv = document.getElementById('el-keys');
    
    els.forEach(e => {
        const b = document.createElement('button');
        b.className = 'btn-el';
        b.innerText = e;
        b.onclick = () => { input += e; document.getElementById('display').innerText = input; };
        keysDiv.appendChild(b);
    });

    function reset() { input = ""; document.getElementById('display').innerText = "..."; }

    async function askAI() {
        const st = document.getElementById('status');
        st.innerText = "MISTRAL TAHLIL QILMOQDA...";
        
        try {
            // Hugging Face bepul Inference API
            const response = await fetch(
                "https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2",
                {
                    headers: { Authorization: `Bearer ${API_TOKEN}` },
                    method: "POST",
                    body: JSON.stringify({ inputs: `Finish this chemical reaction: ${input}. Give only the equation.` }),
                }
            );
            const result = await response.json();
            document.getElementById('display').innerText = result[0].generated_text.split('\n')[0];
            st.innerText = "TUGALLANDI!";
        } catch (e) {
            st.innerText = "Xatolik! Tokenni tekshiring.";
        }
    }
</script>
</body>
</html>
