<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>SATS Strategiya Signallari</title>
    <style>
        body { font-family: sans-serif; background-color: #131722; color: #d1d4dc; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .signal-card { 
            border-radius: 8px; padding: 15px; margin-bottom: 15px; 
            border-left: 5px solid #ccc; background-color: #1c2030;
        }
        .buy { border-color: #00e676; } /* Bull Color */
        .sell { border-color: #ff5252; } /* Bear Color */
        .header { display: flex; justify-content: space-between; align-items: center; }
        .score { font-weight: bold; color: #2962ff; }
        .details { font-size: 0.9em; margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Self-Aware Trend System (SATS) Signallari</h1>
    <div id="signals-list">
        </div>
</div>

<script>
    // Pine Script-dagi JSON formatiga mos struktura
    function createSignalElement(data) {
        const div = document.createElement('div');
        div.className = `signal-card ${data.action}`;
        
        div.innerHTML = `
            <div class="header">
                <strong style="color: ${data.action === 'buy' ? '#00e676' : '#ff5252'}">
                    ${data.action.toUpperCase()} | ${data.ticker} | TF: ${data.tf}
                </strong>
                <span>Narx: ${data.price}</span>
            </div>
            <div class="details">
                <div>Score: <span class="score">${data.score}/102</span></div>
                <div>TQI: ${data.tqi}</div>
                <div>SL: ${data.sl}</div>
                <div>TP1: ${data.tp1}</div>
                <div>TP2: ${data.tp2}</div>
                <div>TP3: ${data.tp3}</div>
            </div>
        `;
        return div;
    }

    // TradingView-dan kelishi mumkin bo'lgan namunaviy ma'lumot
    const mockSignal = {
        action: "buy",
        ticker: "BTCUSDT",
        tf: "1H",
        price: 65432.10,
        sl: 64200.00,
        tp1: 66500.00,
        tp2: 67800.00,
        tp3: 69000.00,
        score: 85,
        tqi: 0.75
    };

    // Sahifaga signalni qo'shish
    document.getElementById('signals-list').appendChild(createSignalElement(mockSignal));
</script>

</body>
</html>
