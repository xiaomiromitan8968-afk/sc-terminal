<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | STRATEGY CORE</title>
    <style>
        :root { --neon: #00ff88; --red: #ff4444; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; padding: 15px; box-sizing: border-box; }
        .active { display: flex !important; }
        
        .header { text-align: center; border-bottom: 2px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { font-size: 18px; color: var(--neon); margin: 0; text-transform: uppercase; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow-y: auto; }
        .btn { background: #111; color: #fff; border: 1px solid #333; padding: 18px 5px; border-radius: 12px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn:active { background: var(--neon); color: #000; }
        .full { grid-column: span 2; border: 1px solid var(--neon); color: var(--neon); }

        /* Vizual Grafik qismi */
        .chart-mock { width: 100%; height: 40vh; border: 1px solid #222; border-radius: 10px; position: relative; background: #050505; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .bar { position: absolute; width: 6px; background: var(--neon); border-radius: 1px; }
        .bar.down { background: var(--red); }
        
        .res-card { background: #0a0a0a; margin-top: 15px; padding: 15px; border-radius: 12px; border-top: 4px solid var(--neon); flex-grow: 1; }
        .signal-row { display: flex; justify-content: space-between; margin: 15px 0; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .sig-val { text-align: center; }
        .sig-val small { color: #888; font-size: 10px; display: block; }
        .sig-val b { font-size: 15px; color: var(--neon); }
    </style>
</head>
<body>

<div id="s1" class="screen active">
    <div class="header"><h1>SC_MALIKOV | ASSET</h1></div>
    <div class="menu-grid">
        <button class="btn" onclick="nav(2, 'p', 'BTC/USDT')">BTC / USDT</button>
        <button class="btn" onclick="nav(2, 'p', 'GOLD (XAU)')">XAU / USD</button>
        <button class="btn" onclick="nav(2, 'p', 'SOL/USDT')">SOL / USDT</button>
        <button class="btn" onclick="nav(2, 'p', 'EUR/USD')">EUR / USD</button>
    </div>
</div>

<div id="s2" class="screen">
    <div class="header"><h1>16 STRATEGIYA</h1></div>
    <div class="menu-grid">
        <button class="btn full" onclick="run('FIBO')">TEXO: FIBO 1.618 + ENGULFING</button>
        <button class="btn" onclick="run('PIN')">PA: PIN-BAR</button>
        <button class="btn" onclick="run('RET')">PA: RETEST</button>
        <button class="btn" onclick="run('ENG')">PA: ENGULFING</button>
        <button class="btn" onclick="run('SMC')">SMC: BOS/CHOCH</button>
        <button class="btn" onclick="run('QM')">SMC: QUASIMODO</button>
    </div>
</div>

<div id="s3" class="screen">
    <div class="chart-mock" id="chart">
        </div>
    <div class="res-card" id="report">
        Tahlil qilinmoqda...
    </div>
    <button class="btn full" style="margin-top:10px;" onclick="location.reload()">YANGI TAHLIL</button>
</div>

<script>
    let db = { p: '', s: '' };

    function nav(n, k, v) {
        db[k] = v;
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('s' + n).classList.add('active');
    }

    function run(s) {
        db.s = s;
        nav(3);
        buildChart();
        buildReport();
    }

    function buildChart() {
        const c = document.getElementById('chart');
        c.innerHTML = '';
        for(let i=0; i<30; i++) {
            let h = Math.random() * 80 + 20;
            let pos = i * 12 + 10;
            let isUp = Math.random() > 0.4;
            let bar = document.createElement('div');
            bar.className = 'bar' + (isUp ? '' : ' down');
            bar.style.height = h + 'px';
            bar.style.left = pos + 'px';
            bar.style.bottom = (Math.random() * 40 + 20) + '%';
            c.appendChild(bar);
        }
        // Strategiya chizig'i
        let line = document.createElement('div');
        line.style = "position:absolute; width:100%; height:2px; background:var(--neon); opacity:0.5; top:40%;";
        if(db.s === 'FIBO') line.innerText = "FIBO 1.618";
        c.appendChild(line);
    }

    function buildReport() {
        let entry = (Math.random() * 1000 + 50000).toFixed(2);
        let sl = (entry * 0.994).toFixed(2);
        let tp = (entry * 1.025).toFixed(2);
        let info = "";

        if(db.s === 'FIBO') {
            info = "<b>TEXO TRADE:</b> Engulfing shamchasi aniqlandi. Fibo 1.618 darajasi maqsad qilib olindi.";
        } else if(db.s === 'PIN') {
            info = "<b>PA 10-STRATEGIYA:</b> Pin-bar shamchasi trend qaytishini ko'rsatmoqda (PDF 19-bet).";
        } else {
            info = "<b>SC_MALIKOV AI:</b> Bozor dinamikasi PDF strategiyalariga muvofiq tahlil qilindi.";
        }

        document.getElementById('report').innerHTML = `
            <div style="font-weight:bold; color:var(--neon); margin-bottom:10px;">${db.p} | ${db.s}</div>
            <div class="signal-row">
                <div class="sig-val"><small>KIRISH</small><b>${entry}</b></div>
                <div class="sig-val"><small style="color:var(--red)">S/L</small><b style="color:var(--red)">${sl}</b></div>
                <div class="sig-val"><small>T/P</small><b>${tp}</b></div>
            </div>
            <p style="font-size:12px; color:#ccc; line-height:1.4;">${info}</p>
        `;
    }
</script>
</body>
</html>
