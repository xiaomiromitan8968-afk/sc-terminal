<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | WIZARD TERMINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303; --neon: #00ff88; --blue: #00c2ff; --pink: #ff007f; --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 420px; padding: 20px; box-sizing: border-box; }
        .box {
            background: var(--glass); border: 1px solid var(--neon); border-radius: 15px;
            padding: 20px; text-align: center; margin-top: 15px; box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }
        .hidden { display: none !important; }
        .btn {
            width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--blue);
            background: none; color: white; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn:active { background: var(--blue); color: black; transform: scale(0.98); }
        .grid-tf { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .tf-btn { padding: 10px; border: 1px solid var(--neon); background: none; color: white; border-radius: 5px; cursor: pointer; }
        .status-msg { color: var(--neon); font-size: 14px; line-height: 1.5; margin: 15px 0; text-align: left; }
        #analysis-img { width: 100%; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
        .loader { border: 4px solid #111; border-top: 4px solid var(--neon); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--neon); text-align: center; letter-spacing: 3px; font-weight: 900;">WIZARD TERMINAL</h2>

    <div id="step-1" class="box">
        <p style="font-size: 14px; letter-spacing: 1px;">PARA TANLANG</p>
        <button class="btn" onclick="nextStep('BTCUSDT')">BTC / USDT</button>
        <button class="btn" onclick="nextStep('ETHUSDT')">ETH / USDT</button>
        <button class="btn" onclick="nextStep('XAUUSD')">GOLD (XAUUSD)</button>
    </div>

    <div id="step-2" class="box hidden">
        <p id="pair-display" style="color: var(--blue); font-weight: bold;"></p>
        <div class="grid-tf">
            <button class="tf-btn" onclick="startAnalysis('1m')">1M</button>
            <button class="tf-btn" onclick="startAnalysis('5m')">5M</button>
            <button class="tf-btn" onclick="startAnalysis('15m')">15M</button>
            <button class="tf-btn" onclick="startAnalysis('1h')">1H</button>
            <button class="tf-btn" onclick="startAnalysis('4h')">4H</button>
            <button class="tf-btn" onclick="startAnalysis('1d')">1D</button>
        </div>
        <button class="btn" style="border-color: var(--pink); margin-top: 20px;" onclick="reset()">ORQAGA</button>
    </div>

    <div id="step-3" class="box hidden">
        <div id="loader-box">
            <div class="loader"></div>
            <p>BOZOR SKANERLANMOQDA...</p>
        </div>
        <div id="result-box" class="hidden">
            <img id="analysis-img" src="" alt="Tahlil Grafigi">
            <div id="bot-text" class="status-msg"></div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="border-color: var(--neon);" onclick="subscribe()">HA</button>
                <button class="btn" style="border-color: var(--pink);" onclick="reset()">YO'Q</button>
            </div>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let pair = ''; let tf = '';

    function nextStep(p) {
        pair = p;
        document.getElementById('pair-display').innerText = "PARA: " + p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    function reset() {
        location.reload();
    }

    async function startAnalysis(selectedTf) {
        tf = selectedTf;
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');

        try {
            const response = await fetch('https://SIZNING-SERVERINGIZ.uz/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ pair: pair, tf: tf })
            });
            const data = await response.json();
            
            document.getElementById('loader-box').classList.add('hidden');
            document.getElementById('result-box').classList.remove('hidden');
            document.getElementById('analysis-img').src = "data:image/png;base64," + data.image;
            document.getElementById('bot-text').innerText = data.message;
        } catch (e) {
            tg.showAlert("Server xatosi! Python kodi yoqilganligini tekshiring.");
            reset();
        }
    }

    function subscribe() {
        tg.showConfirm("Kuzatuv yoqilsinmi? Narx tana bilan yopilsa bildirishnoma olasiz.", (ok) => {
            if(ok) {
                tg.sendData(JSON.stringify({pair: pair, tf: tf, action: "track"}));
                tg.close();
            }
        });
    }
</script>
</body>
</html>
