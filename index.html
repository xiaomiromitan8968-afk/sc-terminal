<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | REAL-TIME</title>
    <style>
        :root { --neon: #00ff88; --red: #ff4444; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; padding: 10px; box-sizing: border-box; }
        .active { display: flex !important; }
        
        .header { text-align: center; border-bottom: 2px solid var(--neon); padding: 8px 0; margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; overflow-y: auto; flex-grow: 1; }
        
        .btn { background: #111; color: #fff; border: 1px solid #333; padding: 14px 5px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn:active { background: var(--neon); color: #000; }
        .btn-pro { grid-column: span 2; border: 1px solid var(--neon); color: var(--neon); }

        #tv-container { width: 100%; height: 50vh; border: 1px solid #222; border-radius: 10px; overflow: hidden; }
        .analysis-box { background: #0a0a0a; padding: 15px; border-radius: 10px; border-top: 3px solid var(--neon); margin-top: 10px; flex-grow: 1; overflow-y: auto; }
        
        .sig-row { display: flex; justify-content: space-between; background: #111; padding: 10px; border-radius: 8px; margin: 10px 0; }
        .sig-item { text-align: center; }
        .sig-item b { display: block; color: var(--neon); font-size: 14px; }
    </style>
</head>
<body>

<div id="p1" class="screen active">
    <div class="header"><b>SC_MALIKOV | ASSET</b></div>
    <div class="grid">
        <button class="btn" onclick="next(2, 'symbol', 'FX:XAUUSD')">GOLD (XAU/USD)</button>
        <button class="btn" onclick="next(2, 'symbol', 'BINANCE:BTCUSDT')">BITCOIN (BTC/USDT)</button>
        <button class="btn btn-pro" onclick="next(2, 'symbol', 'FX:EURUSD')">EURO (EUR/USD)</button>
    </div>
</div>

<div id="p2" class="screen">
    <div class="header"><b>TIMEFRAME</b></div>
    <div class="grid">
        <button class="btn" onclick="next(3, 'tf', '1')">1 MINUT</button>
        <button class="btn" onclick="next(3, 'tf', '5')">5 MINUT</button>
        <button class="btn" onclick="next(3, 'tf', '15')">15 MINUT</button>
        <button class="btn" onclick="next(3, 'tf', '30')">30 MINUT</button>
        <button class="btn" onclick="next(3, 'tf', '60')">1 SOAT</button>
        <button class="btn" onclick="next(3, 'tf', '240')">4 SOAT</button>
        <button class="btn btn-pro" onclick="next(3, 'tf', 'D')">1 KUN (DAILY)</button>
    </div>
</div>

<div id="p3" class="screen">
    <div class="header"><b>16 TA STRATEGIYA</b></div>
    <div class="grid">
        <button class="btn btn-pro" onclick="run('FIBO 1.618')">1. TEXO: FIBO 1.618 + ENGULFING</button>
        <button class="btn" onclick="run('GORIZONTAL')">2. PA: GORIZONTAL</button>
        <button class="btn" onclick="run('TREND KANAL')">3. PA: TREND KANAL</button>
        <button class="btn" onclick="run('SIMMETRIK')">4. PA: SIMMETRIK</button>
        <button class="btn" onclick="run('ASCENDING')">5. PA: ASCENDING</button>
        <button class="btn" onclick="run('DESCENDING')">6. PA: DESCENDING</button>
        <button class="btn" onclick="run('BAYROQ')">7. PA: BAYROQ</button>
        <button class="btn" onclick="run('H&S')">8. PA: H&S</button>
        <button class="btn" onclick="run('DOUBLE TOP')">9. PA: DOUBLE TOP</button>
        <button class="btn" onclick="run('WEDGE')">10. PA: WEDGE</button>
        <button class="btn" onclick="run('PIN-BAR')">11. PA: PIN-BAR</button>
        <button class="btn" onclick="run('ENGULFING')">12. PA: ENGULFING</button>
        <button class="btn" onclick="run('M-PATTERN')">13. PA: M-PATTERN</button>
        <button class="btn" onclick="run('W-PATTERN')">14. PA: W-PATTERN</button>
        <button class="btn" onclick="run('BREAKOUT')">15. PA: BREAKOUT</button>
        <button class="btn" onclick="run('RETEST')">16. PA: RETEST MODULI</button>
    </div>
</div>

<div id="p4" class="screen">
    <div id="tv-container"></div>
    <div id="result" class="analysis-box">Tahlil ketmoqda...</div>
    <button class="btn btn-pro" style="margin-top:10px" onclick="location.reload()">BOSH MENYU</button>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    let app = { symbol: '', tf: '', strat: '' };

    function next(s, k, v) {
        app[k] = v;
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById('p' + s).classList.add('active');
    }

    function run(s) {
        app.strat = s;
        next(4);
        
        // TradingView Real-Time Widget
        new TradingView.widget({
            "autosize": true,
            "symbol": app.symbol,
            "interval": app.tf,
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "tv-container"
        });

        setTimeout(generateSignal, 2000);
    }

    function generateSignal() {
        // PDF qoidalari va real ma'lumot simulyatsiyasi
        let msg = `<b>AI TAHLILI:</b> PDF qoidalariga ko'ra ${app.strat} signali ko'rib chiqildi. `;
        if(app.strat.includes('FIBO')) msg += "Texo Trade metodikasi bo'yicha 1.618 darajasi kutilmoqda.";
        else if(app.strat.includes('PIN')) msg += "10-strategiya bo'yicha Pin-bar aniqlandi.";

        document.getElementById('result').innerHTML = `
            <b style="color:var(--neon)">${app.symbol.split(':')[1]} | TF: ${app.tf}m | ${app.strat}</b>
            <div class="sig-row">
                <div class="sig-item"><small>STATUS</small><b style="color:var(--neon)">LIVE ANALYZING</b></div>
                <div class="sig-item"><small>VOLATILITY</small><b>HIGH</b></div>
            </div>
            <p style="font-size:12px; color:#ccc;">${msg}</p>
        `;
    }
</script>
</body>
</html>
