<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | UI DESIGN</title>
    <style>
        :root { --neon: #00ff88; --bg: #030303; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Outfit', sans-serif; margin: 0; padding: 15px; overflow-x: hidden; }
        
        /* Glassmorphism Card Style */
        .card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--neon); margin-bottom: 15px; font-weight: bold; }

        /* 1-BO'LIM: PARALAR (ASSETS) */
        .asset-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .asset-item { background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 12px; padding: 12px 5px; text-align: center; transition: 0.3s; cursor: pointer; }
        .asset-item b { display: block; font-size: 13px; color: #fff; }
        .asset-item span { font-size: 9px; color: #888; }
        .asset-item.active { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,255,136,0.3); background: rgba(0,255,136,0.05); }

        /* 2-BO'LIM: TAYMFREYM (TIMEFRAME) */
        .tf-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .tf-item { min-width: 60px; background: #111; border: 1px solid #333; padding: 10px; border-radius: 10px; text-align: center; font-size: 12px; font-weight: bold; }
        .tf-item.active { background: var(--neon); color: #000; border-color: var(--neon); }

        /* 3-BO'LIM: STRATEGIYALAR */
        .strat-list { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .strat-btn { background: linear-gradient(90deg, rgba(255,255,255,0.05), transparent); border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.2s; }
        .strat-btn:active { transform: scale(0.98); background: rgba(255,255,255,0.1); }
        .strat-btn b { font-size: 13px; }
        .strat-btn .num { color: var(--neon); font-family: monospace; font-size: 14px; margin-right: 10px; }

        /* FOOTER: ORQAGA */
        .footer { margin-top: auto; padding: 20px 0; }
        .back-btn { width: 100%; background: transparent; border: 1px solid var(--red); color: #ff4444; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .back-btn:active { background: rgba(255,68,68,0.1); }
    </style>
</head>
<body>

    <div class="section-title">01. Savdo Juftliklari</div>
    <div class="card asset-grid">
        <div class="asset-item active"><b>BTC</b><span>BITCOIN</span></div>
        <div class="asset-item"><b>XAU</b><span>GOLD</span></div>
        <div class="asset-item"><b>EUR</b><span>EURO</span></div>
    </div>

    <div class="section-title">02. Taymfreym (M1-D1)</div>
    <div class="card tf-scroll">
        <div class="tf-item">M1</div>
        <div class="tf-item">M5</div>
        <div class="tf-item active">M15</div>
        <div class="tf-item">M30</div>
        <div class="tf-item">H1</div>
        <div class="tf-item">H4</div>
        <div class="tf-item">D1</div>
    </div>

    <div class="section-title">03. Strategiyalar</div>
    <div class="strat-list">
        <div class="strat-btn"><span class="num">01</span><b>TEXO: FIBO 1.618 + ENGULFING</b><span>➔</span></div>
        <div class="strat-btn"><span class="num">02</span><b>PA: GORIZONTAL LINIYA</b><span>➔</span></div>
        <div class="strat-btn"><span class="num">03</span><b>PA: TREND KANAL</b><span>➔</span></div>
        <div class="strat-btn"><span class="num">11</span><b>PA: PIN-BAR STRATEGIYASI</b><span>➔</span></div>
        <div class="strat-btn"><span class="num">16</span><b>PA: RETEST MODULI</b><span>➔</span></div>
    </div>

    <div class="footer">
        <button class="back-btn" onclick="alert('Asosiy menyuga qaytiladi')">
            <span>⬅</span> ORQAGA QAYTISH
        </button>
    </div>

</body>
</html>
