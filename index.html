<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | Professional AI Terminal</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff88; --bg: #020202; --red: #ff3b3b; --gray: #1a1a1a; }
        body { background: var(--bg); color: #fff; font-family: 'JetBrains Mono', monospace; margin: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; flex-direction: column; align-items: center; justify-content: center; padding: 15px; box-sizing: border-box; }
        .active { display: flex !important; }
        
        /* UI Elementlari */
        .title { font-size: 20px; color: var(--neon); text-transform: uppercase; margin-bottom: 25px; letter-spacing: 3px; }
        .btn-list { width: 100%; max-width: 450px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .full-btn { grid-column: span 2; }
        .choice-btn { 
            background: var(--gray); color: #fff; border: 1px solid #333; padding: 18px; 
            border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s;
        }
        .choice-btn:active { background: var(--neon); color: #000; border-color: var(--neon); }

        /* Analiz Sahifasi */
        #final-screen { flex-direction: column; padding: 0; }
        #chart-box { width: 100%; height: 55vh; position: relative; border-bottom: 2px solid var(--neon); }
        .ai-dashboard { 
            width: 100%; height: 45vh; background: #080808; padding: 15px; box-sizing: border-box;
            overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
        }
        
        /* Signal Kartochkasi */
        .signal-card { border: 2px solid var(--neon); padding: 15px; border-radius: 10px; background: rgba(0,255,136,0.03); }
        .entry-box { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; }
        .price-tag { color: var(--neon); font-weight: bold; }
        .logic-view { font-size: 12px; color: #bbb; line-height: 1.6; border-left: 2px solid var(--neon); padding-left: 10px; margin-top: 10px; }
        
        .badge-buy { background: var(--neon); color: #000; padding: 4px 10px; border-radius: 4px; font-size: 14px; }
        .badge-sell { background: var(--red); color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>

<div id="s1" class="screen active">
    <div class="title">STEP 1: SELECT PAIR</div>
    <div class="btn-list">
        <button class="choice-btn" onclick="next(2,'p','BINANCE:BTCUSDT')">BTC / USDT</button>
        <button class="choice-btn" onclick="next(2,'p','OANDA:XAUUSD')">XAU / USD (GOLD)</button>
        <button class="choice-btn" onclick="next(2,'p','FX:EURUSD')">EUR / USD</button>
        <button class="choice-btn" onclick="next(2,'p','BINANCE:ETHUSDT')">ETH / USDT</button>
    </div>
</div>

<div id="s2" class="screen">
    <div class="title">STEP 2: TIMEFRAME</div>
    <div class="btn-list">
        <button class="choice-btn" onclick="next(3,'t','15')">15 MINUTES</button>
        <button class="choice-btn" onclick="next(3,'t','60')">1 HOUR</button>
        <button class="choice-btn" onclick="next(3,'t','240')">4 HOURS</button>
        <button class="choice-btn" onclick="next(3,'t','D')">1 DAY</button>
    </div>
</div>

<div id="s3" class="screen">
    <div class="title">STEP 3: SELECT STRATEGY</div>
    <div class="btn-list">
        <button class="choice-btn" onclick="finish('SMC')">16. SMC (BOS/CHOCH)</button>
        <button class="choice-btn" onclick="finish('PIN')">10. PIN-BAR REVERSAL</button>
<button class="choice-btn" onclick="finish('TRI')">3. TRIANGLE PATTERN</button>
        <button class="choice-btn" onclick="finish('RET')">15. BREAKOUT RETEST</button>
        <button class="choice-btn full-btn" onclick="finish('ENG')">11. ENGULFING (YUTISH)</button>
    </div>
</div>

<div id="final-screen" class="screen">
    <div id="chart-box"></div>
    <div class="ai-dashboard">
        <div id="signal-ui"></div>
        <button class="choice-btn" onclick="location.reload()" style="margin-top:auto;">NEW ANALYSIS</button>
    </div>
</div>

<script>
    let state = { p:'', t:'', s:'' };

    function next(step, key, val) {
        state[key] = val;
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById('s' + step).classList.add('active');
    }

    function finish(strat) {
        state.s = strat;
        next('final-screen');
        
        new TradingView.widget({
            "autosize": true, "symbol": state.p, "interval": state.t,
            "theme": "dark", "container_id": "chart-box", "locale": "uz",
            "studies": ["PivotPointsHighLow@tv-basicstudies"]
        });

        generateProfessionalAnalysis();
    }

    function generateProfessionalAnalysis() {
        const ui = document.getElementById('signal-ui');
        let side = Math.random() > 0.5 ? "BUY" : "SELL";
        let badge = side === "BUY" ? "badge-buy" : "badge-sell";
        
        // Narxlarni simulyatsiya qilish (Haqiqiy treyder kabi)
        let entry = (Math.random() * 100 + 50000).toFixed(2);
        let sl = side === "BUY" ? (entry * 0.995).toFixed(2) : (entry * 1.005).toFixed(2);
        let tp = side === "BUY" ? (entry * 1.015).toFixed(2) : (entry * 0.985).toFixed(2);

        let logicHtml = "";
        if(state.s === 'SMC') {
            logicHtml = <b>AI TAHLIL (SMC):</b> Narx likvidlikni (LQ) tozaladi. Grafingizda ko'ringan Pivot nuqtasi BOS (Break of Structure) bo'lib xizmat qildi. ChoCh tasdiqlandi. Kirish tartibi: Order Block (OB).;
        } else if(state.s === 'PIN') {
            logicHtml = <b>AI TAHLIL (PIN-BAR):</b> PDF 10-betga muvofiq, narx yuqori qarshilikda "rejection" (rad etish) ko'rsatdi. Pin-bar dumi trend o'zgarishini tasdiqladi.;
        } else {
            logicHtml = <b>AI TAHLIL:</b> PDF-dagi pattern shakllandi. Grafikdagi siqilish nuqtasi (Apex) sinib o'tildi. Volume tasdiqlangan.;
        }

        ui.innerHTML = 
            <div class="signal-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="${badge}">${side} SIGNAL</span>
                    <span style="font-size:10px; color:#888;">SC_MALIKOV V4.0</span>
                </div>
                
                <div class="entry-box">
                    <div>ENTRY: <br><span class="price-tag">${entry}</span></div>
                    <div>S/L: <br><span style="color:var(--red)">${sl}</span></div>
                    <div>T/P: <br><span style="color:var(--neon)">${tp}</span></div>
                </div>

                <div class="logic-view">
                    ${logicHtml}
                </div>
                
                <div style="font-size:10px; color:var(--neon); margin-top:10px; text-align:center; border-top:1px solid #333; padding-top:5px;">
                    GRAFIKDA CHIZIQLAR (BOS/OB) PIVOT NUQTALARI ORQALI BELGILANDI
                </div>
            </div>
        ;
    }
</script>

</body>
</html>
