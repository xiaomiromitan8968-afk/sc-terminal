<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | WIZARD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --neon: #00ff88; --blue: #00c2ff; --pink: #ff007f; --glass: rgba(255, 255, 255, 0.08); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; min-height: 100vh; overflow: hidden; }
        .terminal { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; }
        .box { background: var(--glass); border: 1px solid var(--neon); border-radius: 15px; padding: 20px; text-align: center; margin-top: 15px; box-shadow: 0 0 20px rgba(0, 255, 136, 0.15); }
        .hidden { display: none !important; }
        .btn { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--blue); background: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .btn:active { background: var(--blue); color: black; transform: scale(0.98); }
        
        #chart-canvas { width: 100%; height: 260px; background: #000; border-radius: 12px; border: 1px solid #222; margin-top: 15px; }
        
        .status-msg { color: var(--neon); font-size: 13px; margin: 15px 0; text-align: left; line-height: 1.6; padding: 12px; background: rgba(0, 255, 136, 0.05); border-radius: 8px; border-left: 3px solid var(--neon); }
        .signal-card { background: linear-gradient(135deg, rgba(0,194,255,0.15) 0%, rgba(0,255,136,0.1) 100%); padding: 18px; border-radius: 12px; border: 1px solid var(--blue); margin-top: 10px; text-align: left; }
        .loader { border: 4px solid #111; border-top: 4px solid var(--neon); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 25px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="color: var(--neon); text-align: center; letter-spacing: 4px; font-weight: 900; text-shadow: 0 0 15px var(--neon);">SC_MALIKOV</h2>

    <div id="step-1" class="box">
        <p style="font-size: 12px; opacity: 0.8; margin-bottom: 15px;">VALYUTA JUFTLIGINI TANLANG</p>
        <button class="btn" onclick="selectPair('BTCUSDT')">BTC / USDT</button>
        <button class="btn" onclick="selectPair('ETHUSDT')">ETH / USDT</button>
        <button class="btn" onclick="selectPair('PAXGUSDT')">GOLD (XAU/USD)</button>
    </div>

    <div id="step-2" class="box hidden">
        <p id="pair-display" style="color: var(--blue); font-weight: 900; font-size: 18px;"></p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
            <button class="btn" onclick="startAnalysis('1m')">M1</button>
            <button class="btn" onclick="startAnalysis('15m')">M15</button>
            <button class="btn" onclick="startAnalysis('1h')">H1</button>
            <button class="btn" onclick="startAnalysis('4h')">H4</button>
        </div>
        <button class="btn" style="border-color: var(--pink); margin-top: 15px; opacity: 0.7;" onclick="location.reload()">ORQAGA</button>
    </div>

    <div id="step-3" class="box hidden">
        <div id="loader-box">
            <div class="loader"></div>
            <p style="font-size: 11px;">BOZORNI TAHLIL QILISH...</p>
        </div>
        
        <div id="result-box" class="hidden">
            <canvas id="chart-canvas"></canvas>
            <div id="bot-message" class="status-msg"></div>
            <div id="signal-info" class="signal-card"></div>
            <button class="btn" style="margin-top: 20px; border-color: var(--neon);" onclick="location.reload()">QAYTA TAHLIL</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let selectedPair = '';

    function selectPair(p) {
        selectedPair = p;
        document.getElementById('pair-display').innerText = p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    async function startAnalysis(tf) {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');

        try {
            // Ma'lumot olish
            const response = await fetch(`https://api.binance.com/api/v3/klines?symbol=${selectedPair}&interval=${tf}&limit=50`);
            if (!response.ok) throw new Error('Network error');
            const rawData = await response.json();
            
            const data = rawData.map(d => ({
                o: parseFloat(d[1]), h: parseFloat(d[2]), l: parseFloat(d[3]), c: parseFloat(d[4])
            }));

            renderUI(data);
        } catch (e) {
            document.getElementById('loader-box').innerHTML = "<p style='color:red'>Xatolik! Internet yoki API ulanishini tekshiring.</p>";
        }
    }

    function renderUI(data) {
        document.getElementById('loader-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');
        
        const canvas = document.getElementById('chart-canvas');
        const ctx = canvas.getContext('2d');
        const w = canvas.width = canvas.offsetWidth;
        const h = canvas.height = canvas.offsetHeight;

        const maxP = Math.max(...data.map(d => d.h));
        const minP = Math.min(...data.map(d => d.l));
        const range = maxP - minP;
        const pad = range * 0.15;
        
        const getY = (p) => h - ((p - (minP - pad)) / (range + pad * 2)) * h;
        const getX = (i) => (i / data.length) * w;

        // 1. SHAMCHALAR
        data.forEach((d, i) => {
            const x = getX(i) + (w / data.length / 2);
            const isUp = d.c >= d.o;
            ctx.strokeStyle = ctx.fillStyle = isUp ? '#00ff88' : '#ff007f';
            
            ctx.beginPath();
            ctx.moveTo(x, getY(d.h)); ctx.lineTo(x, getY(d.l));
            ctx.stroke();
            
            const yO = getY(d.o), yC = getY(d.c);
            ctx.fillRect(x - 2, Math.min(yO, yC), 4, Math.max(Math.abs(yO - yC), 1));
        });

        // 2. MADEL TANLASH (TREND, FLET, UCHBURCHAK)
        ctx.setLineDash([5, 5]);
        ctx.lineWidth = 2;
        let mTitle = "";
        
        const change = Math.abs(data[0].c - data[data.length-1].c);
        
        if (change > range * 0.5) {
            mTitle = "TREND LINIYASI";
            ctx.strokeStyle = "#00c2ff";
            ctx.beginPath();
            ctx.moveTo(getX(0), getY(data[0].l));
            ctx.lineTo(getX(data.length-1), getY(data[data.length-1].c));
            ctx.stroke();
        } else if (range < (data[data.length-1].c * 0.003)) {
            mTitle = "FLET (TAYANCH VA QARSHILIK)";
            ctx.strokeStyle = "#00c2ff";
            ctx.beginPath(); ctx.moveTo(0, getY(maxP)); ctx.lineTo(w, getY(maxP)); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, getY(minP)); ctx.lineTo(w, getY(minP)); ctx.stroke();
        } else {
            mTitle = "UCHBURCHAK";
            ctx.strokeStyle = "#ff007f";
            ctx.beginPath(); ctx.moveTo(getX(0), getY(maxP)); ctx.lineTo(getX(data.length-1), getY(data[data.length-1].h + pad/2)); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(getX(0), getY(minP)); ctx.lineTo(getX(data.length-1), getY(data[data.length-1].l - pad/2)); ctx.stroke();
        }
        ctx.setLineDash([]);

        // 3. SIGNAL
        const last = data[data.length-1].c;
        document.getElementById('bot-message').innerText = `Bozorda "${mTitle}" modeli aniqlandi. Narx chiziqlarga yaqinlashmoqda.`;
        document.getElementById('signal-info').innerHTML = `
            <div style="font-weight: 900; color: var(--blue);">🚀 SC_MALIKOV SIGNAL</div>
            <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                <div>🎯 TP (1.618):<br><b style="color:var(--neon); font-size:16px;">${(last*1.0161).toFixed(2)}</b></div>
                <div>🛑 SL (Fibo 0):<br><b style="color:var(--pink); font-size:16px;">${(last*0.994).toFixed(2)}</b></div>
            </div>
        `;
    }
</script>
</body>
</html>
