<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SC_MALIKOV | V18</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #010101; --neon: #00ff88; --blue: #00c2ff; --pink: #ff007f; --glass: rgba(255, 255, 255, 0.03); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .terminal { width: 100%; max-width: 420px; padding: 15px; box-sizing: border-box; }
        .box { background: var(--glass); border: 1px solid rgba(0, 255, 136, 0.2); border-radius: 15px; padding: 20px; text-align: center; margin-top: 15px; }
        .hidden { display: none !important; }
        .pair-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { width: 100%; padding: 12px; border: 1px solid var(--blue); background: none; color: white; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; transition: 0.2s; }
        .btn:active { background: var(--blue); color: #000; transform: scale(0.96); }
        #chart-canvas { width: 100%; height: 260px; background: #000; border-radius: 12px; border: 1px solid #1a1a1a; margin-top: 15px; }
        .status-msg { color: var(--neon); font-size: 12px; margin: 15px 0; text-align: left; padding: 10px; border-left: 3px solid var(--neon); background: rgba(0, 255, 136, 0.05); }
        .signal-card { background: rgba(0, 194, 255, 0.08); padding: 15px; border-radius: 12px; border: 1px solid var(--blue); margin-top: 10px; }
        .loader { border: 3px solid #111; border-top: 3px solid var(--neon); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .pattern-badge { display: inline-block; padding: 3px 8px; background: rgba(0, 194, 255, 0.2); color: var(--blue); border-radius: 5px; font-size: 9px; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="color: var(--neon); text-align: center; font-weight: 900; letter-spacing: 2px;">SC_MALIKOV</h2>

    <div id="step-1" class="box">
        <div class="pair-grid">
            <button class="btn" onclick="selectPair('EURUSDT')">EUR / USD</button>
            <button class="btn" onclick="selectPair('BTCUSDT')">BTC / USDT</button>
            <button class="btn" onclick="selectPair('SOLUSDT')">SOL / USDT</button>
            <button class="btn" onclick="selectPair('XAUUSDT')">GOLD (XAU)</button>
        </div>
    </div>

    <div id="step-2" class="box hidden">
        <p id="pair-display" style="color: var(--blue); font-weight: 900;"></p>
        <div class="pair-grid">
            <button class="btn" onclick="startAnalysis('5m')">M5</button>
            <button class="btn" onclick="startAnalysis('15m')">M15</button>
            <button class="btn" onclick="startAnalysis('1h')">H1</button>
            <button class="btn" onclick="startAnalysis('4h')">H4</button>
        </div>
    </div>

    <div id="step-3" class="box hidden">
        <div id="loader-box"><div class="loader"></div><p style="font-size: 10px;">MARKET STRUCTURE TAHLIL QILINMOQDA...</p></div>
        <div id="result-box" class="hidden">
            <div id="pattern-name" class="pattern-badge">TAHLIL...</div>
            <canvas id="chart-canvas"></canvas>
            <div id="bot-message" class="status-msg"></div>
            <div id="signal-info" class="signal-card"></div>
            <button class="btn" style="margin-top: 15px; border-color: var(--pink);" onclick="cancelSignal()">RESET (YANGI ANALIZ)</button>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    let selectedPair = '';
    let storageKey = '';

    function selectPair(p) {
        selectedPair = p;
        storageKey = `sc_v18_${p}`;
        document.getElementById('pair-display').innerText = p;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    }

    async function startAnalysis(tf) {
        document.getElementById('step-2').classList.add('hidden');
        document.getElementById('step-3').classList.remove('hidden');
        try {
            const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${selectedPair}&interval=${tf}&limit=120`);
            const data = (await res.json()).map(d => ({ o: +d[1], h: +d[2], l: +d[3], c: +d[4] }));
            processAnalysis(data);
        } catch (e) { alert("Tarmoq xatosi!"); }
    }

    function processAnalysis(data) {
        document.getElementById('loader-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');

        const canvas = document.getElementById('chart-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth * 2; canvas.height = canvas.offsetHeight * 2;
        ctx.scale(2, 2);
        const w = canvas.offsetWidth, h = canvas.offsetHeight;

        const maxP = Math.max(...data.map(d => d.h)), minP = Math.min(...data.map(d => d.l));
        const getY = (p) => h - 40 - ((p - minP) / (maxP - minP)) * (h - 80);
        const getX = (i) => (i / data.length) * w;

        // 1. Pivotlarni topish (Trend chiziqlari uchun)
        let highs = [], lows = [];
        for (let i = 5; i < data.length - 5; i++) {
            if (data[i].h === Math.max(...data.slice(i-5, i+5).map(d => d.h))) highs.push({ idx: i, val: data[i].h });
            if (data[i].l === Math.min(...data.slice(i-5, i+5).map(d => d.l))) lows.push({ idx: i, val: data[i].l });
        }

        // Shamchalar chizmasi
        data.forEach((d, i) => {
            const x = getX(i) + (w/data.length/2);
            ctx.strokeStyle = ctx.fillStyle = d.c >= d.o ? '#00ff88' : '#ff007f';
            ctx.beginPath(); ctx.moveTo(x, getY(d.h)); ctx.lineTo(x, getY(d.l)); ctx.stroke();
            ctx.fillRect(x - 1.5, Math.min(getY(d.o), getY(d.c)), 3, Math.max(Math.abs(getY(d.o) - getY(d.c)), 1));
        });

        // 2. Trend va Pattern tahlili
        let resSlope = 0, supSlope = 0, finalResY = maxP, finalSupY = minP;
        if (highs.length >= 2) {
            const h1 = highs[highs.length-2], h2 = highs[highs.length-1];
            resSlope = (h2.val - h1.val) / (h2.idx - h1.idx);
            finalResY = h1.val + resSlope * (data.length - 1 - h1.idx);
            ctx.setLineDash([4,4]); ctx.strokeStyle = '#ff007f'; ctx.beginPath();
            ctx.moveTo(getX(h1.idx), getY(h1.val)); ctx.lineTo(w, getY(finalResY)); ctx.stroke();
        }
        if (lows.length >= 2) {
            const l1 = lows[lows.length-2], l2 = lows[lows.length-1];
            supSlope = (l2.val - l1.val) / (l2.idx - l1.idx);
            finalSupY = l1.val + supSlope * (data.length - 1 - l1.idx);
            ctx.setLineDash([4,4]); ctx.strokeStyle = '#00ff88'; ctx.beginPath();
            ctx.moveTo(getX(l1.idx), getY(l1.val)); ctx.lineTo(w, getY(finalSupY)); ctx.stroke();
        }

        // Pattern nomini aniqlash
        let pName = "SIDEWAYS";
        if (resSlope < 0 && supSlope > 0) pName = "TRIANGLE (UCHBURCHAK)";
        else if (resSlope > 0 && supSlope > 0) pName = "ASCENDING CHANNEL";
        else if (resSlope < 0 && supSlope < 0) pName = "DESCENDING CHANNEL";
        document.getElementById('pattern-name').innerText = pName;

        // 3. SMC ENTRY/TP/SL LOGIKASI
        const last = data[data.length - 1];
        const precision = selectedPair.includes('EUR') ? 5 : 2;
        let activeSignal = JSON.parse(localStorage.getItem(storageKey));

        if (!activeSignal) {
            // Local Swing (Oxirgi 20 sham ichidagi eng muhim nuqtalar)
            const recent = data.slice(-20);
            const localHigh = Math.max(...recent.map(d => d.h));
            const localLow = Math.min(...recent.map(d => d.l));

            if (last.c > finalResY) { // Buy Breakout
                const entry = last.c;
                const sl = localLow; // SL oxirgi local minimumga
                const risk = entry - sl;
                const tp = entry + (risk * 2.1); // TP 1:2 RR dan balandroq

                activeSignal = { type: "BUY", entry: entry, tp: +tp.toFixed(precision), sl: +sl.toFixed(precision) };
                localStorage.setItem(storageKey, JSON.stringify(activeSignal));
            } 
            else if (last.c < finalSupY) { // Sell Breakout
                const entry = last.c;
                const sl = localHigh; // SL oxirgi local maximumga
                const risk = sl - entry;
                const tp = entry - (risk * 2.1);

                activeSignal = { type: "SELL", entry: entry, tp: +tp.toFixed(precision), sl: +sl.toFixed(precision) };
                localStorage.setItem(storageKey, JSON.stringify(activeSignal));
            }
        }

        // Monitoring & Rendering
        if (activeSignal) {
            let status = "🔒 SIGNAL LOCKED (TP/SL KUTILMOQDA)";
            if (activeSignal.type === "BUY") {
                if (last.h >= activeSignal.tp) { status = "✅ TP HIT!"; localStorage.removeItem(storageKey); }
                else if (last.l <= activeSignal.sl) { status = "❌ SL HIT!"; localStorage.removeItem(storageKey); }
            } else {
                if (last.l <= activeSignal.tp) { status = "✅ TP HIT!"; localStorage.removeItem(storageKey); }
                else if (last.h >= activeSignal.sl) { status = "❌ SL HIT!"; localStorage.removeItem(storageKey); }
            }
            document.getElementById('bot-message').innerText = status;
            document.getElementById('signal-info').innerHTML = `
                <div style="font-weight:900; color:var(--blue); margin-bottom:10px;">${activeSignal.type} POSITION</div>
                <div style="display:flex; justify-content:space-between; font-size:12px;">
                    <span>ENTRY: <b>${activeSignal.entry}</b></span>
                    <span style="color:var(--neon)">TP: <b>${activeSignal.tp}</b></span>
                </div>
                <div style="margin-top:5px; color:var(--pink); font-size:11px;">STOP LOSS: ${activeSignal.sl}</div>
            `;
        } else {
            document.getElementById('bot-message').innerText = "Bozor tahlil qilindi. Buzilish (Breakout) kutilmoqda...";
            document.getElementById('signal-info').innerHTML = "<span style='opacity:0.5'>NO ACTIVE SIGNAL</span>";
        }
    }

    function cancelSignal() {
        localStorage.removeItem(storageKey);
        location.reload();
    }
</script>
</body>
</html>
