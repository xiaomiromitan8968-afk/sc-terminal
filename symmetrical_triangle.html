<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC_MALIKOV | SYMMETRICAL TRIANGLE</title>
    <style>
        :root { --neon: #00ff88; --red: #ff4444; --bg: #030303; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        #tv-chart { width: 100%; height: 45vh; border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .signal-card { background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 15px; padding: 15px; margin-top: 15px; border-left: 5px solid #00d4ff; }
        .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .box { background: #111; padding: 12px; border-radius: 10px; text-align: center; border: 1px solid #222; }
        .box small { display: block; font-size: 9px; color: #888; margin-bottom: 4px; }
        .box b { font-size: 13px; color: #00d4ff; }
        .btn-back { width: 100%; margin-top: 20px; padding: 15px; background: transparent; border: 1px solid #333; color: #fff; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <b id="pair-display">...</b>
        <span style="color: #00d4ff; font-size: 12px;">SIMMETRIK UCHBURCHAK</span>
    </div>

    <div id="tv-chart"></div>

    <div class="signal-card">
        <div style="font-size: 11px; color: #888;">BOZOR HOLATI:</div>
        <div id="triangle-status" style="font-weight: bold; margin: 5px 0; color: #00d4ff;">NARX SIQILMOQDA...</div>
        
        <div class="analysis-grid">
            <div class="box"><small>BREAKOUT BUY</small><b id="buy-level">0.00</b></div>
            <div class="box"><small>BREAKOUT SELL</small><b id="sell-level" style="color:var(--red)">0.00</b></div>
        </div>
        
        <p style="font-size: 11px; color: #aaa; margin-top: 15px; line-height: 1.4;">
            <b>LOGIKA:</b> Simmetrik uchburchak ikki tomonlama figura. Yorib o'tish qaysi tomonga bo'lsa, o'sha tomonga qarab signal qabul qilinadi.
        </p>
    </div>

    <button class="btn-back" onclick="window.history.back()">⬅ ORQAGA QAYTISH</button>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pair = urlParams.get('pair') || 'BINANCE:BTCUSDT';
        const tf = urlParams.get('tf') || '15';

        document.getElementById('pair-display').innerText = pair.split(':')[1];

        new TradingView.widget({
            "autosize": true, "symbol": pair, "interval": tf, "theme": "dark", "container_id": "tv-chart", "hide_side_toolbar": false
        });

        async function getTriangleData() {
            try {
                let sym = pair.split(':')[1].replace('XAUUSD', 'PAXGUSDT');
                let res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`);
                let data = await res.json();
                let price = parseFloat(data.price);
                let pD = pair.includes('EUR') ? 4 : 2;

                // Breakout darajalarini hisoblash (taxminiy uchburchak uchi)
                let range = price * 0.008; // 0.8% li diapazon
                document.getElementById('buy-level').innerText = (price + range).toFixed(pD);
                document.getElementById('sell-level').innerText = (price - range).toFixed(pD);

            } catch(e) { console.error("Price fetch error"); }
        }

        setTimeout(getTriangleData, 2000);
    </script>
</body>
</html>
