<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC_MALIKOV | FIBO 1.618</title>
    <style>
        :root { --neon: #00ff88; --red: #ff4444; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 15px; }
        #chart { width: 100%; height: 45vh; border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        
        .signal-card { background: rgba(255,255,255,0.03); border: 1px solid #222; border-radius: 15px; padding: 20px; margin-top: 15px; }
        .badge { background: var(--neon); color: #000; padding: 5px 15px; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        
        .price-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .p-box { background: #111; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #222; }
        .p-box small { display: block; font-size: 10px; color: #888; margin-bottom: 5px; }
        .p-box b { font-size: 14px; color: var(--neon); }

        .desc { font-size: 12px; color: #aaa; line-height: 1.5; border-left: 2px solid var(--neon); padding-left: 10px; }
        .back-btn { width: 100%; margin-top: 20px; padding: 15px; background: transparent; border: 1px solid #333; color: #fff; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <b id="pair-name">BTC/USDT</b>
        <span style="color: var(--neon);">FIBO 1.618</span>
    </div>

    <div id="chart"></div>

    <div class="signal-card" id="signal-box">
        <span class="badge">Analiz qilinmoqda...</span>
    </div>

    <button class="back-btn" onclick="window.history.back()">⬅ ORQAGA QAYTISH</button>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const pair = params.get('pair') || 'BINANCE:BTCUSDT';
        const tf = params.get('tf') || '15';

        document.getElementById('pair-name').innerText = pair.split(':')[1];

        // TradingView grafikni yuklash
        new TradingView.widget({
            "autosize": true, "symbol": pair, "interval": tf, "theme": "dark", "container_id": "chart", "hide_side_toolbar": true
        });

        // Strategiya mantiqi
        async function runFiboStrategy() {
            try {
                let sym = pair.split(':')[1].replace('XAUUSD', 'PAXGUSDT');
                let res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${sym}`);
                let data = await res.json();
                let price = parseFloat(data.price);
                
                let pD = pair.includes('EUR') ? 4 : 2;
                
                // Mantiq: Fibo 1.618 target hisoblash
                let entry = price;
                let sl = (entry * 0.994).toFixed(pD); // 0.6% stop
                let tp = (entry * 1.018).toFixed(pD); // 1.8% profit (1:3 ratio)

                document.getElementById('signal-box').innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="badge">BUY SIGNAL</span>
                        <small style="color:#888;">TF: ${tf}M</small>
                    </div>
                    
                    <div class="price-row">
                        <div class="p-box"><small>ENTRY</small><b>${entry.toFixed(pD)}</b></div>
                        <div class="p-box"><small>STOP LOSS</small><b style="color:var(--red)">${sl}</b></div>
                        <div class="p-box"><small>TAKE PROFIT</small><b>${tp}</b></div>
                    </div>
                    
                    <div class="desc">
                        <b>TEXO TRADE:</b> Engulfing shamchasi aniqlandi. Narx Fibo 1.618 tashqi darajasini test qilmoqda. 1:3 risk/mukofot nisbati tavsiya etiladi.
                    </div>
                `;
            } catch(e) {
                console.log("Narx olishda xato!");
            }
        }

        setTimeout(runFiboStrategy, 2000);
    </script>
</body>
</html>
