<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI FIBONACCI ANALYZER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050505;
            --neon-green: #00ff88;
            --neon-blue: #00c2ff;
            --glass: rgba(0, 255, 136, 0.05);
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 15px;
            text-align: center;
        }

        /* --- HEADER --- */
        .header { margin-bottom: 20px; }
        .header h2 { font-family: 'Orbitron'; color: var(--neon-green); letter-spacing: 3px; }

        /* --- TRADINGVIEW WIDGET --- */
        #tv-container {
            width: 100%;
            height: 350px;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            margin-bottom: 20px;
        }

        /* --- AI PROOF BOX (SUN'IY ONG ISBOTI) --- */
        #ai-proof-box {
            display: none; /* Signal chiqmaguncha yopiq turadi */
            background: var(--glass);
            border: 2px dashed var(--neon-green);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
            to { box-shadow: 0 0 30px rgba(0, 255, 136, 0.4); }
        }

        .ai-title { font-family: 'Orbitron'; font-size: 14px; color: var(--neon-blue); margin-bottom: 10px; }
        .logic-text { font-size: 13px; line-height: 1.6; color: #ccc; margin-bottom: 15px; }
        .pattern-img { width: 100%; max-width: 300px; border-radius: 10px; border: 1px solid #333; }

        .btn-back {
            display: inline-block;
            margin-top: 20px;
            color: #555;
            text-decoration: none;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>FIBONACCI CORE</h2>
        <div id="status" style="font-size: 10px; color: var(--neon-blue);">AI SCANNING MARKET...</div>
    </div>

    <div id="tv-container"></div>

    <div id="ai-proof-box">
        <div class="ai-title">🧠 NEURAL LOGIC ANALYSIS</div>
        <p id="logic-content" class="logic-text"></p>
        
        <div style="color: #444; font-size: 9px; margin-bottom: 5px;">IDEAL PATTERN REFERENCE</div>
        <img id="logic-image" class="pattern-img" src="" alt="Neural Pattern">
    </div>

    <a href="dashboard.html" class="btn-back">ORQAGA QAYTISH</a>

    <script>
        // URL'dan ma'lumotlarni olish
        const urlParams = new URLSearchParams(window.location.search);
        const pair = urlParams.get('pair') || 'BINANCE:BTCUSDT';
        const tf = urlParams.get('tf') || '15';

        // 1. TradingView Widgetni yuklash
        function loadTV() {
            const container = document.getElementById('tv-container');
            const script = document.createElement('script');
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
            script.async = true;
            script.innerHTML = JSON.stringify({
                "interval": tf === 'D' ? "1d" : tf + "m",
                "width": "100%",
                "height": "100%",
                "symbol": pair,
                "showIntervalTabs": false,
                "locale": "en",
                "colorTheme": "dark",
                "isTransparent": true
            });
            container.appendChild(script);

            // 2. Widget yuklangandan keyin AI analizni boshlash
            setTimeout(runAIIntelligence, 3000);
        }

        // 2. SUN'IY ONG ANALIZI (ISBOT BILAN)
        async function runAIIntelligence() {
            const proofBox = document.getElementById('ai-proof-box');
            const logicText = document.getElementById('logic-content');
            const logicImg = document.getElementById('logic-image');
            const status = document.getElementById('status');

            // Ma'lumotlarni tahlil qilish simulyatsiyasi
            status.innerText = "NEURAL FILTERING ACTIVE...";
            await new Promise(r => setTimeout(r, 2000));

            // Fibonacci bo'yicha tahlil natijasi
            const result = "BUY"; // Bu yerda aslida widgetdan ma'lumot olinadi

            if(result === "BUY") {
                status.innerText = "SIGNAL DETECTED: STRONG BUY";
                status.style.color = "var(--neon-green)";
                
                // AI Mantiqiy isboti
                logicText.innerText = "AI Tahlili: Narx Fibonacci 0.618 'Golden Ratio' darajasiga yetdi. Ushbu nuqtada yirik banklar va institusional treyderlarning sotib olish buyurtmalari (buy limits) jamlangan. Neyron tarmoq 85% aniqlik bilan qaytishni bashorat qilmoqda.";
                
                // Vizual rasm (Fibonacci ideal pattern)
                logicImg.src = "https://www.investopedia.com/thmb/pU_r-eM-WqGZ6Xz2l1S3y_6X-tM=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/FibonacciRetracementLevels-730a94b5952c4b8b9b5a8e6e5a6a6a6a.png";
                
                proofBox.style.display = "block";

                // Ovozli xabar
                const speech = new SpeechSynthesisUtterance("Strong Fibonacci buy signal detected. High probability at zero point six one eight level.");
                window.speechSynthesis.speak(speech);
            }
        }

        window.onload = loadTV;
    </script>
</body>
</html>
