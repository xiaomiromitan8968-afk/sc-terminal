<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; }
        #lab-canvas { border: 2px solid #333; box-shadow: 0 0 50px rgba(0, 255, 0, 0.1); margin-top: 20px; border-radius: 50%; }
        .terminal { width: 400px; background: rgba(0, 20, 0, 0.9); padding: 15px; border-radius: 10px; margin-top: 20px; border-left: 5px solid #00ff00; }
        .btn-chaos { 
            padding: 20px 40px; background: transparent; border: 2px solid #00ff00; color: #00ff00; 
            font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 20px; margin-top: 20px;
        }
        .btn-chaos:hover { background: #00ff00; color: #000; box-shadow: 0 0 30px #00ff00; }
        .score-box { font-size: 24px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1 style="letter-spacing: 10px;">NANO-GEN v1.0</h1>

    <canvas id="lab-canvas" width="400" height="400"></canvas>

    <div class="terminal">
        <div class="score-box">STABILITY: <span id="stability">0%</span></div>
        <div id="log">> Tizim tayyor. Tajribani boshlang...</div>
    </div>

    <button class="btn-chaos" onclick="triggerChaos()">CHAOS GENERATION</button>

    <script>
        const canvas = document.getElementById('lab-canvas');
        const ctx = canvas.getContext('2d');
        const log = document.getElementById('log');
        const stability = document.getElementById('stability');

        function triggerChaos() {
            // Animatsiya effekti
            log.innerText = "> Atomlar to'qnashuvi hisoblanmoqda...";
            let count = 0;
            let interval = setInterval(() => {
                drawRandomAtoms();
                count++;
                if(count > 10) {
                    clearInterval(interval);
                    finalizeDiscovery();
                }
            }, 100);
        }

        function drawRandomAtoms() {
            ctx.clearRect(0, 0, 400, 400);
            for(let i=0; i<8; i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*400, Math.random()*400, Math.random()*20+10, 0, Math.PI*2);
                ctx.fillStyle = Math.random() > 0.5 ? '#00ff00' : '#ff00ff';
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.stroke();
            }
        }

        function finalizeDiscovery() {
            const score = Math.floor(Math.random() * 100);
            stability.innerText = score + "%";
            
            if(score > 70) {
                log.innerHTML = "<span style='color:yellow'>> KASHFIYOT! Barqaror nano-tuzilma aniqlandi.</span>";
                drawMolecule();
            } else {
                log.innerText = "> Tajriba muvaffaqiyatsiz: Struktura beqaror.";
            }
        }

        function drawMolecule() {
            ctx.clearRect(0, 0, 400, 400);
            ctx.beginPath();
            ctx.moveTo(150, 200); ctx.lineTo(250, 200);
            ctx.lineTo(200, 150); ctx.closePath();
            ctx.strokeStyle = "#00ff00"; ctx.lineWidth = 5; ctx.stroke();
            // Atomlar
            [150, 250, 200].forEach(x => {
                ctx.beginPath(); ctx.arc(x, x == 200 ? 150 : 200, 20, 0, Math.PI*2);
                ctx.fillStyle = "#00ff00"; ctx.fill();
            });
        }
    </script>
</body>
</html>
