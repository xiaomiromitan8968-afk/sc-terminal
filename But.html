<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #020617; color: #22d3ee; font-family: sans-serif; overflow: hidden; margin: 0; }
        #canvas { cursor: crosshair; }
        .ui { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
              background: rgba(15, 23, 42, 0.8); padding: 15px; border-radius: 20px; border: 1px solid #22d3ee; text-align: center; }
        button { background: #22d3ee; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="ui">
        <div id="status">Atomlarni bir-biriga yaqinlashtiring</div>
        <button onclick="reset()">LOBORATORIYANI TOZALASH</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let atoms = [];
        const types = {
            C: { color: '#444', r: 25, bonds: 4 },
            H: { color: '#fff', r: 15, bonds: 1 }
        };

        class Atom {
            constructor(x, y, type) {
                this.x = x; this.y = y;
                this.type = type;
                this.r = types[type].r;
                this.color = types[type].color;
                this.isDragging = false;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15; ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // Atomlarni yaratish
        for(let i=0; i<10; i++) {
            atoms.push(new Atom(Math.random()*canvas.width, Math.random()*canvas.height, Math.random() > 0.3 ? 'C' : 'H'));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Bog'lanishlarni chizish (Fizika)
            atoms.forEach((a, i) => {
                atoms.forEach((b, j) => {
                    if(i !== j) {
                        let dist = Math.hypot(a.x - b.x, a.y - b.y);
                        if(dist < 100) {
                            ctx.beginPath();
                            ctx.moveTo(a.x, a.y);
                            ctx.lineTo(b.x, b.y);
                            ctx.strokeStyle = `rgba(34, 211, 238, ${1 - dist/100})`;
                            ctx.lineWidth = 3;
                            ctx.stroke();
                        }
                    }
                });
                a.draw();
            });
            requestAnimationFrame(animate);
        }

        // Drag & Drop mantiqi
        let selectedAtom = null;
        canvas.onmousedown = (e) => {
            atoms.forEach(a => {
                if(Math.hypot(a.x - e.clientX, a.y - e.clientY) < a.r) selectedAtom = a;
            });
        };
        window.onmousemove = (e) => {
            if(selectedAtom) { selectedAtom.x = e.clientX; selectedAtom.y = e.clientY; }
        };
        window.onmouseup = () => selectedAtom = null;

        function reset() { atoms.forEach(a => { a.x = Math.random()*canvas.width; a.y = Math.random()*canvas.height; }); }

        animate();
    </script>
</body>
</html>
