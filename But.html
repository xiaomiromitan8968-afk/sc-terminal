<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Al Kimyogar | Reaction Lab</title>
    <style>
        body { background: #050810; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .lab-card { background: #0f172a; border: 2px solid #22d3ee; border-radius: 20px; padding: 25px; width: 350px; box-shadow: 0 0 20px rgba(34, 211, 238, 0.2); }
        h3 { color: #22d3ee; text-align: center; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid #334155; border-radius: 8px; color: #00ff00; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00ff00; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #result-box { margin-top: 20px; padding: 15px; border-radius: 10px; background: rgba(34, 211, 238, 0.1); display: none; }
        .equation { font-size: 18px; color: #f472b6; text-align: center; margin-bottom: 10px; }
        .note { font-size: 13px; color: #e2e8f0; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="lab-card">
        <h3>REAKSIYA LABORATORIYASI</h3>
        
        <div class="input-group">
            <label>1-Reagent</label>
            <input type="text" id="r1" placeholder="Masalan: NaOH">
        </div>

        <div style="text-align: center; margin-bottom: 15px; color: #22d3ee; font-weight: bold;">+</div>

        <div class="input-group">
            <label>2-Reagent</label>
            <input type="text" id="r2" placeholder="Masalan: HCl">
        </div>

        <button onclick="predictReaction()">REAKSIYANI BOSHLASH</button>

        <div id="result-box">
            <div class="equation" id="eq-out"></div>
            <div class="note" id="note-out"></div>
        </div>
    </div>

    <script>
        function predictReaction() {
            const r1 = document.getElementById('r1').value.trim().toLowerCase();
            const r2 = document.getElementById('r2').value.trim().toLowerCase();
            const box = document.getElementById('result-box');
            const eq = document.getElementById('eq-out');
            const note = document.getElementById('note-out');

            box.style.display = 'block';

            // Oddiy mantiqiy baza (Keyinchalik buni kengaytirish mumkin)
            if ((r1 === 'naoh' && r2 === 'hcl') || (r1 === 'hcl' && r2 === 'naoh')) {
                eq.innerHTML = "NaOH + HCl → NaCl + H₂O";
                note.innerHTML = "<b>Neytrallanish reaksiyasi:</b> Osh tuzi va suv hosil bo'ladi. Reaksiya ekzotermik (issiqlik chiqishi bilan) boradi.";
            } 
            else if ((r1 === 'h2so4' && r2 === 'naoh') || (r1 === 'naoh' && r2 === 'h2so4')) {
                eq.innerHTML = "H₂SO₄ + 2NaOH → Na₂SO₄ + 2H₂O";
                note.innerHTML = "<b>Neytrallanish:</b> Natriy sulfat tuzi va suv hosil bo'ladi.";
            }
            else if ((r1 === 'ch4' && r2 === 'o2') || (r1 === 'o2' && r2 === 'ch4')) {
                eq.innerHTML = "CH₄ + 2O₂ → CO₂ + 2H₂O";
                note.innerHTML = "<b>Yonish reaksiyasi:</b> Metan havoda yonib, karbonat angidrid va suv bug'ini hosil qiladi.";
            }
            else {
                eq.innerHTML = "Noma'lum reaksiya";
                note.innerHTML = "Ushbu reagentlar o'rtasidagi reaksiya bazada mavjud emas yoki ular oddiy sharoitda reaksiyaga kirishmaydi.";
            }
        }
    </script>
</body>
</html>
