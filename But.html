<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #050810; color: #22d3ee; font-family: 'Segoe UI', sans-serif; text-align: center; padding-top: 50px; }
        .audio-card { 
            background: rgba(15, 23, 42, 0.9); border: 2px solid #22d3ee; 
            padding: 30px; border-radius: 30px; display: inline-block;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.3);
        }
        .visualizer { display: flex; align-items: flex-end; justify-content: center; gap: 3px; height: 100px; margin: 20px 0; }
        .bar { width: 10px; background: #00ff00; border-radius: 5px; transition: height 0.1s; }
        .atom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { 
            padding: 15px; border-radius: 15px; border: none; font-weight: bold; 
            cursor: pointer; background: #1e293b; color: white; transition: 0.3s;
        }
        button:active { transform: scale(0.95); }
        .H { border: 2px solid #fff; } .O { border: 2px solid #ff4444; }
        .C { border: 2px solid #555; } .N { border: 2px solid #4444ff; }
    </style>
</head>
<body>

    <div class="audio-card">
        <h2>MOLECULAR AUDIO-LAB</h2>
        <div class="visualizer" id="viz">
            </div>
        <p id="info">Elementni tanlang va uning energiyasini eshiting</p>

        <div class="atom-grid">
            <button class="H" onclick="playSound(261.63, 'Vodorod: Yengil va ochiq tovush')">H (Vodorod)</button>
            <button class="C" onclick="playSound(329.63, 'Uglerod: Barqaror va chuqur')">C (Uglerod)</button>
            <button class="N" onclick="playSound(392.00, 'Azot: Intensiv chastota')">N (Azot)</button>
            <button class="O" onclick="playSound(440.00, 'Kislorod: Yuqori energiya')">O (Kislorod)</button>
        </div>
    </div>

    <script>
        const viz = document.getElementById('viz');
        for(let i=0; i<15; i++) {
            let bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.height = '10px';
            viz.appendChild(bar);
        }

        let audioCtx = null;

        function playSound(freq, text) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 1);

            document.getElementById('info').innerText = text;
            animateViz();
        }

        function animateViz() {
            const bars = document.querySelectorAll('.bar');
            bars.forEach(b => {
                b.style.height = Math.random() * 80 + 20 + 'px';
                setTimeout(() => b.style.height = '10px', 300);
            });
        }
    </script>
</body>
</html>
