<!DOCTYPE html>
<html>
<head>
    <style>
        :root { --neon: #22d3ee; --dark: #020617; }
        body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .matrix-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 30px; }
        .element-card { 
            width: 80px; height: 100px; border: 1px solid rgba(34, 211, 238, 0.3);
            border-radius: 12px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; cursor: pointer; transition: 0.4s;
            background: linear-gradient(145deg, #0f172a, #020617);
        }
        .element-card:hover { 
            border-color: var(--neon); box-shadow: 0 0 20px var(--neon);
            transform: translateY(-5px);
        }
        .symbol { font-size: 24px; font-weight: bold; color: var(--neon); }
        .atomic-num { font-size: 10px; position: absolute; top: 5px; left: 5px; }
        
        .info-panel { 
            margin-top: 40px; width: 90%; max-width: 400px; padding: 20px;
            border-radius: 20px; background: rgba(34, 211, 238, 0.1);
            border: 1px solid var(--neon); display: none;
            backdrop-filter: blur(10px);
        }
        .nano-tag { background: #ff00ff; color: white; padding: 3px 8px; border-radius: 5px; font-size: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <h2 style="color:var(--neon)">NANO-ELEMENTS MATRIX</h2>

    <div class="matrix-grid">
        <div class="element-card" onclick="showInfo('H', 1, 'Nano-yoqilg\'i elementlari va vodorod saqlash tizimlarining asosi.')">
            <span class="symbol">H</span>
            <span style="font-size:10px">Hydrogen</span>
        </div>
        <div class="element-card" onclick="showInfo('C', 6, 'Grafen, nano-trubkalar va fullerengacha bo\'lgan nano-olam qiroli.')">
            <span class="symbol" style="color:#ff00ff">C</span>
            <span style="font-size:10px">Carbon</span>
        </div>
        <div class="element-card" onclick="showInfo('Si', 14, 'Yarim o\'tkazgichli nano-chiplar va kvant nuqtalarining asosi.')">
            <span class="symbol" style="color:#fbbf24">Si</span>
            <span style="font-size:10px">Silicon</span>
        </div>
        <div class="element-card" onclick="showInfo('Au', 79, 'Nano-tibbiyotda saraton hujayralarini yo\'q qilishda ishlatiladi.')">
            <span class="symbol" style="color:#fcd34d">Au</span>
            <span style="font-size:10px">Gold</span>
        </div>
    </div>

    <div id="info-panel" class="info-panel">
        <h3 id="info-title" style="margin-top:0"></h3>
        <p id="info-text" style="font-size:14px; line-height:1.5"></p>
        <div class="nano-tag">NANO-APP READY</div>
    </div>

    <script>
        function showInfo(sym, num, text) {
            const panel = document.getElementById('info-panel');
            document.getElementById('info-title').innerText = sym + " (Atom No: " + num + ")";
            document.getElementById('info-text').innerText = text;
            panel.style.display = 'block';
            
            // Animatsiya
            panel.style.opacity = 0;
            let op = 0;
            let timer = setInterval(() => {
                if (op >= 1) clearInterval(timer);
                panel.style.opacity = op;
                op += 0.1;
            }, 30);
        }
    </script>
</body>
</html>
