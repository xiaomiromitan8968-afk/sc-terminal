<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI TREND CHANNEL ANALYZER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020202;
            --neon-blue: #00c2ff;
            --neon-pink: #ff007f;
            --neon-green: #00ff88;
            --glass: rgba(0, 194, 255, 0.05);
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 15px;
            text-align: center;
        }

        .header h2 { font-family: 'Orbitron'; color: var(--neon-blue); letter-spacing: 2px; margin-bottom: 5px; }
        
        #tv-widget {
            width: 100%;
            height: 300px;
            border-radius: 15px;
            border: 1px solid #1a1a1a;
            margin-bottom: 15px;
        }

        /* --- AI PROOF SECTION --- */
        .ai-proof-card {
            display: none; /* Signal aniqlanganda ochiladi */
            background: var(--glass);
            border: 1px solid var(--neon-blue);
            border-radius: 20px;
            padding: 20px;
            margin-top: 15px;
            box-shadow: 0 0 25px rgba(0, 194, 255, 0.1);
        }

        .ai-header {
            font-family: 'Orbitron';
            font-size: 13px;
            color: var(--neon-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .logic-text {
            font-size: 12.5px;
            line-height: 1.6;
            color: #ddd;
            text-align: justify;
            margin-bottom: 15px;
        }

        .visual-reference {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #333;
            filter: brightness(0.8) contrast(1.2);
        }

        .signal-params {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>CHANNEL VISION</h2>
        <div id="ai-status" style="font-size: 9px; color: #555;">NEURAL SCANNING...</div>
    </div>

    <div id="tv-widget"></div>

    <div id="ai-proof-card" class="ai-proof-card">
        <div class="ai-header">
            <i class="fas fa-microchip"></i> AI LOGIC VERIFICATION
        </div>

        <div class="signal-params">
            <span id="p-buy" style="color: var(--neon-green);">TP: 1.2540</span>
            <span id="p-sl" style="color: var(--neon-pink);">SL: 1.2410</span>
        </div>

        <p id="ai-explanation" class="logic-text"></p>

        <div style="font-size: 9px; color: #444; margin-bottom: 8px;">SIGNAL PATTERN MATCH: 94%</div>
        <img id="pattern-img" class="visual-reference" src="" alt="Trend Channel Pattern">
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pair = urlParams.get('pair') || 'BINANCE:BTCUSDT';
        const tf = urlParams.get('tf') || '15';

        // 1. Widget yuklash
        function initChart() {
            const container = document.getElementById('tv-widget');
            const script = document.createElement('script');
            script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
            script.async = true;
            script.innerHTML = JSON.stringify({
                "interval": tf === 'D' ? "1d" : tf + "m",
                "width": "100%",
                "height": "100%",
                "symbol": pair,
                "showIntervalTabs": false,
                "locale": "en",
                "colorTheme": "dark",
                "isTransparent": true
            });
            container.appendChild(script);
            
            setTimeout(processAI, 3500);
        }

        // 2. AI Mantiqini qo'shish (Buy/Sell/TP/SL o'zgarmaydi)
        async function processAI() {
            const card = document.getElementById('ai-proof-card');
            const explanation = document.getElementById('ai-explanation');
            const patternImg = document.getElementById('pattern-img');
            const status = document.getElementById('ai-status');

            status.innerText = "PATTERN RECOGNIZED | ANALYZING...";
            await new Promise(r => setTimeout(r, 1500));

            // BU YERDA SENING BUY/SELL MANTIQING ISHLAYDI
            // Misol uchun BUY signalini tahlil qilamiz:
            
            explanation.innerText = "AI Tahlili: Narx parallel trend kanalining pastki chegarasiga (Support Line) tegdi. Shu bilan birga, 'Oversold' holati kuzatildi. Neyron tarmoq narxning kanal ichida yuqoriga qaytishini va qarshilik darajasigacha ko'tarilishini tasdiqlamoqda.";
            
            // Rasmni sening strategiyangga moslaymiz
            patternImg.src = "https://www.tradingview.com/x/Y8pE6Z6Z/"; // Bu yerga trend kanali rasmi qo'yiladi
            
            card.style.display = "block";
            status.innerText = "AI VERIFIED: TREND CHANNEL REBOUND";
            status.style.color = "var(--neon-blue)";

            // Ovozli xabar
            const speech = new SpeechSynthesisUtterance("Trend channel support detected. Price action confirms a reversal.");
            window.speechSynthesis.speak(speech);
        }

        window.onload = initChart;
    </script>
</body>
</html>
